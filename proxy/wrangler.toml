name = "yp-ai-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# CORS 허용 오리진(콤마로 여러 개). 라이브 GitHub Pages 오리진 + 로컬 테스트.
ALLOWED_ORIGIN = "https://youareprofessor.github.io,https://kevintheeco.github.io,http://localhost:8000,http://127.0.0.1:8000"
# OpenAI 폴백 모델 (필요 시 변경)
OPENAI_MODEL_SMART = "gpt-4o"
OPENAI_MODEL_FAST = "gpt-4o-mini"
# 레이트리밋(선택): RATE_LIMIT_PER_MIN(IP당, 기본 60) · RATE_LIMIT_ACADEMY_PER_MIN(학원코드당, 기본 240)

# 키는 여기 두지 말 것! 아래 명령으로 시크릿 등록:
#   wrangler secret put GEMINI_KEY
#   wrangler secret put OPENAI_KEY
#
# 학원(회사키) 경로용 — 학원코드↔클로드 워크스페이스 키 매핑(JSON):
#   wrangler secret put ACADEMY_KEYS
#   값 예시(한 줄): {"mj7x2a":"sk-ant-...","ga9k3b":"sk-ant-..."}
#   (대시보드에서 넣을 땐 Secret 타입으로 위 JSON 통째로 붙여넣기)
