/* ════════════════════════════════════════════
   APP ROOT
════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState((CFG.key||COMPANY_MODE)?"home":"onboard");
  const [decks,setDecks]=useState([]);
  const [subjects,setSubjects]=useState(defaultSubjects());
  const [filterSubj,setFilterSubj]=useState("all");
  const [activeDeck,setActiveDeck]=useState(null);
  const [examTopic,setExamTopic]=useState(null);   // 책 시험: 선택 단원 src+문항수 (topic 기반)
  const [noteDeck,setNoteDeck]=useState(null);
  const [user,setUser]=useState(null);
  const [nick,setNick]=useState("");
  const [showProfile,setShowProfile]=useState(false);
  const [syncBusy,setSyncBusy]=useState(false);
  const [cloudStatus,setCloudStatus]=useState("off");  // off | ok | error
  const [lastSyncAt,setLastSyncAt]=useState(0);
  // 환영 화면: 앱 들어올 때 닉네임 부르며 잠깐 인사 (기존 사용자만 — 온보딩 중엔 X)
  const [welcomed,setWelcomed]=useState(!CFG.key);
  const [wHide,setWHide]=useState(false);
  const dismissWelcome=()=>{setWHide(true);setTimeout(()=>setWelcomed(true),360);};
  useEffect(()=>{if(!CFG.key)return;const t=setTimeout(dismissWelcome,2800);return ()=>clearTimeout(t);},[]);

  // 클라우드 동기화 상태 구독 (초기 병합 + 이후 변경 저장 모두 반영)
  useEffect(()=>{
    setSyncListener(s=>{
      if(s.busy!==undefined)setSyncBusy(s.busy);
      if(s.ok!==undefined)setCloudStatus(s.ok?"ok":"error");
      if(s.at)setLastSyncAt(s.at);
    });
    return ()=>setSyncListener(null);
  },[]);

  const refresh=()=>setDecks(LS.get(DECKS_KEY)||[]);
  useEffect(()=>{refresh();},[]);

  // 구글 로그인 상태 구독 + 클라우드 동기화
  useEffect(()=>{
    if(!_auth)return;
    return _auth.onAuthStateChanged(async u=>{
      setUser(u);
      if(!u){_uid=null;setNick("");return;}
      _uid=u.uid;
      if(_db){
        try{await cloudSyncOnLogin(u.uid);}catch(e){console.warn("[sync]",e);}
        refresh();setSubjects(defaultSubjects());
      }
      const stored=LS.get(nickKey(u.uid));
      const n=stored||u.displayName||(u.email?u.email.split("@")[0]:tr("학습자","Learner"));
      if(!stored)LS.set(nickKey(u.uid),n);
      setNick(n);
    });
  },[]);

  async function login(){
    if(!_auth){alert(tr("로그인 기능을 쓸 수 없어. 인터넷 연결이나 설정을 확인해줘.","Sign-in isn't available. Check your connection or settings."));return;}
    try{
      await _auth.signInWithPopup(new window.firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request")return;
      alert(tr("로그인 실패: ","Sign-in failed: ")+(e.message||e.code));
    }
  }
  async function logout(){try{await _auth.signOut();}catch(e){}setShowProfile(false);}
  function saveNick(n){const v=(n||"").trim();if(!v||!user)return;setNick(v);LS.set(nickKey(user.uid),v);}

  function openStudy(id,mode){const d=LS.get(dk(id));if(!d)return;if(mode==="exam"){setExamTopic(null);setActiveDeck(d);setView("exam");return;}if(mode==="learn"){setActiveDeck(d);setView("tutor");return;}setActiveDeck({...d,studyType:mode||d.studyType||"explain"});setView("study");}
  // 책 소주제 하나만 집중 학습(이해=explain / 암기=quiz). focusId로 그 개념만 출제.
  function openConcept(deckId,conceptId,mode){const d=LS.get(dk(deckId));if(!d)return;setActiveDeck({...d,studyType:mode||"explain",focusId:conceptId});setView("study");}
  function openNotes(id){const d=LS.get(dk(id));if(d){setNoteDeck(d);setView("notes");}}
  function studyWeak(deck){
    const fresh=LS.get(dk(deck.id))||deck;
    const weakConcepts=(fresh.concepts||[]).filter(c=>(c.box||1)<=3||c.lapses>0);
    if(!weakConcepts.length){alert(tr("아직 약점 개념이 없어! 전체 공부부터 해봐 💪","No weak concepts yet! Study the full set first 💪"));return;}
    setActiveDeck({...fresh,concepts:weakConcepts});
    setView("study");
  }

  function saveSubjects(s){setSubjects(s);LS.set(SUBJS_KEY,s);}

  const filteredDecks=filterSubj==="all"?decks:decks.filter(d=>d.subjId===filterSubj);

  return(
    <>
      {!welcomed&&(
        <div onClick={dismissWelcome} style={{position:"fixed",inset:0,zIndex:200,cursor:"pointer",
          background:"linear-gradient(160deg,#6C5CE7 0%,#8B7BF0 60%,#A29BFE 100%)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:13,color:"#fff",
          opacity:wHide?0:1,transition:"opacity .36s ease",textAlign:"center",padding:24}}>
          <div style={{background:"#fff",borderRadius:"50%",padding:16,boxShadow:"0 14px 44px rgba(0,0,0,.22)"}}><Prof size={86}/></div>
          <div style={{fontFamily:"'Jua',sans-serif",fontSize:27,lineHeight:1.25,marginTop:4}}>
            {nick?tr("안녕, ","Hi, ")+nick+"! 👋":tr("어서 와! 👋","Welcome! 👋")}
          </div>
          <div style={{fontSize:15,opacity:.95}}>{tr("오늘도 니가 교수님이야 — 같이 공부하자 📚","You're the prof today — let's study 📚")}</div>
          <div style={{fontSize:12.5,opacity:.72,marginTop:20}}>{tr("화면을 누르면 시작","Tap anywhere to start")}</div>
        </div>
      )}
      <div className="hd">
        <div className="brand" onClick={()=>setView((CFG.key||COMPANY_MODE)?"home":"onboard")}>
          <Prof size={44}/><div><h1>{tr("니가 교수","You're the Prof")}</h1><div className="tag">{tr("니가 설명해봐, 내가 채점할게","You explain, I'll grade")}</div></div>
        </div>
        <div className="hd-r">
          {view!=="home"&&CFG.key&&<button className="btn gho sm" onClick={()=>{refresh();setView("home");}}>{tr("← 목록","← Back")}</button>}
          {_auth&&(user
            ?<button className="btn gho sm" onClick={()=>setShowProfile(true)} title={syncBusy?tr("동기화 중…","Syncing…"):cloudStatus==="ok"?tr("동기화 완료","Synced"):tr("내 프로필","My profile")}>
                {user.photoURL&&<img src={user.photoURL} alt="" style={{width:18,height:18,borderRadius:"50%",verticalAlign:"middle",marginRight:6}}/>}
                {nick||tr("내 프로필","My profile")}
                <span style={{marginLeft:5}}>{syncBusy?"☁️…":cloudStatus==="ok"?"☁️✓":cloudStatus==="error"?"⚠️":""}</span>
              </button>
            :<button className="btn gho sm" onClick={login}>{tr("🔑 로그인","🔑 Sign in")}</button>
          )}
          <button className="btn gho sm" onClick={()=>setView("settings")}>{tr("⚙️ 설정","⚙️ Settings")}</button>
        </div>
      </div>

      {showProfile&&user&&(
        <div onClick={()=>setShowProfile(false)} style={{position:"fixed",inset:0,background:"rgba(34,28,57,.42)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{maxWidth:340,width:"100%",padding:22,display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {user.photoURL&&<img src={user.photoURL} alt="" style={{width:46,height:46,borderRadius:"50%"}}/>}
              <div style={{minWidth:0}}>
                <div style={{fontFamily:"'Jua',sans-serif",fontSize:16,color:"var(--ink)"}}>{nick}</div>
                <div style={{fontSize:12,color:"var(--sub)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              </div>
            </div>
            <div style={{fontSize:12.5,padding:"8px 12px",borderRadius:10,
              background:(!syncBusy&&cloudStatus==="ok")?"#F0FDF4":syncBusy?"#EEF2FF":"#FFF6E9",
              border:"1px solid "+((!syncBusy&&cloudStatus==="ok")?"#B7EBC6":syncBusy?"#C7D2FE":"#FBE3B8"),
              color:(!syncBusy&&cloudStatus==="ok")?"#166534":syncBusy?"#3730A3":"#8A5A12",lineHeight:1.6}}>
              {syncBusy?tr("☁️ 동기화 중…","☁️ Syncing…")
               :cloudStatus==="ok"?(tr("✅ 동기화 완료 — 어느 기기서든 이어집니다.","✅ Synced — continues on any device.")+(lastSyncAt?tr(" (마지막 "," (last ")+fmtClock(lastSyncAt)+")":""))
               :cloudStatus==="error"?tr("⚠️ 클라우드 연결 실패 — Firestore 설정을 확인해줘 (지금은 이 기기에만 저장).","⚠️ Cloud connection failed — check Firestore setup (saved on this device for now).")
               :tr("⚠️ 클라우드 미설정 — 이 기기에만 저장됩니다.","⚠️ Cloud not set up — saved on this device only.")}
            </div>
            <div className="selectrow">
              <label>{tr("닉네임","Nickname")}</label>
              <input className="field" value={nick} maxLength={20} onChange={e=>{const v=e.target.value;setNick(v);if(v.trim()&&user)LS.set(nickKey(user.uid),v.trim());}} onBlur={e=>saveNick(e.target.value)}/>
            </div>
            <div className="row">
              <button className="btn pri" onClick={()=>{saveNick(nick);setShowProfile(false);}}>{tr("저장","Save")}</button>
              <button className="btn gho" onClick={logout}>{tr("로그아웃","Sign out")}</button>
            </div>
          </div>
        </div>
      )}

      {view==="onboard"&&<Onboard onDone={()=>setView("home")}/>}
      {view==="settings"&&<Settings onDone={()=>setView((CFG.key||COMPANY_MODE)?"home":"onboard")}/>}
      {view==="home"&&(
        <>
          <SubjectTabs subjects={subjects} active={filterSubj} onChange={setFilterSubj} onSave={saveSubjects}/>
          <Home decks={filteredDecks} subjects={subjects} onAdd={()=>setView("add")} onOpen={openStudy} onNotes={openNotes} onChanged={refresh} nick={nick}/>
        </>
      )}
      {view==="add"&&<AddMaterial subjects={subjects} onSave={saveSubjects} onDone={()=>{refresh();setView("home");}} onCancel={()=>setView("home")}/>}
      {view==="study"&&activeDeck&&<Study deck={activeDeck} subjects={subjects} onExit={()=>{refresh();setView("home");}}/>}
      {view==="exam"&&(activeDeck||examTopic)&&<Exam deck={examTopic?null:activeDeck} topic={examTopic} onExit={()=>{setExamTopic(null);refresh();setView("home");}}/>}
      {view==="tutor"&&activeDeck&&<Tutor deck={activeDeck} onExit={()=>{refresh();setView("home");}} onPractice={(cid,mode)=>openConcept(activeDeck.id,cid,mode)} onExam={(topic)=>{setExamTopic(topic);setView("exam");}}/>}
      {view==="notes"&&noteDeck&&<WeakNotes deck={noteDeck} onBack={()=>{refresh();setView("home");}} onStudy={studyWeak}/>}

      <div className="footer">{tr("키와 자료는 이 기기에만 저장","Keys & data stay on this device only")} · {MODELS.find(m=>m.id===CFG.model)?.label.split(" ·")[0]||"Claude"}</div>
    </>
  );
}

/* ── 과목 탭 바 ── */
function SubjectTabs({subjects,active,onChange,onSave}){
  const [adding,setAdding]=useState(false);
  const [newName,setNewName]=useState("");
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");

  function addSubject(){
    const name=newName.trim();if(!name)return;
    const color=SUBJ_COLORS[subjects.length%SUBJ_COLORS.length];
    const s=[...subjects,{id:uid(),name,color}];
    onSave(s);setNewName("");setAdding(false);
  }
  function startEdit(s,e){
    e.stopPropagation();setEditId(s.id);setEditName(s.name);
  }
  function saveEdit(){
    const n=editName.trim();if(!n)return;
    onSave(subjects.map(s=>s.id===editId?{...s,name:n}:s));setEditId(null);
  }
  function delSubject(s,e){
    e.stopPropagation();
    if(!confirm(tr('"'+s.name+'" 과목 삭제할까? 덱 자료는 남아있어.','Delete folder "'+s.name+'"? Your decks stay.')))return;
    onSave(subjects.filter(x=>x.id!==s.id));
    if(active===s.id)onChange("all");
  }
  const btnStyle={background:"none",border:"none",cursor:"pointer",padding:"0 2px",opacity:.55,color:"inherit",fontSize:12,lineHeight:1};

  return(
    <div style={{marginBottom:20}}>
      <div className="sub-tabs">
        <button className={"sub-tab"+(active==="all"?" on":"")} onClick={()=>onChange("all")}>{tr("전체","All")}</button>
        {subjects.map(s=>
          editId===s.id?(
            <div key={s.id} className="subj-new" style={{display:"inline-flex",margin:0}}>
              <input value={editName} onChange={e=>setEditName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditId(null);}}
                autoFocus style={{width:100}}/>
              <button className="btn pri xs" onClick={saveEdit}>{tr("저장","Save")}</button>
              <button className="btn gho xs" onClick={()=>setEditId(null)}>{tr("취소","Cancel")}</button>
            </div>
          ):(
            <div key={s.id} className={"sub-tab"+(active===s.id?" on":"")}
              style={{display:"inline-flex",alignItems:"center",gap:3,paddingRight:6,cursor:"pointer"}}
              onClick={()=>onChange(s.id)}>
              <span className="sub-dot" style={{background:s.color}}/>
              <span>{s.name}</span>
              <button style={btnStyle} onClick={e=>startEdit(s,e)} title={tr("수정","Edit")}>✎</button>
              <button style={{...btnStyle,fontSize:14}} onClick={e=>delSubject(s,e)} title={tr("삭제","Delete")}>×</button>
            </div>
          )
        )}
        <button className="btn gho xs" onClick={()=>setAdding(v=>!v)}>{tr("+ 과목","+ Folder")}</button>
      </div>
      {adding&&(
        <div className="subj-new">
          <input placeholder={tr("과목 이름 (예: 통계학)","Folder name (e.g. Statistics)")} value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")addSubject();if(e.key==="Escape")setAdding(false);}}
            autoFocus/>
          <button className="btn pri xs" onClick={addSubject}>{tr("추가","Add")}</button>
          <button className="btn gho xs" onClick={()=>setAdding(false)}>{tr("취소","Cancel")}</button>
        </div>
      )}
    </div>
  );
}

/* ── 온보딩 ── */
function Onboard({onDone}){
  return(
    <div className="card panel">
      <div style={{textAlign:"center"}}><Prof size={84}/></div>
      <h2 className="jua" style={{textAlign:"center",margin:"4px 0 0",fontSize:24}}>{tr("안녕! 나 니가 교수야 👋","Hi! I'm your Prof 👋")}</h2>
      <p className="muted" style={{textAlign:"center",margin:0,fontSize:13.5,lineHeight:1.7}}>
        {tr("시작하려면 네 Anthropic API 키가 필요해. 공부한 걸 넣어주면 문제 내고 채점해줄게.","To start you'll need your Anthropic API key. Add what you studied and I'll quiz and grade you.")}
      </p>
      <KeyForm onSaved={onDone} cta={tr("시작하기","Get started")}/>
    </div>
  );
}
function Settings({onDone}){
  const [storSize,setStorSize]=useState(()=>getStorageSize());
  const MAX=STORAGE_CAP();
  const pct=Math.min(100,Math.round(storSize/MAX*100));
  const barColor=pct>=90?"var(--rose)":pct>=70?"var(--gold)":"var(--mint)";
  const fileRef=useRef(null);
  const [backupMsg,setBackupMsg]=useState("");
  function doExport(){try{exportBackup();setBackupMsg(tr("✓ 백업 파일을 내려받았어. 안전한 곳에 보관해줘!","✓ Backup file downloaded. Keep it somewhere safe!"));}catch(e){setBackupMsg(tr("내보내기 실패: ","Export failed: ")+e.message);}}
  async function doImport(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    if(!confirm(tr("백업을 불러오면 같은 이름의 현재 자료에 덮어써져.\n계속할까?","Importing will overwrite current data with the same names.\nContinue?"))){e.target.value="";return;}
    try{const n=await importBackup(f);setBackupMsg(tr("✓ 복원 완료 ("+n+"개 항목). 새로고침할게…","✓ Restored ("+n+" items). Reloading…"));setTimeout(()=>location.reload(),900);}
    catch(err){setBackupMsg(tr("복원 실패: ","Restore failed: ")+err.message);}
    e.target.value="";
  }
  return(
    <div className="card panel">
      <div className="eyebrow">{tr("설정","Settings")}</div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:"var(--sub)",marginBottom:6}}>
          <span>{tr("저장 공간 ","Storage ")}{_idb?tr("(대용량 모드)","(large mode)"):tr("(기본 모드)","(basic mode)")}</span>
          <span style={{fontWeight:700,color:pct>=70?barColor:"var(--sub)"}}>{formatSize(storSize)} / {formatSize(MAX)} ({pct}%)</span>
        </div>
        <div className="bar"><i style={{width:pct+"%",background:barColor}}/></div>
        {pct>=80&&<p className="err" style={{fontSize:12.5,marginTop:8}}>{tr("⚠️ 저장 공간이 부족해. 오래된 자료를 삭제해줘.","⚠️ Storage is almost full. Delete old materials.")}</p>}
      </div>
      <div style={{borderTop:"1px solid var(--line)",paddingTop:14}}>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("💾 데이터 백업 ","💾 Data backup ")}<span style={{fontSize:11}}>{tr("(자료·학습기록을 파일로 저장 / 복원. API 키는 제외)","(save/restore data & progress to a file. API keys excluded)")}</span></div>
        <div className="row">
          <button className="btn gho sm" onClick={doExport}>{tr("⬇️ 내보내기","⬇️ Export")}</button>
          <button className="btn gho sm" onClick={()=>fileRef.current&&fileRef.current.click()}>{tr("⬆️ 불러오기","⬆️ Import")}</button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={doImport}/>
        </div>
        {backupMsg&&<p style={{fontSize:12.5,marginTop:8,color:backupMsg.startsWith("✓")?"var(--mint)":"var(--rose)"}}>{backupMsg}</p>}
      </div>
      <KeyForm onSaved={onDone} cta={tr("저장","Save")} showCancel onCancel={onDone}/>
    </div>
  );
}
function KeyForm({onSaved,cta,showCancel,onCancel}){
  const [key,setKey]=useState(CFG.key);
  const [geminiKey,setGeminiKey]=useState(CFG.geminiKey);
  const [model,setModel]=useState(CFG.model);
  const [qmodel,setQmodel]=useState(CFG.qmodel);
  const [lang,setLang]=useState(CFG.lang||"ko");
  const [testing,setTesting]=useState(false);
  const [err,setErr]=useState("");
  async function save(){
    if(COMPANY_MODE){   // 회사가 키·모델 제공 → 사용자는 언어만 저장하면 됨(키 입력 불필요)
      CFG.lang=lang;LS.set("ng:lang",CFG.lang);onSaved();return;
    }
    const hasA=key.trim().length>0,hasG=geminiKey.trim().length>0;
    if(!hasA&&!hasG){setErr(tr("최소 하나의 API 키를 입력해줘.","Enter at least one API key."));return;}
    setTesting(true);setErr("");
    CFG.key=key.trim();CFG.model=model;CFG.qmodel=qmodel;CFG.geminiKey=geminiKey.trim();CFG.lang=lang;

function FileDropZone({files,onChange}){
  const [over,setOver]=useState(false);
  const ref=useRef(null);

  function handleFiles(newFiles){
    const arr=Array.from(newFiles).filter(f=>{
      const ok=f.type.startsWith("image/")||f.type==="application/pdf";
      if(!ok)alert(f.name+tr(": 이미지(jpg/png) 또는 PDF만 가능해.",": only images (jpg/png) or PDF."));
      return ok;
    });
    onChange([...files,...arr]);
  }
  const fmtSize=(n)=>n<1024?""+n+"B":n<1048576?(n/1024).toFixed(1)+"KB":(n/1048576).toFixed(1)+"MB";
  const fileIcon=(f)=>f.type==="application/pdf"?"📄":f.type.startsWith("image/")?"🖼️":"📎";

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div className={"dropzone"+(over?" over":"")}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);handleFiles(e.dataTransfer.files)}}
        onClick={()=>ref.current&&ref.current.click()}>
        <input ref={ref} type="file" accept="image/*,.pdf" multiple
          onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>
        <div className="dz-icon">📎</div>
        <div className="dz-text"><b>{tr("파일 선택 또는 여기에 끌어다 놓기","Choose files or drag them here")}</b><br/>{tr("이미지(JPG·PNG) · PDF 지원","Images (JPG·PNG) · PDF")}</div>
      </div>
      {files.length>0&&(
        <div className="file-list">
          {files.map((f,i)=>(
            <div key={i} className="file-item">
              <span className="fi-icon">{fileIcon(f)}</span>
              <span className="fi-name">{f.name}</span>

          ))}
        </div>
      )}
    </div>
  );
}

/* ── S펜 배럴(옆) 버튼 지우개 감지 (공용) ──
   삼성노트처럼: 버튼 누르고 있는 동안만 지우개, 떼면 펜으로 복귀.
   기기·브라우저마다 버튼 비트가 2(배럴)/32(지우개팁)로 제각각이라 둘 다 인식하고,
   펜을 뒤집어 쓰는 경우(pointerType==="eraser")도 지우개로 본다. */
const PEN_ERASE_DEBOUNCE=140; // ms: 드래그 중 버튼 신호 깜빡임 무시
function penBarrelHeld(e){
  if(e.pointerType==="eraser")return true;
  if(e.pointerType!=="pen")return false;
  return !!(e.buttons&2)||!!(e.buttons&32)||e.button===2||e.button===5;
}
// 지금 이 순간 지우개여야 하나? lastSeenRef로 신호 깜빡임을 디바운스.
function eraseNow(e,lastSeenRef,toolIsEraser){
  if(toolIsEraser)return true;
  const now=e.timeStamp||performance.now();
  if(penBarrelHeld(e)){lastSeenRef.current=now;return true;}
  if(e.pointerType==="pen"&&lastSeenRef.current&&now-lastSeenRef.current<PEN_ERASE_DEBOUNCE)return true;
  return false;
}

/* ── 해설 오버레이 캔버스 (투명, 형광펜·초록펜이 텍스트 위에 직접 표시) ── */
const AnnotPad=React.forwardRef(function AnnotPad({disabled,tool},fwdRef){
  const cvs=useRef(null);
  const strokes=useRef([]);
  const drawing=useRef(false);
  const eraseGesture=useRef(false);
  const lastBtn=useRef(0);
  React.useImperativeHandle(fwdRef,()=>({
    getImageBase64:()=>cvs.current?.toDataURL("image/png").split(",")[1]||null,
    hasStrokes:()=>strokes.current.length>0,
    clear:()=>{strokes.current=[];redraw();},
  }));
  function syncSize(){
    const c=cvs.current;if(!c)return;
    const p=c.parentElement;if(!p)return;
    const rect=p.getBoundingClientRect();
    const w=Math.round(rect.width),h=Math.round(rect.height);
    if(!w||!h)return;
    const dpr=window.devicePixelRatio||1;
    c.style.width=w+"px";c.style.height=h+"px";
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
    redraw();
  }
  function redraw(){
    const c=cvs.current;if(!c)return;
    const ctx=c.getContext("2d"),dpr=window.devicePixelRatio||1,w=c.width/dpr,h=c.height/dpr;
    ctx.clearRect(0,0,w,h);
    strokes.current.forEach(({pts,col,sz})=>{
      if(pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=col;ctx.lineWidth=sz;
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
      ctx.stroke();
    });
  }
  React.useLayoutEffect(()=>{
    syncSize();
    const parent=cvs.current?.parentElement;if(!parent)return;
    const ro=new ResizeObserver(syncSize);ro.observe(parent);
    window.addEventListener("resize",syncSize);
    return()=>{ro.disconnect();window.removeEventListener("resize",syncSize);};
  },[]);
  useEffect(()=>{
    const c=cvs.current;if(!c)return;
    const prev=(e)=>{if(e.touches[0]?.touchType==="stylus"||e.touches[0]?.radiusX===0)e.preventDefault();};
    c.addEventListener("touchstart",prev,{passive:false});
    c.addEventListener("touchmove",prev,{passive:false});
    return()=>{c.removeEventListener("touchstart",prev);c.removeEventListener("touchmove",prev);};
  },[]);
  const pt=(e)=>{const r=cvs.current.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
  function eraseAt(x,y){
    const R=16*16,prev=strokes.current.length;
    strokes.current=strokes.current.filter(({pts})=>!pts.some(p=>(p.x-x)**2+(p.y-y)**2<R));
    if(strokes.current.length!==prev)redraw();
  }
  function startStroke(p){
    drawing.current=true;
    if(strokes.current.length>=500)strokes.current.shift();
    strokes.current.push({pts:[p],col:tool==="hl"?"rgb(255,230,0)":"#27AE60",sz:tool==="hl"?20:2.5});
  }
  function down(e){
    if(disabled||e.pointerType!=="pen")return;
    e.preventDefault();
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){eraseGesture.current=true;drawing.current=false;eraseAt(p.x,p.y);return;}
    eraseGesture.current=false;
    startStroke(p);
  }
  function move(e){
    if(disabled||e.pointerType!=="pen")return;
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){
      e.preventDefault();
      if(drawing.current){const st=strokes.current[strokes.current.length-1];if(st&&st.pts.length<2)strokes.current.pop();drawing.current=false;}
      eraseGesture.current=true;eraseAt(p.x,p.y);return;
    }
    if(eraseGesture.current){eraseGesture.current=false;e.preventDefault();startStroke(p);return;}
    if(!drawing.current)return;
    e.preventDefault();
    const st=strokes.current[strokes.current.length-1];if(!st)return;
    st.pts.push(p);
    const ctx=cvs.current.getContext("2d");
    ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=st.col;ctx.lineWidth=st.sz;
    if(st.pts.length>1){ctx.beginPath();ctx.moveTo(st.pts[st.pts.length-2].x,st.pts[st.pts.length-2].y);ctx.lineTo(p.x,p.y);ctx.stroke();}
  }
  const up=()=>{drawing.current=false;eraseGesture.current=false;lastBtn.current=0;};
  return(
    <canvas ref={cvs}
      style={{position:"absolute",top:0,left:0,
        mixBlendMode:"multiply",touchAction:"none",zIndex:5,
        cursor:disabled?"not-allowed":tool==="eraser"?"cell":"crosshair",
        pointerEvents:disabled?"none":"auto"}}
      onPointerDown={down} onPointerMove={move} onPointerUp={up}
      onPointerLeave={up} onPointerCancel={up}
      onContextMenu={e=>{e.preventDefault();const p=pt(e);eraseAt(p.x,p.y);}}/>
  );
});

/* ── 질문 손글씨 패드 (단독, 배경 있음) ── */
const QuestionPad=React.forwardRef(function QuestionPad({disabled,tool="pen",onInk},fwdRef){
  const cvs=useRef(null);const strokes=useRef([]);const drawing=useRef(false);
  const eraseGesture=useRef(false);const lastBtn=useRef(0);
  const notifyInk=()=>onInk&&onInk(strokes.current.length>0);
  React.useImperativeHandle(fwdRef,()=>({
    getImageBase64:()=>cvs.current?.toDataURL("image/png").split(",")[1]||null,
    hasStrokes:()=>strokes.current.length>0,
    clear:()=>{strokes.current=[];redraw();notifyInk();},
    undo:()=>{if(strokes.current.length>0){strokes.current.pop();redraw();notifyInk();}},
  }));
  const getDpr=()=>window.devicePixelRatio||1;
  function setup(){
    const c=cvs.current;if(!c)return;
    const r=c.getBoundingClientRect(),dpr=getDpr();
    c.width=Math.round(r.width*dpr);c.height=Math.round(r.height*dpr);
    const ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);redraw();
  }
  function redraw(){
    const c=cvs.current;if(!c)return;
    const ctx=c.getContext("2d"),dpr=getDpr(),w=c.width/dpr,h=c.height/dpr;
    ctx.fillStyle="#FFFDF8";ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#EDE9F0";ctx.lineWidth=1;
    for(let y=28;y<h;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    strokes.current.forEach(({pts})=>{
      if(pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#221C39";ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
    });
  }
  useEffect(()=>{setup();const f=()=>setup();window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  useEffect(()=>{
    const c=cvs.current;if(!c)return;
    const prev=(e)=>{if(e.touches[0]?.touchType==="stylus"||e.touches[0]?.radiusX===0)e.preventDefault();};
    c.addEventListener("touchstart",prev,{passive:false});
    c.addEventListener("touchmove",prev,{passive:false});
    return()=>{c.removeEventListener("touchstart",prev);c.removeEventListener("touchmove",prev);};
  },[]);
  const pt=(e)=>{const r=cvs.current.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
  function eraseAt(x,y){
    const R=12*12,prev=strokes.current.length;
    strokes.current=strokes.current.filter(({pts})=>!pts.some(p=>(p.x-x)**2+(p.y-y)**2<R));
    if(strokes.current.length!==prev){redraw();notifyInk();}
  }
  function startStroke(p){
    drawing.current=true;
    if(strokes.current.length>=500)strokes.current.shift();
    strokes.current.push({pts:[p]});
  }
  function down(e){
    if(disabled)return;
    if(e.pointerType!=="pen")return;
    e.preventDefault();
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){eraseGesture.current=true;drawing.current=false;eraseAt(p.x,p.y);return;}
    eraseGesture.current=false;
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
    startStroke(p);
  }
  function move(e){
    if(e.pointerType!=="pen"){drawing.current=false;return;}
    if(disabled)return;
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){
      e.preventDefault();
      if(drawing.current){const st=strokes.current[strokes.current.length-1];if(st&&st.pts.length<2)strokes.current.pop();drawing.current=false;}
      eraseGesture.current=true;eraseAt(p.x,p.y);return;
    }
    if(eraseGesture.current){eraseGesture.current=false;e.preventDefault();startStroke(p);return;}
    if(!drawing.current)return;
    e.preventDefault();
    const st=strokes.current[strokes.current.length-1];if(!st)return;
    st.pts.push(p);
    const ctx=cvs.current.getContext("2d");
    ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#221C39";ctx.lineWidth=2;
    if(st.pts.length>1){ctx.beginPath();ctx.moveTo(st.pts[st.pts.length-2].x,st.pts[st.pts.length-2].y);ctx.lineTo(st.pts[st.pts.length-1].x,st.pts[st.pts.length-1].y);ctx.stroke();}
  }
  const up=()=>{drawing.current=false;eraseGesture.current=false;lastBtn.current=0;notifyInk();};
  return(
    <canvas ref={cvs} className="pad"
      style={{height:110,cursor:disabled?"not-allowed":tool==="eraser"?"cell":"crosshair",borderRadius:12}}
      onPointerDown={down} onPointerMove={move} onPointerUp={up}
      onPointerLeave={up} onPointerCancel={up}
      onContextMenu={e=>{e.preventDefault();const p=pt(e);eraseAt(p.x,p.y);}}/>
  );
});

/* ── 풀사이즈 펜 패드 ── */
const PEN_COLORS=["#221C39","#2563EB","#DC2626"];
const PEN_LABELS=["검정","파랑","빨강"];

const PenPad=React.forwardRef(function PenPad({kind,onText,disabled,hideOcr,penOnlyDefault=false,highlights,highlightSize,onTypeMode},fwdRef){
  const canvasRef=useRef(null);
  const pages=useRef([[]]);                 // 장(page)별 획 배열 — 장을 넘겨도 메모리에 그대로 보존됨
  const curRef=useRef(0);                   // 지금 보고 있는 장 index
  const strokes=useRef(pages.current[0]);   // 항상 현재 장을 가리키는 별칭 (기존 그리기 코드 호환)
  const redoRef=useRef([]);                 // 다시 실행(redo) 스택 — 취소·전체지우기·지우개로 사라진 획 되살리기
  const [pgUI,setPgUI]=useState({i:0,n:1}); // 페이지 표시/버튼 갱신용
  const drawing=useRef(false);
  const eraseGesture=useRef(false);   // 지금 버튼-지우개 중인지
  const lastBtn=useRef(0);            // 버튼 신호 마지막으로 본 시각(디바운스용)
  const [tool,setTool]=useState("pen");
  const [color,setColor]=useState(PEN_COLORS[0]);
  const [size,setSize]=useState(1);
  const [busy,setBusy]=useState(false);
  const [padErr,setPadErr]=useState("");
  const [hasInk,setHasInk]=useState(false);
  const [canRedo,setCanRedo]=useState(false);   // ↪ 다시 버튼 활성화 여부
  const [penOnly,setPenOnly]=useState(penOnlyDefault);
  const cpStroke=(s)=>({pts:s.pts.slice(),col:s.col,sz:s.sz});

  React.useImperativeHandle(fwdRef,()=>({
    getImageBase64:()=>exportAllPages(),
    hasStrokes:()=>pages.current.some(p=>p.length>0),
    clear:()=>{pages.current=[[]];curRef.current=0;strokes.current=pages.current[0];redraw();setHasInk(false);setPadErr("");setPgUI({i:0,n:1});},
    forceColor:(c)=>{setColor(c);setTool("pen");},
    setEraser:()=>setTool("eraser"),
    setPen:()=>setTool("pen"),
    getSize:()=>exportSize(),
    // 시험 모드: 문항 넘겨도 손글씨를 보존·재편집하려고 획 데이터를 통째로 빼고/싣는다
    dump:()=>{const c=canvasRef.current,dpr=getDpr();return{pages:pages.current.map(pg=>pg.map(s=>({pts:s.pts.slice(),col:s.col,sz:s.sz}))),w:c?c.width/dpr:800,h:c?c.height/dpr:340};},
    load:(data)=>{const pgs=(data&&Array.isArray(data.pages)&&data.pages.length)?data.pages:[[]];pages.current=pgs.map(pg=>pg.map(s=>({pts:(s.pts||[]).slice(),col:s.col,sz:s.sz})));curRef.current=0;strokes.current=pages.current[0];redraw();setHasInk(pages.current.some(p=>p.length>0));setPgUI({i:0,n:pages.current.length});},
  }));

  const getDpr=()=>window.devicePixelRatio||1;
  function setup(){
    const c=canvasRef.current;if(!c)return;
    const r=c.getBoundingClientRect(),dpr=getDpr();
    c.width=Math.round(r.width*dpr);c.height=Math.round(r.height*dpr);
    const ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
    redraw();
  }
  function paintStrokes(ctx,arr){
    arr.forEach(({pts,col,sz})=>{
      if(pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";
      ctx.globalCompositeOperation="source-over";ctx.strokeStyle=col;
      for(let i=1;i<pts.length;i++){
        ctx.beginPath();ctx.lineWidth=sz*(0.8+(pts[i].p||.5)*0.4)*2;
        ctx.moveTo(pts[i-1].x,pts[i-1].y);ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
      }
    });
  }
  function redraw(){
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d");
    const dpr=getDpr();const w=c.width/dpr,h=c.height/dpr;
    ctx.fillStyle="#FFFDF8";ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#EDE9F0";ctx.lineWidth=1;
    for(let y=32;y<h;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    paintStrokes(ctx,strokes.current);
  }
  // 잉크가 있는 마지막 장까지 카운트 (빈 뒤쪽 장은 내보내지 않음)
  function exportCount(){let last=0;pages.current.forEach((p,i)=>{if(p.length)last=i;});return last+1;}
  function exportSize(){const c=canvasRef.current;if(!c)return{w:800,h:680};return{w:c.width,h:c.height*exportCount()};}
  // 모든 장을 세로로 이어붙여 하나의 PNG로 — 채점·OCR은 전체를 한 장처럼 봄
  function exportAllPages(){
    const c=canvasRef.current;if(!c)return null;
    const dpr=getDpr();const cssW=c.width/dpr,cssH=c.height/dpr;const n=exportCount();
    const off=document.createElement("canvas");off.width=c.width;off.height=c.height*n;
    const ctx=off.getContext("2d");ctx.scale(dpr,dpr);
    for(let i=0;i<n;i++){
      ctx.save();ctx.translate(0,i*cssH);
      ctx.fillStyle="#FFFDF8";ctx.fillRect(0,0,cssW,cssH);
      paintStrokes(ctx,pages.current[i]);
      ctx.restore();
    }
    return off.toDataURL("image/png").split(",")[1];
  }
  function showPage(i){if(i<0||i>=pages.current.length)return;curRef.current=i;strokes.current=pages.current[i];redraw();setPgUI({i,n:pages.current.length});}
  function addPage(){pages.current.push([]);showPage(pages.current.length-1);}
  useEffect(()=>{setup();const f=()=>setup();window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const prev=(e)=>{if(e.touches[0]?.touchType==="stylus"||e.touches[0]?.radiusX===0)e.preventDefault();};
    c.addEventListener("touchstart",prev,{passive:false});
    c.addEventListener("touchmove",prev,{passive:false});
    return()=>{c.removeEventListener("touchstart",prev);c.removeEventListener("touchmove",prev);};
  },[]);

  const pt=(e)=>{const r=canvasRef.current.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top,p:e.pressure||.5};};
  function eraseAt(x,y){
    const R=13*13;
    const before=strokes.current;
    const kept=before.filter(({pts})=>
      !pts.some(p=>(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y)<R)
    );
    if(kept.length!==before.length){
      const removed=before.filter(s=>kept.indexOf(s)<0);
      redoRef.current.push({page:curRef.current,strokes:removed.map(cpStroke)});setCanRedo(true);
      strokes.current=kept;pages.current[curRef.current]=strokes.current;
      redraw();setHasInk(pages.current.some(p=>p.length>0));
    }
  }
  function startStroke(p){
    drawing.current=true;
    redoRef.current=[];setCanRedo(false);   // 새 획을 그으면 redo 무효
    if(strokes.current.length>=500)strokes.current.shift();
    strokes.current.push({pts:[p],col:color,sz:size});
  }
  function down(e){
    if(disabled)return;
    if(penOnly&&e.pointerType!=="pen")return;
    e.preventDefault();
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){
      eraseGesture.current=true;
      drawing.current=false;
      eraseAt(p.x,p.y);
      return;
    }
    eraseGesture.current=false;
    startStroke(p);
  }
  function move(e){
    if(disabled)return;
    if(penOnly&&e.pointerType!=="pen"){drawing.current=false;return;}
    const p=pt(e);
    if(eraseNow(e,lastBtn,tool==="eraser")){
      e.preventDefault();
      if(drawing.current){   // 그리던 중 버튼 누름 → 짧은 점 획은 버리고 지우개로
        const st=strokes.current[strokes.current.length-1];
        if(st&&st.pts.length<2)strokes.current.pop();
        drawing.current=false;
      }
      eraseGesture.current=true;
      eraseAt(p.x,p.y);
      return;
    }
    if(eraseGesture.current){   // 버튼에서 손 뗌 → 펜으로 복귀, 여기서부터 새 획
      eraseGesture.current=false;
      e.preventDefault();
      startStroke(p);
      return;
    }
    if(!drawing.current)return;
    e.preventDefault();
    const st=strokes.current[strokes.current.length-1];
    if(!st)return;
    st.pts.push(p);
    const ctx=canvasRef.current.getContext("2d");
    if(st.pts.length>1){
      ctx.lineCap="round";ctx.lineJoin="round";
      ctx.globalCompositeOperation="source-over";ctx.strokeStyle=st.col;
      ctx.beginPath();ctx.lineWidth=st.sz*(0.8+(p.p||.5)*0.4)*2;
      ctx.moveTo(st.pts[st.pts.length-2].x,st.pts[st.pts.length-2].y);ctx.lineTo(p.x,p.y);ctx.stroke();
    }
    if(!hasInk)setHasInk(true);
  }
  const up=()=>{drawing.current=false;eraseGesture.current=false;lastBtn.current=0;};
  const cancel=()=>{drawing.current=false;eraseGesture.current=false;lastBtn.current=0;};
  function undo(){
    if(disabled)return;
    const popped=strokes.current.pop();
    if(popped){redoRef.current.push({page:curRef.current,stroke:cpStroke(popped)});setCanRedo(true);}
    redraw();setHasInk(pages.current.some(p=>p.length>0));
  }
  function clearPad(){
    const hadInk=pages.current.some(p=>p.length>0);
    const snap=pages.current.map(pg=>pg.map(cpStroke));
    pages.current=[[]];curRef.current=0;strokes.current=pages.current[0];redraw();setHasInk(false);setPadErr("");setPgUI({i:0,n:1});
    if(hadInk){redoRef.current=[{clearSnap:snap,cur:0}];setCanRedo(true);}   // 통째로 복구용(이전 redo는 버림)
  }
  function redoFn(){
    if(disabled)return;
    const e=redoRef.current.pop();
    if(!e){setCanRedo(false);return;}
    if(e.clearSnap){
      pages.current=e.clearSnap.map(pg=>pg.map(cpStroke));
      curRef.current=Math.min(e.cur||0,pages.current.length-1);
      strokes.current=pages.current[curRef.current];
      setPgUI({i:curRef.current,n:pages.current.length});
    }else{
      const pi=Math.min(e.page||0,pages.current.length-1);
      curRef.current=pi;strokes.current=pages.current[pi];
      (e.stroke?[e.stroke]:(e.strokes||[])).forEach(s=>strokes.current.push(s));
      setPgUI({i:pi,n:pages.current.length});
    }
    redraw();setHasInk(pages.current.some(p=>p.length>0));setCanRedo(redoRef.current.length>0);
  }
  async function recognize(){
    if(!hasInk){setPadErr(tr("먼저 써봐.","Write something first."));return;}
    setBusy(true);setPadErr("");
    try{
      const data=exportAllPages();
      const t=await transcribeFile(data,"image/png",kind);
      onText((t||"").trim());clearPad();
    }catch(e){setPadErr("인식 실패: "+e.message);}
    setBusy(false);
  }

  return(
    <div className="pen-wrap">
      <div className="pen-toolbar">
        <button className={"btn ico gho sm"+(tool==="pen"?" on":"")} onClick={()=>setTool("pen")} title="펜" disabled={disabled}>✏️</button>
        <button className={"btn ico gho sm"+(tool==="eraser"?" on":"")} onClick={()=>setTool("eraser")} title="지우개" disabled={disabled}>🧽</button>
        <div className="sep"/>
        {PEN_COLORS.map((c,i)=>(
          <button key={c} className={"color-btn"+(color===c&&tool==="pen"?" on":"")}
            style={{background:c}} title={PEN_LABELS[i]}
            onClick={()=>{setColor(c);setTool("pen");}}/>
        ))}
        <div className="sep"/>
        <div className="size-row">
          <span>굵기</span>
          <input type="range" min="1" max="10" step="0.5" value={size} onChange={e=>setSize(Number(e.target.value))}/>
          <span style={{minWidth:22,textAlign:"right"}}>{size}</span>
        </div>
        <div className="sep"/>
        <button className="btn gho xs" onClick={undo} disabled={busy||disabled}>↩ {tr("취소","Undo")}</button>
        <button className="btn gho xs" onClick={redoFn} disabled={busy||disabled||!canRedo} title={tr("실수로 취소·지운 획 되살리기","Redo — bring back undone/erased strokes")}>↪ {tr("다시","Redo")}</button>
        <button className="btn gho xs" onClick={clearPad} disabled={busy||disabled}>🗑️ {tr("전체","Clear")}</button>
        <div className="sep"/>
        <button className={"btn gho xs"+(penOnly?" on":"")} onClick={()=>setPenOnly(v=>!v)}
          title={penOnly?tr("펜 전용 ON — 손가락 터치 무시 중 (S펜·Apple Pencil)","Pen only — ignoring finger touch (S Pen·Apple Pencil)"):tr("터치·마우스도 허용 중","Touch & mouse allowed")}>
          ✒️ {penOnly?tr("펜 전용","Pen only"):tr("터치","Touch")}
        </button>
        {onTypeMode&&<button className="btn gho xs" onClick={onTypeMode} disabled={disabled}
          title={tr("타이핑으로 답하기 — 큰 답안지","Type your answer — big sheet")}>⌨️ {tr("타이핑","Type")}</button>}
      </div>
      <div style={{position:"relative",width:"100%"}}>
        <canvas ref={canvasRef} className={"pad"+(tool==="eraser"?" eraser":"")}
          style={{touchAction:penOnly?"pan-y":"none",...(disabled?{opacity:.55,pointerEvents:"none"}:{})}}
          onPointerDown={down} onPointerMove={move} onPointerUp={up}
          onPointerLeave={up} onPointerCancel={cancel}
          onContextMenu={e=>{e.preventDefault();const p=pt(e);eraseAt(p.x,p.y);}}/>
        {highlights&&highlights.length>0&&canvasRef.current&&highlights.map((h,i)=>{
          const pw=canvasRef.current.width,ph=canvasRef.current.height; // 한 장의 device px
          const pageOf=Math.floor(h.y/ph);          // 이 박스가 속한 장
          if(pageOf!==curRef.current)return null;    // 다른 장의 표시는 그 장을 펼쳤을 때만
          const ly=h.y-pageOf*ph;
          return(
          <div key={i} style={{position:"absolute",
            left:(h.x/pw*100)+"%",top:(ly/ph*100)+"%",
            width:(h.w/pw*100)+"%",height:(h.h/ph*100)+"%",
            border:"2.5px solid var(--rose)",borderRadius:4,
            background:"rgba(255,107,138,0.16)",boxShadow:"0 0 0 1px rgba(255,255,255,.6)",
            pointerEvents:"none",boxSizing:"border-box"}}>
            <span style={{position:"absolute",top:-9,left:-7,fontSize:11,background:"var(--rose)",color:"#fff",
              borderRadius:"50%",width:16,height:16,lineHeight:"16px",textAlign:"center",fontWeight:700}}>?</span>
          </div>
        );})}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,flexWrap:"wrap"}}>
        <button className="btn gho xs" style={{flex:"0 1 auto"}} onClick={()=>showPage(curRef.current-1)} disabled={disabled||pgUI.i<=0}>◀ {tr("이전","Prev")}</button>
        <span style={{minWidth:54,textAlign:"center",fontSize:12,fontWeight:700,color:"var(--pri-d)"}}>{pgUI.i+1} / {pgUI.n} {tr("장","pg")}</span>
        <button className="btn gho xs" style={{flex:"0 1 auto"}} onClick={()=>showPage(curRef.current+1)} disabled={disabled||pgUI.i>=pgUI.n-1}>{tr("다음","Next")} ▶</button>
        <button className="btn pri xs" style={{flex:"0 1 auto",marginLeft:"auto"}} onClick={addPage} disabled={disabled}>+ {tr("새 장","New page")}</button>
      </div>
      {!hideOcr&&(
        <div className="pen-bottom">
          <span className="ph">{tr("S펜이나 손가락으로 써봐","Write with S Pen or finger")}</span>
          <div className="row">
            <button className="btn pri sm" onClick={recognize} disabled={busy||!hasInk}>
              {busy?tr("인식 중…","Reading…"):tr("✅ 인식해서 넣기","✅ Recognize & add")}
            </button>
          </div>
        </div>
      )}
      {padErr&&<div className="err">{padErr}</div>}
    </div>
  );
});

// 저장된 손글씨 획 데이터(dump 결과)를 라이브 패드 없이 JPEG로 굽는다 — 시험 채점·검토용
function renderInkPNG(data){
  if(!data||!Array.isArray(data.pages)||!data.pages.some(p=>p&&p.length))return null;
  const w=data.w||800,h=data.h||340,n=data.pages.length,dpr=2;
  const c=document.createElement("canvas");c.width=Math.round(w*dpr);c.height=Math.round(h*n*dpr);
  const ctx=c.getContext("2d");ctx.scale(dpr,dpr);
  for(let i=0;i<n;i++){
    ctx.save();ctx.translate(0,i*h);
    ctx.fillStyle="#FFFDF8";ctx.fillRect(0,0,w,h);
    (data.pages[i]||[]).forEach(({pts,col,sz})=>{
      if(!pts||pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=col||"#221C39";
      for(let j=1;j<pts.length;j++){
        ctx.beginPath();ctx.lineWidth=(sz||1)*(0.8+(pts[j].p||.5)*0.4)*2;
        ctx.moveTo(pts[j-1].x,pts[j-1].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();
      }
    });
    ctx.restore();
  }
  return c.toDataURL("image/jpeg",0.72).split(",")[1];
}
function inkHas(data){return !!(data&&Array.isArray(data.pages)&&data.pages.some(p=>p&&p.length));}

/* ── 사진 버튼 ── */
function PhotoButton({kind,onText,label}){
  const ref=useRef(null);const[busy,setBusy]=useState(false);
  async function handle(e){
    const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
    setBusy(true);
    try{const data=await toB64(f);const t=await transcribeFile(data,f.type||"image/jpeg",kind);onText((t||"").trim());}
    catch(e){alert(tr("인식 실패: ","Recognition failed: ")+e.message);}
    setBusy(false);
  }
  return(
    <>
      <button className="btn gho sm" onClick={()=>ref.current&&ref.current.click()} disabled={busy}>
        {busy?tr("읽는 중…","Reading…"):(label||tr("📷 사진","📷 Photo"))}
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
    </>
  );
}

/* ── 자료 추가 ── */
function AddMaterial({subjects,onSave,onDone,onCancel}){
  const [name,setName]=useState("");
  const [subjId,setSubjId]=useState(subjects[0]?.id||"");
  const [material,setMaterial]=useState("");
  const [files,setFiles]=useState([]);
  const [busy,setBusy]=useState(false);
  const [busyMsg,setBusyMsg]=useState("");
  const [progress,setProgress]=useState(0);
  const [err,setErr]=useState("");
  const [pen,setPen]=useState(false);
  const [newSubj,setNewSubj]=useState("");
  const [isExam,setIsExam]=useState(false);
  const [isBook,setIsBook]=useState(false);
  const [studyType,setStudyType]=useState("auto");
  const append=(t)=>{if(t)setMaterial(p=>(p.trim()?p.trim()+"\n":"")+t);};

  // 새 과목 빠른 추가
  function quickAddSubj(){
    const n=newSubj.trim();if(!n)return;
    const color=SUBJ_COLORS[subjects.length%SUBJ_COLORS.length];
    const s={id:uid(),name:n,color};
    onSave([...subjects,s]);setSubjId(s.id);setNewSubj("");
  }

  async function save(){
    if(!CFG.key&&!CFG.geminiKey&&!COMPANY_MODE){
      setErr(tr("API 키가 없어. 설정에서 Claude 또는 Gemini 키를 먼저 입력해줘.","No API key. Add a Claude or Gemini key in Settings first."));return;
    }
    if(!material.trim()&&files.length===0){
      setErr(tr("자료를 입력하거나 파일을 첨부해줘.","Enter some material or attach a file."));return;
    }

    // 새 과목 칸에 이름만 적고 '+추가'를 안 눌렀어도 자동으로 만들어 배정 (입력한 이름 우선)
    let useSubjId=subjId;
    const pendingName=newSubj.trim();
    if(pendingName){
      const existing=subjects.find(s=>s.name===pendingName);
      if(existing){useSubjId=existing.id;}
      else{
        const ns={id:uid(),name:pendingName,color:SUBJ_COLORS[subjects.length%SUBJ_COLORS.length]};
        onSave([...subjects,ns]);useSubjId=ns.id;
      }
      setSubjId(useSubjId);setNewSubj("");
    }
    if(!useSubjId)useSubjId=subjects[0]?.id||"";

    setBusy(true);setErr("");setProgress(0);setBusyMsg(tr("준비 중…","Preparing…"));

    // 글로벌 가짜 진행률 타이머: 0→70 빠르게, 70→90 느리게, 90에서 멈춤
    let _prog=0;
    const fakeTimer=setInterval(()=>{
      if(_prog<70){_prog=Math.min(70,_prog+1.5);}
      else if(_prog<90){_prog=Math.min(90,_prog+0.3);}
      setProgress(Math.round(_prog));
    },60);

    const fail=(msg)=>{
      clearInterval(fakeTimer);
      setProgress(0);setBusy(false);setBusyMsg("");
      setErr(msg);
    };
    const done=()=>{
      clearInterval(fakeTimer);
      setProgress(100);
      setBusyMsg(tr("완료! 🎉 이제 공부 시작하자","Done! 🎉 Let's study"));
      setTimeout(()=>{setBusy(false);setBusyMsg("");onDone();},800);
    };

    // ── 책(교재) 모드: 긴 PDF 흡수 → 대/중/소단원 트리 ──
    if(isBook){
      clearInterval(fakeTimer);
      const pdf=files.find(f=>f.type==="application/pdf");
      if(!pdf){fail(tr("책 모드는 PDF가 필요해. PDF를 첨부해줘.","Book mode needs a PDF. Attach one."));return;}
      if(pdf.size>30*1024*1024){fail(tr("PDF가 너무 커. 30MB 이하만 지원해.","PDF too big. Max 30MB."));return;}
      try{
        setBusyMsg(tr("교재 페이지 나누는 중…","Splitting pages…"));
        const b64=await toB64(pdf);
        const bookConcepts=await ingestBook(b64,(d,t)=>{
          setProgress(Math.round(t?d/t*88:0));
          setBusyMsg(tr("교재 분석 중… ","Analyzing textbook… ")+"("+d+"/"+t+tr(" 묶음)"," parts)"));
        },CFG.lang);
        if(!bookConcepts.length){fail(tr("교재에서 목차를 못 뽑았어. 글자가 들어있는 PDF인지 확인해줘.","Couldn't extract a TOC — is it a text-based PDF?"));return;}
        const id=uid();
        const u1s=[...new Set(bookConcepts.map(c=>c.u1).filter(Boolean))];
        const deck={id,name:name.trim()||pdf.name.replace(/\.pdf$/i,"")||tr("교재","Textbook"),subjId:useSubjId,
          material:"",summary:tr("교재 목차: ","Textbook TOC: ")+u1s.join(" · "),createdAt:Date.now(),
          isBook:true,studyType:"explain",concepts:bookConcepts};
        setBusyMsg(tr("저장 공간 확인 중…","Checking storage…"));
        const need=byteSize(dk(id),deck),est=await estimateStorage();
        if(est.free<need*1.5){fail(tr("저장 공간이 부족해 (남은 ","Not enough storage (free ")+formatSize(est.free)+tr("). 오래된 자료를 삭제하고 다시 시도해줘.","). Delete old materials and retry."));return;}
        setBusyMsg(tr("저장 중…","Saving…"));
        if(!(await LS.setVerified(dk(id),deck))){LS.del(dk(id));fail(tr("저장 실패: 용량 부족이거나 저장이 거부됐어.","Save failed: out of space or blocked."));return;}
        const prevList=LS.get(DECKS_KEY)||[];
        if(!(await LS.setVerified(DECKS_KEY,[{id,name:deck.name,subjId:useSubjId,studyType:"explain"},...prevList]))){LS.del(dk(id));fail(tr("저장 실패: 저장 공간이 꽉 찼어.","Save failed: storage full."));return;}
        done();return;
      }catch(e){fail(tr("교재 분석 실패: ","Textbook analysis failed: ")+(e.message||e));return;}
    }

    // ── 파일 처리 ──
    const pdfResults=[];
    let imageText="";
    let fileErrMsg="";
    for(let i=0;i<files.length;i++){
      const f=files[i];
      const isPdf=f.type==="application/pdf";
      if(isPdf&&f.size>30*1024*1024){fail(tr("PDF가 너무 커. 30MB 이하 파일만 지원해.","PDF is too big. Max 30MB."));return;}
      try{
        setBusyMsg(tr("파일 읽는 중… (","Reading file… (")+f.name+")");
        const b64=await toB64(f);
        if(isPdf){
          setBusyMsg(tr("PDF 분석 중… ","Analyzing PDF… ")+f.name+tr(" (AI가 읽는 중, 1~2분 걸릴 수 있어)"," (AI reading, may take 1–2 min)"));
          const r=await processPdf(b64);
          if(r){pdfResults.push(r);}
          else{fileErrMsg+=f.name+tr(": PDF 분석 실패 (Claude 키 확인 필요). ",": PDF analysis failed (check Claude key). ");}
        }else{
          setBusyMsg(tr("이미지 읽는 중… (","Reading image… (")+f.name+")");
          const t=await transcribeFile(b64,f.type||"image/jpeg","note");
          imageText+=(t||"")+"\n";
        }
      }catch(e){
        fileErrMsg+=f.name+": "+e.message+". ";
        console.warn("파일 처리 실패",f.name,e);
      }
    }

    // ── 자료 합치기 ──
    const pdfSummaryText=pdfResults.map(r=>r.summary||"").filter(Boolean).join("\n\n");
    const fullMaterial=[material,imageText,pdfSummaryText].map(s=>s.trim()).filter(Boolean).join("\n").trim();
    const finalName=name.trim()||tr("새 자료","New material");

    if(!fullMaterial){
      fail(tr("자료 내용을 읽지 못했어.","Couldn't read the material.")+(fileErrMsg?tr(" 오류: "," Error: ")+fileErrMsg:"")+tr(" 텍스트로 직접 입력하거나 Claude API 키를 확인해줘."," Type it in directly or check your Claude API key."));return;
    }
    if(fileErrMsg)setErr(tr("⚠️ 일부 파일 오류: ","⚠️ Some files failed: ")+fileErrMsg+tr("나머지 자료로 계속 진행할게.","Continuing with the rest."));

    // ── 앱이 한국어인데 영어 자료면: 이 덱을 어느 언어로 공부할지 물어봄 ──
    let deckLang=CFG.lang;
    if(CFG.lang==="ko"&&detectLang(fullMaterial)==="en"){
      deckLang=confirm("이 자료는 영어로 되어 있네! 이 자료를 영어로 공부할래?\n\n[확인] = 영어로 (문제·해설·채점 영어)\n[취소] = 한국어로")?"en":"ko";
    }

    // ── 개념 추출 ──
    setBusyMsg(tr("핵심 개념 정리 중…","Pulling out key concepts…"));
    let concepts=pdfResults.flatMap(r=>Array.isArray(r.concepts)?r.concepts:[]);
    if(concepts.length<5){
      try{
        const r=await callAI(
          "너는 학습 자료 분석 전문가야. 자료가 무엇을 가르치려는지 핵심 주제와 목적을 먼저 파악해. 그 목적에 맞는 핵심 개념 8~15개를 짧은 명사구로 뽑아. 단순히 등장하는 단어가 아니라 이 자료의 학습 목표를 대표하는 개념이어야 해. JSON만: {\"concepts\":[\"...\"]}",
          "자료:\n\n"+fullMaterial.slice(0,12000),true,{maxTok:512,lang:deckLang});
        const extra=Array.isArray(r.concepts)?r.concepts:[];
        concepts=[...concepts,...extra.filter(c=>!concepts.includes(c))];
      }catch(e){
        fail(tr("개념 추출 실패: ","Concept extraction failed: ")+e.message+tr(" — API 키와 인터넷 연결을 확인해줘."," — check your API key and connection."));return;
      }
    }
    if(!concepts.length)concepts=[tr("전체 자료","Whole material")];

    // ── 학습 방식 결정 (auto면 AI 분류) ──
    let resolvedType=studyType;
    if(studyType==="auto"){
      resolvedType="explain";
      try{
        const r=await callAI(
          "너는 학습 자료를 분류하는 전문가야. 이 자료가 어떤 학습 방식에 더 적합한지 판단해.\n· quiz = 용어·정의·연도·분류·법조문·단어 등 '암기'가 핵심인 자료 (역사·생물·법학·어휘 등)\n· explain = 이해·증명·풀이·계산이 핵심인 자료 (수학·물리·경제모형 등)\nJSON만: {\"type\":\"quiz\" 또는 \"explain\"}",
          "개념: "+concepts.slice(0,15).join(", ")+"\n\n자료:\n"+fullMaterial.slice(0,3000),
          true,{maxTok:16,model:CFG.qmodel,lang:deckLang});
        if(r&&r.type==="quiz")resolvedType="quiz";
      }catch(e){console.warn("학습 방식 분류 실패 (explain으로):",e.message);}
    }

    // ── 기출/족보 문제 추출 ──
    let examQuestions=[];
    if(isExam){
      setBusyMsg(tr("기출문제 뽑아내는 중…","Extracting exam questions…"));
      examQuestions=(await extractExamQuestions(fullMaterial,concepts)).slice(0,25);
    }

    // ── 요약 ──
    let summary=pdfSummaryText;
    if(!summary&&fullMaterial.length>2000){
      setBusyMsg(tr("거의 다 됐어… 마무리 중","Almost done… wrapping up"));
      try{
        summary=await callAI(
          "너는 학습 자료 요약 전문가야. 핵심 개념·공식·예시를 빠짐없이 압축해. 수식·기호 원문 그대로. 텍스트만 출력.",
          "자료:\n"+fullMaterial.slice(0,20000),false,{maxTok:900});
      }catch(e){console.warn("요약 생성 실패 (건너뜀):",e.message);}
    }

    // ── 저장 ──
    const id=uid();
    const materialToStore=summary?fullMaterial.slice(0,5000):fullMaterial.slice(0,12000);
    const deck={id,name:finalName,subjId:useSubjId,material:materialToStore,summary,createdAt:Date.now(),
      ...(deckLang!==CFG.lang?{lang:deckLang}:{}),
      isExam:isExam&&examQuestions.length>0,examQuestions,studyType:resolvedType,
      concepts:concepts.map(nm=>({id:uid(),name:String(nm).slice(0,80),box:1,dueAt:0,reps:0,lapses:0}))};

    // ── 저장 전 실제 용량 검증 (브라우저 할당량 기준) ──
    setBusyMsg(tr("저장 공간 확인 중…","Checking storage…"));
    const need=byteSize(dk(id),deck);
    const est=await estimateStorage();
    if(est.free < need*1.5){   // 새 자료 + 색인·메타 여유까지 1.5배 확보 안 되면 거부
      fail(tr("저장 공간이 부족해 (남은 공간 ","Not enough storage (free ")+formatSize(est.free)+tr(", 필요 ~",", need ~")+formatSize(need)+tr("). 설정에서 오래된 자료를 삭제하고 다시 시도해줘.","). Delete old materials in Settings and retry."));return;
    }
    // ── 검증된 쓰기 (실제 영속 확인, 실패 시 롤백) ──
    setBusyMsg(tr("저장 중…","Saving…"));
    if(!(await LS.setVerified(dk(id),deck))){
      LS.del(dk(id));
      fail(tr("저장 실패: 용량 부족이거나 브라우저 저장이 거부됐어. 오래된 자료를 삭제하고 다시 시도해줘.","Save failed: out of space or storage was blocked. Delete old materials and retry."));return;
    }
    const prevList=LS.get(DECKS_KEY)||[];
    if(!(await LS.setVerified(DECKS_KEY,[{id,name:deck.name,subjId:useSubjId,studyType:resolvedType},...prevList]))){
      LS.del(dk(id));   // 본체 롤백 — 목록에 안 잡히는 유령 덱 방지
      fail(tr("저장 실패: 저장 공간이 꽉 찼어. 오래된 자료를 삭제해줘.","Save failed: storage is full. Delete old materials."));return;
    }
    done();
  }

  const selSubj=subjects.find(s=>s.id===subjId);

  return(
    <section className="card panel">
      <div className="eyebrow">{tr("새 자료 추가","Add material")}</div>

      {/* 과목 선택 */}
      <div>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("과목","Folder")}</div>
        <div className="subj-picker">
          {subjects.map(s=>(
            <button key={s.id} className={"subj-pill"+(subjId===s.id?" on":"")}
              style={subjId===s.id?{background:s.color}:{color:s.color,borderColor:s.color+"44"}}
              onClick={()=>setSubjId(s.id)}>{s.name}</button>
          ))}
        </div>
        <div className="subj-new" style={{marginTop:8}}>
          <input placeholder={tr("새 과목 이름","New folder name")} value={newSubj} onChange={e=>setNewSubj(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&quickAddSubj()}/>
          <button className="btn gho xs" onClick={quickAddSubj}>{tr("+ 추가","+ Add")}</button>
        </div>
      </div>

      {/* 제목 */}
      <input className="field" placeholder={tr("제목 — 예: 선형대수 5장 (고유값)","Title — e.g. Linear Algebra Ch.5 (Eigenvalues)")} value={name}
        onChange={e=>setName(e.target.value)} disabled={busy}/>

      {/* 기출/족보 토글 */}
      <label style={{display:"flex",alignItems:"center",gap:11,padding:"12px 15px",cursor:busy?"default":"pointer",
        border:"1.5px solid "+(isExam?"var(--pri)":"var(--line)"),borderRadius:14,
        background:isExam?"var(--pri-s)":"#FBFAFF",transition:"all .2s"}}>
        <input type="checkbox" checked={isExam} disabled={busy} onChange={e=>setIsExam(e.target.checked)}
          style={{width:18,height:18,accentColor:"var(--pri)",flexShrink:0}}/>
        <div style={{minWidth:0}}>
          <div style={{fontSize:13.5,fontWeight:700,color:isExam?"var(--pri-d)":"var(--ink)"}}>{tr("📑 기출문제·족보예요","📑 These are past exam questions")}</div>
          <div style={{fontSize:11.5,color:"var(--sub)",marginTop:2,lineHeight:1.5}}>{tr("실제 문제를 뽑아서 그대로 풀고, 변형·심화문제까지 자동으로 만들어줘","I'll pull the real questions, drill them, and auto-make variants & harder ones")}</div>
        </div>
      </label>

      {/* 책(교재) 모드 토글 */}
      <label style={{display:"flex",alignItems:"center",gap:11,padding:"12px 15px",cursor:busy?"default":"pointer",
        border:"1.5px solid "+(isBook?"var(--pri)":"var(--line)"),borderRadius:14,

          <div style={{fontSize:11.5,color:"var(--sub)",marginTop:2,lineHeight:1.5}}>{tr("긴 PDF를 페이지별로 나눠 읽고 대단원·중단원·소단원 목차로 정리해 개념마다 1:1 과외해줘 (분석에 몇 분 걸려)","I split a long PDF, build a chapter→section→topic outline, and tutor each topic 1:1 (takes a few min)")}</div>
        </div>
      </label>

      {/* 학습 방식 선택 */}
      <div>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("어떻게 공부할까?","How do you want to study this?")}</div>
        <div style={{display:"flex",gap:8}}>

/* ── 이해 깊이 게이지 ── */
function DepthGauge({depth,lang}){
  const LEVELS=["암기","이해","설명가능","응용가능"];
  const LABELS=lang==="en"?["Recall","Understand","Explain","Apply"]:LEVELS;
  const idx=LEVELS.findIndex(l=>depth&&depth.startsWith(l));
  if(idx<0||!depth)return null;
  return(
    <div style={{padding:"8px 12px",background:"var(--bg)",border:"1px solid var(--line)",borderRadius:10}}>
      <div style={{fontSize:10,fontWeight:700,color:"var(--sub)",letterSpacing:".5px",marginBottom:6}}>{lang==="en"?"Understanding depth":"이해 깊이"}</div>
      <div style={{display:"flex",gap:4}}>
        {LEVELS.map((l,i)=>(
          <div key={l} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{width:"100%",height:7,borderRadius:4,
              background:i<=idx?(i===0?"#A0A0D0":i===1?"#7B83D6":i===2?"#6C5CE7":"#4A3FC7"):"#E0E0F0"}}/>
            <span style={{fontSize:9.5,lineHeight:1.3,textAlign:"center",
              color:i===idx?"#6C5CE7":"var(--sub)",fontWeight:i===idx?700:400}}>{LABELS[i]}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    .sort((a,b)=>(a.box||1)-(b.box||1)||(b.lapses||0)-(a.lapses||0));
