<style>

.btn.gho:hover:not(:disabled){border-color:#C8C2E8}
.btn.gho.on{border-color:var(--pri);color:var(--pri);background:var(--pri-s)}
.btn.ico{padding:9px 11px;font-size:16px;line-height:1}
.btn.sm{padding:8px 13px;font-size:13px;border-radius:11px}
.btn.xs{padding:6px 10px;font-size:12px;border-radius:9px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 저장소: IndexedDB(대용량) + 메모리 캐시, 실패 시 localStorage 폴백 ── */
const DB_NAME="nigakyo", DB_STORE="kv";
let _idb=null;   // IndexedDB 핸들 (null이면 localStorage 폴백)
let _cache={};   // ng:* 전체 메모리 미러 (동기 읽기용)

function _idbOpen(){
  return new Promise((res,rej)=>{
    let req;try{req=indexedDB.open(DB_NAME,1);}catch(e){return rej(e);}
    req.onupgradeneeded=()=>{try{req.result.createObjectStore(DB_STORE);}catch(_){}};
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
function _idbAll(db){
  return new Promise((res)=>{
    const out={};
    try{
      const cur=db.transaction(DB_STORE,"readonly").objectStore(DB_STORE).openCursor();
      cur.onsuccess=()=>{const c=cur.result;if(c){out[c.key]=c.value;c.continue();}else res(out);};
      cur.onerror=()=>res(out);
    }catch(e){res(out);}
  });
}
function _idbPut(k,v){try{_idb.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).put(v,k);}catch(e){console.warn("[idb put]",e);}}
function _idbDel(k){try{_idb.transaction(DB_STORE,"readwrite").objectStore(DB_STORE).delete(k);}catch(e){console.warn("[idb del]",e);}}

async function initStorage(){
  try{
    _idb=await _idbOpen();
    _cache=await _idbAll(_idb);
    // 첫 실행 마이그레이션: IndexedDB가 비어있고 localStorage에 기존 데이터가 있으면 복사
    // (localStorage 원본은 지우지 않고 백업으로 보존)
    if(Object.keys(_cache).length===0){
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith("ng:")){
          let v;try{v=JSON.parse(localStorage.getItem(k));}catch{v=localStorage.getItem(k);}
          _cache[k]=v;_idbPut(k,v);
        }
      }
    }
  }catch(e){
    console.warn("[storage] IndexedDB 사용 불가 — localStorage 폴백",e);
    _idb=null;_cache={};
    try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("ng:")){try{_cache[k]=JSON.parse(localStorage.getItem(k));}catch{_cache[k]=localStorage.getItem(k);}}}}catch(_){}
  }
}

const LS = {
  get(k){return Object.prototype.hasOwnProperty.call(_cache,k)?_cache[k]:null;},
  set(k,v){
    _cache[k]=v;
    try{
      if(_idb)_idbPut(k,v);
      else localStorage.setItem(k,JSON.stringify(v));
      return true;
    }catch(e){console.error("[LS] 저장 실패:",k,e);return false;}
  },
  del(k){delete _cache[k];try{if(_idb)_idbDel(k);else localStorage.removeItem(k);}catch{}},
};
function getStorageSize(){
  let t=0;
  try{for(const k in _cache){if(k.startsWith("ng:"))t+=(k.length+JSON.stringify(_cache[k]).length)*2;}}
  catch{}
  return t;
}
const STORAGE_CAP=()=>_idb?200*1024*1024:4.5*1024*1024;
function formatSize(b){
  if(b<1024)return b+"B";
  if(b<1048576)return(b/1024).toFixed(1)+"KB";
  return(b/1048576).toFixed(2)+"MB";
}
const DECKS_KEY="ng:decks";

// opts: { cache:bool, maxTok:number, model:string }
async function callGemini(system,userContent,wantJson,opts={},signal){
  if(!CFG.geminiKey)throw new Error("Gemini API 키가 없어 — 설정에서 추가해줘");
  const model=(opts.model||"gemini-2.0-flash");
  const maxTok=opts.maxTok||(wantJson?2048:1024);
  const parts=[];
  if(typeof userContent==="string"){parts.push({text:userContent});}
  else{for(const b of userContent){
    if(b.type==="text")parts.push({text:b.text});
    else if(b.type==="image")parts.push({inline_data:{mime_type:b.source.media_type,data:b.source.data}});
    else if(b.type==="document")parts.push({inline_data:{mime_type:"application/pdf",data:b.source.data}});
  }}
  const body={
    system_instruction:{parts:[{text:system}]},
    contents:[{role:"user",parts}],
    generationConfig:{maxOutputTokens:maxTok,temperature:0.3},
  };
  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${CFG.geminiKey}`,
    {method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body),signal}
  );
  if(!res.ok){let m="Gemini "+res.status;try{const j=await res.json();m=j.error?.message||m}catch{}throw new Error(m)}
  const data=await res.json();
  const text=(data.candidates?.[0]?.content?.parts||[]).map(p=>p.text||"").join("").trim();
  if(!wantJson)return text;
  let clean=text.replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
  if(s===-1||e===-1||e<=s)throw new Error("JSON 응답 없음");
  return JSON.parse(fixJson(clean.slice(s,e+1)));
}
function callAI(system,userContent,wantJson,opts={},signal){
  if(opts.lang==="en")system=system+"\n\n[OUTPUT LANGUAGE = ENGLISH] Write the QUESTION and all human-readable text (feedback, GOT_IT, GAP, NEXT, ESSENCE, hints, explanations, model ANSWER) in natural English. BUT keep the structured field VALUES exactly as the Korean tokens specified in the format above — QTYPE stays recall/understand/apply, and GAP_TYPE/DEPTH/VERDICT must remain the exact Korean option words (개념누락/이해얕음/핵심비껴감/표현부족/갭없음, 암기 수준/이해 수준/설명가능 수준/응용가능 수준, correct/partial/incorrect). Do not translate those tokens.";
  const m=opts.model||CFG.model;
  if(m.startsWith("gemini"))return callGemini(system,userContent,wantJson,opts,signal);
  return callClaude(system,userContent,wantJson,opts,signal);
}
function fixJson(str){
  let out="",inStr=false,i=0;
  while(i<str.length){
    const c=str[i];
    if(!inStr){out+=c;if(c==='"')inStr=true;i++;}
    else if(c==='\\'){
      const n=str[i+1];
      if(n==='"'||n==='\\'||n==='/'){out+=c+n;i+=2;}
      else if(n==='u'&&/[0-9a-fA-F]{4}/.test(str.slice(i+2,i+6))){out+=str.slice(i,i+6);i+=6;}
      else{out+='\\\\';i++;}
    }
    else if(c==='"'){out+=c;inStr=false;i++;}
    else if(c==='\n'){out+='\\n';i++;}
    else if(c==='\r'){out+='\\r';i++;}
    else{out+=c;i++;}
  }
  return out;
}
// Parse gap-analysis grading response
function parseGrading(txt){
  const KEYS=['ESSENCE','GOT_IT','GAP','GAP_TYPE','DEPTH','NEXT','VERDICT','ANSWER'];
  const vals={};
  for(let i=0;i<KEYS.length;i++){
    const key=KEYS[i],next=KEYS[i+1];
    const sm=new RegExp('(?:^|\\n)'+key+'\\s*:[\\t ]*','i').exec(txt);
    if(!sm)continue;
    const from=sm.index+sm[0].length;
    let to=txt.length;
    if(next){const em=new RegExp('\\n'+next+'\\s*:','i').exec(txt.slice(from));if(em)to=from+em.index;}
    vals[key]=txt.slice(from,to).trim();
  }
  const v=(vals.VERDICT||'').toLowerCase().replace(/[^a-z]/g,'');
  const DEPTH_LEVELS=['암기 수준','이해 수준','설명가능 수준','응용가능 수준'];
  const rawDepth=vals.DEPTH||'';
  const depth=DEPTH_LEVELS.find(l=>rawDepth.includes(l.split(' ')[0]))||rawDepth;
  const GAP_TYPES=['개념누락','이해얕음','핵심비껴감','표현부족','갭없음'];
  const rawGapType=vals.GAP_TYPE||'';
  const gap_type=GAP_TYPES.find(t=>rawGapType.includes(t))||rawGapType;
  return{
    verdict:['correct','partial','incorrect'].includes(v)?v:'partial',
    essence:vals.ESSENCE||'',
    got_it:vals.GOT_IT||'',
    gap:vals.GAP||'',
    gap_type,
    depth,
    next:vals.NEXT||'',
    model_answer:vals.ANSWER||'',
    feedback:vals.GOT_IT||'',
  };
}
// Parse derivation plan
function parseDerivePlan(txt){
  const totalSteps=Math.max(2,Math.min(8,parseInt((txt.match(/STEPS\s*:\s*(\d+)/i)||[])[1])||4));
  const start=((txt.match(/START\s*:\s*([^\n]+)/i)||[])[1]||'첫 단계를 써봐.').trim();
  const hints=[];
  for(let i=1;i<=totalSteps;i++){
    hints.push(((txt.match(new RegExp('HINT'+i+'\\s*:\\s*([^\\n]+)','i'))||[])[1]||'').trim());
  }
  return{totalSteps,startHint:start,hints};
}
// Parse derivation step check
function parseDeriveCheck(txt){
  function field(key){
    const sm=new RegExp('(?:^|\\n)'+key+'\\s*:[\\t ]*','i').exec(txt);
    if(!sm)return'';
    const from=sm.index+sm[0].length;
    const em=/\n[A-Z]+\s*:/.exec(txt.slice(from));
    return txt.slice(from,em?from+em.index:txt.length).trim();
  }
  return{correct:/yes/i.test(field('CORRECT')),done:/yes/i.test(field('DONE')),
    feedback:field('FEEDBACK'),nextPrompt:field('NEXT')||'다음 단계를 써봐.'};
}
// Parse question response in plain-text structured format
function parseOcrCheck(txt){
  const tm=/TEXT\s*:\s*([\s\S]*?)(?=\nUNCLEAR\s*:|$)/i.exec(txt);
  const um=/UNCLEAR\s*:\s*([\s\S]+)/i.exec(txt);
  const text=(tm?.[1]||"").trim();
  const us=(um?.[1]||"").trim();
  const unclear=(!us||/없음/i.test(us))?[]:
    us.split("|").map(s=>{const p=s.trim().split(",").map(Number);return p.length===4&&p.every(n=>!isNaN(n))?{x:p[0],y:p[1],w:p[2],h:p[3]}:null;}).filter(Boolean);
  return{text,unclear};
}
function parseQuestion(txt){
  const KEYS=['QTYPE','QUESTION','POINTS'];
  const vals={};
  for(let i=0;i<KEYS.length;i++){
    const key=KEYS[i],next=KEYS[i+1];
    const sm=new RegExp('(?:^|\\n)'+key+'\\s*:[\\t ]*','i').exec(txt);
    if(!sm)continue;
    const from=sm.index+sm[0].length;
    let to=txt.length;
    if(next){const em=new RegExp('\\n'+next+'\\s*:','i').exec(txt.slice(from));if(em)to=from+em.index;}
    vals[key]=txt.slice(from,to).trim();
  }
  const rawQt=(vals.QTYPE||'').toLowerCase();
  const qtype=['recall','understand','apply'].find(t=>rawQt.includes(t))||'understand';
  return{
    qtype,
    question:vals.QUESTION||'',
    key_points:(vals.POINTS||'').split('|').map(s=>s.trim()).filter(Boolean),
  };
}
async function callClaude(system,userContent,wantJson,opts={},signal){
  if(!CFG.key)throw new Error("NO_KEY");
  const maxTok=opts.maxTok||(wantJson?2048:1024);
  const hdrs={"content-type":"application/json","x-api-key":CFG.key,
    "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
  if(opts.cache)hdrs["anthropic-beta"]="prompt-caching-2024-07-31";
  const sysPay=opts.cache
    ?[{type:"text",text:system,cache_control:{type:"ephemeral"}}]
    :system;
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:hdrs,signal,
    body:JSON.stringify({model:opts.model||CFG.model,max_tokens:maxTok,system:sysPay,
      messages:[{role:"user",content:userContent}]}),
  });
  if(!res.ok){let m="API "+res.status;try{const j=await res.json();if(j.error?.message)m=j.error.message}catch{}throw new Error(m)}
  const data=await res.json();
  const text=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
  if(!wantJson)return text;
  let clean=text.replace(/```json\s*/gi,"").replace(/```/g,"").trim();
  const s=clean.indexOf("{"),e=clean.lastIndexOf("}");
  if(s===-1||e===-1||e<=s)throw new Error("JSON 응답 없음 — 다시 시도해봐");
  return JSON.parse(fixJson(clean.slice(s,e+1)));
}

let _uidSeq=0;
const uid=()=>Date.now().toString(36)+(_uidSeq++).toString(36).padStart(3,'0')+Math.random().toString(36).slice(2,5);
const DAY=864e5;
const INTERVALS=[0,0,1,2,4,7];

function schedule(c,verdict){
  let box=c.box||1;
  if(verdict==="correct")box=Math.min(5,box+1);
  else if(verdict==="incorrect")box=1;
  const days=INTERVALS[box]??1;
  return{...c,box,dueAt:Date.now()+days*DAY,reps:(c.reps||0)+1,
    lapses:(c.lapses||0)+(verdict==="incorrect"?1:0),lastResult:verdict,lastSeen:Date.now()};
}
function deckSummary(d){
  const cs=d.concepts||[],now=Date.now();
  return{total:cs.length,mastered:cs.filter(c=>(c.box||1)>=4).length,
    due:cs.filter(c=>(c.dueAt||0)<=now).length,weak:cs.filter(c=>(c.box||1)<=2).length};
}
function pickConcept(d,avoidId){
  const cs=(d.concepts||[]).slice();if(!cs.length)return null;
  const now=Date.now();
  let pool=cs.filter(c=>(c.dueAt||0)<=now);
  if(!pool.length)pool=cs;
  pool.sort((a,b)=>(a.box||1)-(b.box||1)||(a.dueAt||0)-(b.dueAt||0));
  if(pool.length>1&&pool[0].id===avoidId){const alt=pool.find(c=>c.id!==avoidId);if(alt)return alt}
  return pool[0];
}

function App(){

  const refresh=()=>setDecks(LS.get(DECKS_KEY)||[]);

  // 구글 로그인 상태 구독
  useEffect(()=>{
    if(!_auth)return;
    return _auth.onAuthStateChanged(u=>{
      setUser(u);
      if(u){
        const stored=LS.get(nickKey(u.uid));
        const n=stored||u.displayName||(u.email?u.email.split("@")[0]:tr("학습자","Learner"));
        if(!stored)LS.set(nickKey(u.uid),n);
        setNick(n);
      }else setNick("");
    });
  },[]);

  async function login(){
    if(!_auth){alert(tr("로그인 기능을 쓸 수 없어. 인터넷 연결이나 설정을 확인해줘.","Sign-in isn't available. Check your connection or settings."));return;}
    try{
      await _auth.signInWithPopup(new window.firebase.auth.GoogleAuthProvider());
    }catch(e){
      if(e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request")return;
      alert(tr("로그인 실패: ","Sign-in failed: ")+(e.message||e.code));
    }
  }
  async function logout(){try{await _auth.signOut();}catch(e){}setShowProfile(false);}
  function saveNick(n){const v=(n||"").trim();if(!v||!user)return;setNick(v);LS.set(nickKey(user.uid),v);}

  function openStudy(id){const d=LS.get(dk(id));if(d){setActiveDeck(d);setView("study");}}
  function openNotes(id){const d=LS.get(dk(id));if(d){setNoteDeck(d);setView("notes");}}
  function studyWeak(deck){
    const fresh=LS.get(dk(deck.id))||deck;
    const weakConcepts=(fresh.concepts||[]).filter(c=>(c.box||1)<=3||c.lapses>0);
    if(!weakConcepts.length){alert(tr("아직 약점 개념이 없어! 전체 공부부터 해봐 💪","No weak concepts yet! Study the full set first 💪"));return;}
    setActiveDeck({...fresh,concepts:weakConcepts});
    setView("study");
  }

  function saveSubjects(s){setSubjects(s);LS.set(SUBJS_KEY,s);}

  const filteredDecks=filterSubj==="all"?decks:decks.filter(d=>d.subjId===filterSubj);

  return(

        </div>
        <div className="hd-r">
          {view!=="home"&&CFG.key&&<button className="btn gho sm" onClick={()=>{refresh();setView("home");}}>{tr("← 목록","← Back")}</button>}
          {_auth&&(user
            ?<button className="btn gho sm" onClick={()=>setShowProfile(true)} title={tr("내 프로필","My profile")}>
                {user.photoURL&&<img src={user.photoURL} alt="" style={{width:18,height:18,borderRadius:"50%",verticalAlign:"middle",marginRight:6}}/>}
                {nick||tr("내 프로필","My profile")}
              </button>
            :<button className="btn gho sm" onClick={login}>{tr("🔑 로그인","🔑 Sign in")}</button>
          )}
          <button className="btn gho sm" onClick={()=>setView("settings")}>{tr("⚙️ 설정","⚙️ Settings")}</button>
        </div>
      </div>

      {showProfile&&user&&(
        <div onClick={()=>setShowProfile(false)} style={{position:"fixed",inset:0,background:"rgba(34,28,57,.42)",zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{maxWidth:340,width:"100%",padding:22,display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {user.photoURL&&<img src={user.photoURL} alt="" style={{width:46,height:46,borderRadius:"50%"}}/>}
              <div style={{minWidth:0}}>
                <div style={{fontFamily:"'Jua',sans-serif",fontSize:16,color:"var(--ink)"}}>{nick}</div>
                <div style={{fontSize:12,color:"var(--sub)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              </div>
            </div>
            <div className="selectrow">
              <label>{tr("닉네임","Nickname")}</label>
              <input className="field" value={nick} maxLength={20} onChange={e=>setNick(e.target.value)} onBlur={e=>saveNick(e.target.value)}/>
            </div>

              <button className="btn pri" onClick={()=>{saveNick(nick);setShowProfile(false);}}>{tr("저장","Save")}</button>
              <button className="btn gho" onClick={logout}>{tr("로그아웃","Sign out")}</button>
            </div>

        </div>

      {view==="onboard"&&<Onboard onDone={()=>setView("home")}/>}
      {view==="settings"&&<Settings onDone={()=>setView(CFG.key?"home":"onboard")}/>}
      {view==="home"&&(

      <div className="footer">{tr("키와 자료는 이 기기에만 저장","Keys & data stay on this device only")} · {MODELS.find(m=>m.id===CFG.model)?.label.split(" ·")[0]||"Claude"}</div>
    </>
  );
}

/* ── 과목 탭 바 ── */
function SubjectTabs({subjects,active,onChange,onSave}){
  const [adding,setAdding]=useState(false);
  const [newName,setNewName]=useState("");
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState("");

  function addSubject(){
    const name=newName.trim();if(!name)return;
    const color=SUBJ_COLORS[subjects.length%SUBJ_COLORS.length];
    const s=[...subjects,{id:uid(),name,color}];
    onSave(s);setNewName("");setAdding(false);
  }
  function startEdit(s,e){
    e.stopPropagation();setEditId(s.id);setEditName(s.name);
  }
  function saveEdit(){
    const n=editName.trim();if(!n)return;
    onSave(subjects.map(s=>s.id===editId?{...s,name:n}:s));setEditId(null);
  }
  function delSubject(s,e){
    e.stopPropagation();
    if(!confirm(tr('"'+s.name+'" 과목 삭제할까? 덱 자료는 남아있어.','Delete folder "'+s.name+'"? Your decks stay.')))return;
    onSave(subjects.filter(x=>x.id!==s.id));
    if(active===s.id)onChange("all");
  }
  const btnStyle={background:"none",border:"none",cursor:"pointer",padding:"0 2px",opacity:.55,color:"inherit",fontSize:12,lineHeight:1};

  return(
    <div style={{marginBottom:20}}>
      <div className="sub-tabs">
        <button className={"sub-tab"+(active==="all"?" on":"")} onClick={()=>onChange("all")}>{tr("전체","All")}</button>
        {subjects.map(s=>
          editId===s.id?(
            <div key={s.id} className="subj-new" style={{display:"inline-flex",margin:0}}>
              <input value={editName} onChange={e=>setEditName(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter")saveEdit();if(e.key==="Escape")setEditId(null);}}
                autoFocus style={{width:100}}/>
              <button className="btn pri xs" onClick={saveEdit}>{tr("저장","Save")}</button>
              <button className="btn gho xs" onClick={()=>setEditId(null)}>{tr("취소","Cancel")}</button>
            </div>
          ):(
            <div key={s.id} className={"sub-tab"+(active===s.id?" on":"")}
              style={{display:"inline-flex",alignItems:"center",gap:3,paddingRight:6,cursor:"pointer"}}
              onClick={()=>onChange(s.id)}>
              <span className="sub-dot" style={{background:s.color}}/>
              <span>{s.name}</span>
              <button style={btnStyle} onClick={e=>startEdit(s,e)} title={tr("수정","Edit")}>✎</button>
              <button style={{...btnStyle,fontSize:14}} onClick={e=>delSubject(s,e)} title={tr("삭제","Delete")}>×</button>
            </div>
          )
        )}
        <button className="btn gho xs" onClick={()=>setAdding(v=>!v)}>{tr("+ 과목","+ Folder")}</button>
      </div>
      {adding&&(
        <div className="subj-new">
          <input placeholder={tr("과목 이름 (예: 통계학)","Folder name (e.g. Statistics)")} value={newName}
            onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter")addSubject();if(e.key==="Escape")setAdding(false);}}
            autoFocus/>
          <button className="btn pri xs" onClick={addSubject}>{tr("추가","Add")}</button>
          <button className="btn gho xs" onClick={()=>setAdding(false)}>{tr("취소","Cancel")}</button>
        </div>
      )}
    </div>
  );
}

function Settings({onDone}){
  const [storSize,setStorSize]=useState(()=>getStorageSize());
  const MAX=STORAGE_CAP();
  const pct=Math.min(100,Math.round(storSize/MAX*100));
  const barColor=pct>=90?"var(--rose)":pct>=70?"var(--gold)":"var(--mint)";
  const fileRef=useRef(null);
  const [backupMsg,setBackupMsg]=useState("");
  function doExport(){try{exportBackup();setBackupMsg(tr("✓ 백업 파일을 내려받았어. 안전한 곳에 보관해줘!","✓ Backup file downloaded. Keep it somewhere safe!"));}catch(e){setBackupMsg(tr("내보내기 실패: ","Export failed: ")+e.message);}}
  async function doImport(e){
    const f=e.target.files&&e.target.files[0];if(!f)return;
    if(!confirm(tr("백업을 불러오면 같은 이름의 현재 자료에 덮어써져.\n계속할까?","Importing will overwrite current data with the same names.\nContinue?"))){e.target.value="";return;}
    try{const n=await importBackup(f);setBackupMsg(tr("✓ 복원 완료 ("+n+"개 항목). 새로고침할게…","✓ Restored ("+n+" items). Reloading…"));setTimeout(()=>location.reload(),900);}
    catch(err){setBackupMsg(tr("복원 실패: ","Restore failed: ")+err.message);}
    e.target.value="";
  }
  return(
    <div className="card panel">
      <div className="eyebrow">{tr("설정","Settings")}</div>
      <div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12.5,color:"var(--sub)",marginBottom:6}}>
          <span>{tr("저장 공간 ","Storage ")}{_idb?tr("(대용량 모드)","(large mode)"):tr("(기본 모드)","(basic mode)")}</span>
          <span style={{fontWeight:700,color:pct>=70?barColor:"var(--sub)"}}>{formatSize(storSize)} / {formatSize(MAX)} ({pct}%)</span>
        </div>
        <div className="bar"><i style={{width:pct+"%",background:barColor}}/></div>
        {pct>=80&&<p className="err" style={{fontSize:12.5,marginTop:8}}>{tr("⚠️ 저장 공간이 부족해. 오래된 자료를 삭제해줘.","⚠️ Storage is almost full. Delete old materials.")}</p>}
      </div>
      <div style={{borderTop:"1px solid var(--line)",paddingTop:14}}>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("💾 데이터 백업 ","💾 Data backup ")}<span style={{fontSize:11}}>{tr("(자료·학습기록을 파일로 저장 / 복원. API 키는 제외)","(save/restore data & progress to a file. API keys excluded)")}</span></div>
        <div className="row">
          <button className="btn gho sm" onClick={doExport}>{tr("⬇️ 내보내기","⬇️ Export")}</button>
          <button className="btn gho sm" onClick={()=>fileRef.current&&fileRef.current.click()}>{tr("⬆️ 불러오기","⬆️ Import")}</button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={doImport}/>
        </div>
        {backupMsg&&<p style={{fontSize:12.5,marginTop:8,color:backupMsg.startsWith("✓")?"var(--mint)":"var(--rose)"}}>{backupMsg}</p>}
      </div>
      <KeyForm onSaved={onDone} cta={tr("저장","Save")} showCancel onCancel={onDone}/>
    </div>
  );
}

/* ── 파일 드롭존 ── */
function FileDropZone({files,onChange}){
  const [over,setOver]=useState(false);
  const ref=useRef(null);

  function handleFiles(newFiles){
    const arr=Array.from(newFiles).filter(f=>{
      const ok=f.type.startsWith("image/")||f.type==="application/pdf";
      if(!ok)alert(f.name+tr(": 이미지(jpg/png) 또는 PDF만 가능해.",": only images (jpg/png) or PDF."));
      return ok;
    });
    onChange([...files,...arr]);
  }
  const fmtSize=(n)=>n<1024?""+n+"B":n<1048576?(n/1024).toFixed(1)+"KB":(n/1048576).toFixed(1)+"MB";
  const fileIcon=(f)=>f.type==="application/pdf"?"📄":f.type.startsWith("image/")?"🖼️":"📎";

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div className={"dropzone"+(over?" over":"")}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);handleFiles(e.dataTransfer.files)}}
        onClick={()=>ref.current&&ref.current.click()}>
        <input ref={ref} type="file" accept="image/*,.pdf" multiple
          onChange={e=>handleFiles(e.target.files)} style={{display:"none"}}/>
        <div className="dz-icon">📎</div>
        <div className="dz-text"><b>{tr("파일 선택 또는 여기에 끌어다 놓기","Choose files or drag them here")}</b><br/>{tr("이미지(JPG·PNG) · PDF 지원","Images (JPG·PNG) · PDF")}</div>
      </div>
      {files.length>0&&(
        <div className="file-list">
          {files.map((f,i)=>(
            <div key={i} className="file-item">
              <span className="fi-icon">{fileIcon(f)}</span>
              <span className="fi-name">{f.name}</span>
              <span className="fi-size">{fmtSize(f.size)}</span>
              <button className="fi-del" onClick={()=>onChange(files.filter((_,j)=>j!==i))}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── 해설 오버레이 캔버스 (투명, 형광펜·초록펜이 텍스트 위에 직접 표시) ── */
const AnnotPad=React.forwardRef(function AnnotPad({disabled,tool},fwdRef){
  const cvs=useRef(null);
  const strokes=useRef([]);
  const drawing=useRef(false);
  React.useImperativeHandle(fwdRef,()=>({
    getImageBase64:()=>cvs.current?.toDataURL("image/png").split(",")[1]||null,
    hasStrokes:()=>strokes.current.length>0,
    clear:()=>{strokes.current=[];redraw();},
  }));
  function syncSize(){
    const c=cvs.current;if(!c)return;
    const p=c.parentElement;if(!p)return;
    const rect=p.getBoundingClientRect();
    const w=Math.round(rect.width),h=Math.round(rect.height);
    if(!w||!h)return;
    const dpr=window.devicePixelRatio||1;
    c.style.width=w+"px";c.style.height=h+"px";
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    const ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
    redraw();
  }
  function redraw(){
    const c=cvs.current;if(!c)return;
    const ctx=c.getContext("2d"),dpr=window.devicePixelRatio||1,w=c.width/dpr,h=c.height/dpr;
    ctx.clearRect(0,0,w,h);
    strokes.current.forEach(({pts,col,sz})=>{
      if(pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=col;ctx.lineWidth=sz;
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
      ctx.stroke();
    });
  }
  React.useLayoutEffect(()=>{
    syncSize();
    const parent=cvs.current?.parentElement;if(!parent)return;
    const ro=new ResizeObserver(syncSize);ro.observe(parent);
    window.addEventListener("resize",syncSize);
    return()=>{ro.disconnect();window.removeEventListener("resize",syncSize);};
  },[]);
  useEffect(()=>{
    const c=cvs.current;if(!c)return;
    const prev=(e)=>{if(e.touches[0]?.touchType==="stylus"||e.touches[0]?.radiusX===0)e.preventDefault();};
    c.addEventListener("touchstart",prev,{passive:false});
    c.addEventListener("touchmove",prev,{passive:false});
    return()=>{c.removeEventListener("touchstart",prev);c.removeEventListener("touchmove",prev);};
  },[]);
  const pt=(e)=>{const r=cvs.current.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
  function eraseAt(x,y){
    const R=22*22,prev=strokes.current.length;
    strokes.current=strokes.current.filter(({pts})=>!pts.some(p=>(p.x-x)**2+(p.y-y)**2<R));
    if(strokes.current.length!==prev)redraw();
  }
  function down(e){
    if(disabled||e.pointerType!=="pen")return;
    e.preventDefault();
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
    const p=pt(e);
    const isSpEraser=(!!(e.buttons&34)||e.button===2);
    if(isSpEraser||tool==="eraser"){drawing.current=false;eraseAt(p.x,p.y);return;}
    drawing.current=true;
    if(strokes.current.length>=500)strokes.current.shift();
    strokes.current.push({pts:[p],col:tool==="hl"?"rgb(255,230,0)":"#27AE60",sz:tool==="hl"?20:2.5});
  }
  function move(e){
    if(disabled||e.pointerType!=="pen")return;
    const p=pt(e);
    const isSpEraser=(!!(e.buttons&34)||e.button===2);
    if(isSpEraser||tool==="eraser"){
      e.preventDefault();
      if(drawing.current){strokes.current.pop();drawing.current=false;}
      eraseAt(p.x,p.y);return;
    }
    if(!drawing.current)return;
    e.preventDefault();
    const st=strokes.current[strokes.current.length-1];if(!st)return;
    st.pts.push(p);
    const ctx=cvs.current.getContext("2d");
    ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle=st.col;ctx.lineWidth=st.sz;
    if(st.pts.length>1){ctx.beginPath();ctx.moveTo(st.pts[st.pts.length-2].x,st.pts[st.pts.length-2].y);ctx.lineTo(p.x,p.y);ctx.stroke();}
  }
  const up=()=>{drawing.current=false;};
  return(
    <canvas ref={cvs}
      style={{position:"absolute",top:0,left:0,
        mixBlendMode:"multiply",touchAction:"none",zIndex:5,
        cursor:disabled?"not-allowed":tool==="eraser"?"cell":"crosshair",
        pointerEvents:disabled?"none":"auto"}}
      onPointerDown={down} onPointerMove={move} onPointerUp={up}
      onPointerLeave={up} onPointerCancel={up}
      onContextMenu={e=>{e.preventDefault();const p=pt(e);eraseAt(p.x,p.y);}}/>
  );
});

/* ── 풀사이즈 펜 패드 ── */
const PEN_COLORS=["#221C39","#2563EB","#DC2626"];
const PEN_LABELS=["검정","파랑","빨강"];

const PenPad=React.forwardRef(function PenPad({kind,onText,disabled,hideOcr,penOnlyDefault=false,highlights,highlightSize},fwdRef){
  const canvasRef=useRef(null);
  const strokes=useRef([]);
  const drawing=useRef(false);
  const eraseGesture=useRef(false);
  const [tool,setTool]=useState("pen");
  const [color,setColor]=useState(PEN_COLORS[0]);
  const [size,setSize]=useState(1);
  const [busy,setBusy]=useState(false);
  const [padErr,setPadErr]=useState("");
  const [hasInk,setHasInk]=useState(false);
  const [penOnly,setPenOnly]=useState(penOnlyDefault);

  React.useImperativeHandle(fwdRef,()=>({
    getImageBase64:()=>canvasRef.current?canvasRef.current.toDataURL("image/png").split(",")[1]:null,
    hasStrokes:()=>strokes.current.length>0,
    clear:()=>{strokes.current=[];redraw();setHasInk(false);setPadErr("");},
    forceColor:(c)=>{setColor(c);setTool("pen");},
    setEraser:()=>setTool("eraser"),
    setPen:()=>setTool("pen"),
    getSize:()=>canvasRef.current?{w:canvasRef.current.width,h:canvasRef.current.height}:{w:800,h:680},
  }));

  const getDpr=()=>window.devicePixelRatio||1;
  function setup(){
    const c=canvasRef.current;if(!c)return;
    const r=c.getBoundingClientRect(),dpr=getDpr();
    c.width=Math.round(r.width*dpr);c.height=Math.round(r.height*dpr);
    const ctx=c.getContext("2d");ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
    redraw();
  }
  function redraw(){
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d");
    const dpr=getDpr();const w=c.width/dpr,h=c.height/dpr;
    ctx.fillStyle="#FFFDF8";ctx.fillRect(0,0,w,h);
    ctx.strokeStyle="#EDE9F0";ctx.lineWidth=1;
    for(let y=32;y<h;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    strokes.current.forEach(({pts,col,sz})=>{
      if(pts.length<2)return;
      ctx.lineCap="round";ctx.lineJoin="round";
      ctx.globalCompositeOperation="source-over";ctx.strokeStyle=col;
      for(let i=1;i<pts.length;i++){
        ctx.beginPath();ctx.lineWidth=sz*(0.8+(pts[i].p||.5)*0.4)*2;
        ctx.moveTo(pts[i-1].x,pts[i-1].y);ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();
      }
    });
  }
  useEffect(()=>{setup();const f=()=>setup();window.addEventListener("resize",f);return()=>window.removeEventListener("resize",f);},[]);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const prev=(e)=>{if(e.touches[0]?.touchType==="stylus"||e.touches[0]?.radiusX===0)e.preventDefault();};
    c.addEventListener("touchstart",prev,{passive:false});
    c.addEventListener("touchmove",prev,{passive:false});
    return()=>{c.removeEventListener("touchstart",prev);c.removeEventListener("touchmove",prev);};
  },[]);

  const pt=(e)=>{const r=canvasRef.current.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top,p:e.pressure||.5};};
  function eraseAt(x,y){
    const R=18*18;
    const prev=strokes.current.length;
    strokes.current=strokes.current.filter(({pts})=>
      !pts.some(p=>(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y)<R)
    );
    if(strokes.current.length!==prev){redraw();setHasInk(strokes.current.length>0);}
  }
  // S펜 옆 버튼(배럴) 지우개 신호 — 기기별로 버튼값이 2/32/5로 제각각이라 모두 인식
  const penEraseSignal=(e)=>e.pointerType==="pen"&&(!!(e.buttons&34)||e.button===2||e.button===5);
  function down(e){
    if(disabled)return;
    if(penOnly&&e.pointerType!=="pen")return;
    e.preventDefault();
    try{e.target.setPointerCapture(e.pointerId);}catch(_){}
    const p=pt(e);
    if(penEraseSignal(e)||tool==="eraser"){
      eraseGesture.current=true;   // 한 번 지우개로 시작하면 펜 뗄 때까지 유지
      drawing.current=false;
      eraseAt(p.x,p.y);
      return;
    }
    eraseGesture.current=false;
    drawing.current=true;
    if(strokes.current.length>=500)strokes.current.shift();
    strokes.current.push({pts:[p],col:color,sz:size});
  }
  function move(e){
    if(disabled)return;
    if(penOnly&&e.pointerType!=="pen"){drawing.current=false;return;}
    const p=pt(e);
    if(penEraseSignal(e))eraseGesture.current=true;   // 그리던 중 버튼 누르면 즉시 지우개로 전환
    if(eraseGesture.current||tool==="eraser"){
      e.preventDefault();
      if(drawing.current){
        strokes.current.pop();
        drawing.current=false;
      }
      eraseAt(p.x,p.y);
      return;
    }
    if(!drawing.current)return;
    e.preventDefault();
    const st=strokes.current[strokes.current.length-1];
    if(!st)return;
    st.pts.push(p);
    const ctx=canvasRef.current.getContext("2d");
    if(st.pts.length>1){
      ctx.lineCap="round";ctx.lineJoin="round";
      ctx.globalCompositeOperation="source-over";ctx.strokeStyle=st.col;
      ctx.beginPath();ctx.lineWidth=st.sz*(0.8+(p.p||.5)*0.4)*2;
      ctx.moveTo(st.pts[st.pts.length-2].x,st.pts[st.pts.length-2].y);ctx.lineTo(p.x,p.y);ctx.stroke();
    }
    if(!hasInk)setHasInk(true);
  }
  const up=()=>{drawing.current=false;eraseGesture.current=false;};
  const cancel=()=>{drawing.current=false;eraseGesture.current=false;};
  function undo(){if(disabled)return;strokes.current.pop();redraw();setHasInk(strokes.current.length>0);}
  function clearPad(){strokes.current=[];redraw();setHasInk(false);setPadErr("");}
  async function recognize(){
    if(!hasInk){setPadErr(tr("먼저 써봐.","Write something first."));return;}
    setBusy(true);setPadErr("");
    try{
      const data=canvasRef.current.toDataURL("image/png").split(",")[1];
      const t=await transcribeFile(data,"image/png",kind);
      onText((t||"").trim());clearPad();
    }catch(e){setPadErr("인식 실패: "+e.message);}
    setBusy(false);
  }

  return(
    <div className="pen-wrap">
      <div className="pen-toolbar">
        <button className={"btn ico gho sm"+(tool==="pen"?" on":"")} onClick={()=>setTool("pen")} title="펜" disabled={disabled}>✏️</button>
        <button className={"btn ico gho sm"+(tool==="eraser"?" on":"")} onClick={()=>setTool("eraser")} title="지우개" disabled={disabled}>🧽</button>
        <div className="sep"/>
        {PEN_COLORS.map((c,i)=>(
          <button key={c} className={"color-btn"+(color===c&&tool==="pen"?" on":"")}
            style={{background:c}} title={PEN_LABELS[i]}
            onClick={()=>{setColor(c);setTool("pen");}}/>
        ))}
        <div className="sep"/>
        <div className="size-row">
          <span>굵기</span>
          <input type="range" min="1" max="10" step="0.5" value={size} onChange={e=>setSize(Number(e.target.value))}/>
          <span style={{minWidth:22,textAlign:"right"}}>{size}</span>
        </div>
        <div className="sep"/>
        <button className="btn gho xs" onClick={undo} disabled={busy||disabled}>↩ 취소</button>
        <button className="btn gho xs" onClick={clearPad} disabled={busy||disabled}>🗑️ 전체</button>
        <div className="sep"/>
        <button className={"btn gho xs"+(penOnly?" on":"")} onClick={()=>setPenOnly(v=>!v)}
          title={penOnly?tr("펜 전용 ON — 손가락 터치 무시 중 (S펜·Apple Pencil)","Pen only — ignoring finger touch (S Pen·Apple Pencil)"):tr("터치·마우스도 허용 중","Touch & mouse allowed")}>
          ✒️ {penOnly?tr("펜 전용","Pen only"):tr("터치","Touch")}
        </button>
      </div>
      <div style={{position:"relative",width:"100%"}}>
        <canvas ref={canvasRef} className={"pad"+(tool==="eraser"?" eraser":"")}
          style={disabled?{opacity:.55,pointerEvents:"none"}:undefined}
          onPointerDown={down} onPointerMove={move} onPointerUp={up}
          onPointerLeave={up} onPointerCancel={cancel}
          onContextMenu={e=>{e.preventDefault();const p=pt(e);eraseAt(p.x,p.y);}}/>
        {highlights&&highlights.length>0&&highlightSize&&highlights.map((h,i)=>(
          <div key={i} style={{position:"absolute",
            left:(h.x/highlightSize.w*100)+"%",top:(h.y/highlightSize.h*100)+"%",
            width:(h.w/highlightSize.w*100)+"%",height:(h.h/highlightSize.h*100)+"%",
            border:"2.5px solid var(--rose)",borderRadius:4,
            background:"rgba(255,107,138,0.16)",boxShadow:"0 0 0 1px rgba(255,255,255,.6)",
            pointerEvents:"none",boxSizing:"border-box"}}>
            <span style={{position:"absolute",top:-9,left:-7,fontSize:11,background:"var(--rose)",color:"#fff",
              borderRadius:"50%",width:16,height:16,lineHeight:"16px",textAlign:"center",fontWeight:700}}>?</span>
          </div>
        ))}
      </div>
      {!hideOcr&&(
        <div className="pen-bottom">
          <span className="ph">{tr("S펜이나 손가락으로 써봐","Write with S Pen or finger")}</span>
          <div className="row">
            <button className="btn pri sm" onClick={recognize} disabled={busy||!hasInk}>
              {busy?tr("인식 중…","Reading…"):tr("✅ 인식해서 넣기","✅ Recognize & add")}
            </button>
          </div>
        </div>
      )}
      {padErr&&<div className="err">{padErr}</div>}
    </div>
  );
});

/* ── 사진 버튼 ── */
function PhotoButton({kind,onText,label}){
  const ref=useRef(null);const[busy,setBusy]=useState(false);
  async function handle(e){
    const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
    setBusy(true);
    try{const data=await toB64(f);const t=await transcribeFile(data,f.type||"image/jpeg",kind);onText((t||"").trim());}
    catch(e){alert(tr("인식 실패: ","Recognition failed: ")+e.message);}
    setBusy(false);
  }
  return(
    <>
      <button className="btn gho sm" onClick={()=>ref.current&&ref.current.click()} disabled={busy}>
        {busy?tr("읽는 중…","Reading…"):(label||tr("📷 사진","📷 Photo"))}
      </button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
    </>
  );
}

/* ── 자료 추가 ── */
function AddMaterial({subjects,onSave,onDone,onCancel}){
  const [name,setName]=useState("");
  const [subjId,setSubjId]=useState(subjects[0]?.id||"");
  const [material,setMaterial]=useState("");
  const [files,setFiles]=useState([]);
  const [busy,setBusy]=useState(false);
  const [busyMsg,setBusyMsg]=useState("");
  const [progress,setProgress]=useState(0);
  const [err,setErr]=useState("");
  const [pen,setPen]=useState(false);
  const [newSubj,setNewSubj]=useState("");
  const [isExam,setIsExam]=useState(false);
  const append=(t)=>{if(t)setMaterial(p=>(p.trim()?p.trim()+"\n":"")+t);};

  // 새 과목 빠른 추가
  function quickAddSubj(){
    const n=newSubj.trim();if(!n)return;
    const color=SUBJ_COLORS[subjects.length%SUBJ_COLORS.length];
    const s={id:uid(),name:n,color};
    onSave([...subjects,s]);setSubjId(s.id);setNewSubj("");
  }

  async function save(){
    if(!CFG.key&&!CFG.geminiKey){
      setErr(tr("API 키가 없어. 설정에서 Claude 또는 Gemini 키를 먼저 입력해줘.","No API key. Add a Claude or Gemini key in Settings first."));return;
    }
    if(!material.trim()&&files.length===0){
      setErr(tr("자료를 입력하거나 파일을 첨부해줘.","Enter some material or attach a file."));return;
    }

    setBusy(true);setErr("");setProgress(0);setBusyMsg(tr("준비 중…","Preparing…"));

    // 글로벌 가짜 진행률 타이머: 0→70 빠르게, 70→90 느리게, 90에서 멈춤
    let _prog=0;
    const fakeTimer=setInterval(()=>{
      if(_prog<70){_prog=Math.min(70,_prog+1.5);}
      else if(_prog<90){_prog=Math.min(90,_prog+0.3);}
      setProgress(Math.round(_prog));
    },60);

    const fail=(msg)=>{
      clearInterval(fakeTimer);
      setProgress(0);setBusy(false);setBusyMsg("");
      setErr(msg);
    };
    const done=()=>{
      clearInterval(fakeTimer);
      setProgress(100);
      setBusyMsg(tr("완료! 🎉 이제 공부 시작하자","Done! 🎉 Let's study"));
      setTimeout(()=>{setBusy(false);setBusyMsg("");onDone();},800);
    };

    // ── 파일 처리 ──
    const pdfResults=[];
    let imageText="";
    let fileErrMsg="";
    for(let i=0;i<files.length;i++){
      const f=files[i];
      const isPdf=f.type==="application/pdf";
      if(isPdf&&f.size>30*1024*1024){fail(tr("PDF가 너무 커. 30MB 이하 파일만 지원해.","PDF is too big. Max 30MB."));return;}
      try{
        setBusyMsg(tr("파일 읽는 중… (","Reading file… (")+f.name+")");
        const b64=await toB64(f);
        if(isPdf){
          setBusyMsg(tr("PDF 분석 중… ","Analyzing PDF… ")+f.name+tr(" (AI가 읽는 중, 1~2분 걸릴 수 있어)"," (AI reading, may take 1–2 min)"));
          const r=await processPdf(b64);
          if(r){pdfResults.push(r);}
          else{fileErrMsg+=f.name+tr(": PDF 분석 실패 (Claude 키 확인 필요). ",": PDF analysis failed (check Claude key). ");}
        }else{
          setBusyMsg(tr("이미지 읽는 중… (","Reading image… (")+f.name+")");
          const t=await transcribeFile(b64,f.type||"image/jpeg","note");
          imageText+=(t||"")+"\n";
        }
      }catch(e){
        fileErrMsg+=f.name+": "+e.message+". ";
        console.warn("파일 처리 실패",f.name,e);
      }
    }

    // ── 자료 합치기 ──
    const pdfSummaryText=pdfResults.map(r=>r.summary||"").filter(Boolean).join("\n\n");
    const fullMaterial=[material,imageText,pdfSummaryText].map(s=>s.trim()).filter(Boolean).join("\n").trim();
    const finalName=name.trim()||tr("새 자료","New material");

    if(!fullMaterial){
      fail(tr("자료 내용을 읽지 못했어.","Couldn't read the material.")+(fileErrMsg?tr(" 오류: "," Error: ")+fileErrMsg:"")+tr(" 텍스트로 직접 입력하거나 Claude API 키를 확인해줘."," Type it in directly or check your Claude API key."));return;
    }
    if(fileErrMsg)setErr(tr("⚠️ 일부 파일 오류: ","⚠️ Some files failed: ")+fileErrMsg+tr("나머지 자료로 계속 진행할게.","Continuing with the rest."));

    // ── 앱이 한국어인데 영어 자료면: 이 덱을 어느 언어로 공부할지 물어봄 ──
    let deckLang=CFG.lang;
    if(CFG.lang==="ko"&&detectLang(fullMaterial)==="en"){
      deckLang=confirm("이 자료는 영어로 되어 있네! 이 자료를 영어로 공부할래?\n\n[확인] = 영어로 (문제·해설·채점 영어)\n[취소] = 한국어로")?"en":"ko";
    }

    // ── 개념 추출 ──
    setBusyMsg(tr("핵심 개념 정리 중…","Pulling out key concepts…"));
    let concepts=pdfResults.flatMap(r=>Array.isArray(r.concepts)?r.concepts:[]);
    if(concepts.length<5){
      try{
        const r=await callAI(
          "너는 학습 자료 분석 전문가야. 자료가 무엇을 가르치려는지 핵심 주제와 목적을 먼저 파악해. 그 목적에 맞는 핵심 개념 8~15개를 짧은 명사구로 뽑아. 단순히 등장하는 단어가 아니라 이 자료의 학습 목표를 대표하는 개념이어야 해. JSON만: {\"concepts\":[\"...\"]}",
          "자료:\n\n"+fullMaterial.slice(0,12000),true,{maxTok:512,lang:deckLang});
        const extra=Array.isArray(r.concepts)?r.concepts:[];
        concepts=[...concepts,...extra.filter(c=>!concepts.includes(c))];
      }catch(e){
        fail(tr("개념 추출 실패: ","Concept extraction failed: ")+e.message+tr(" — API 키와 인터넷 연결을 확인해줘."," — check your API key and connection."));return;
      }
    }
    if(!concepts.length)concepts=[tr("전체 자료","Whole material")];

    // ── 기출/족보 문제 추출 ──
    let examQuestions=[];
    if(isExam){
      setBusyMsg(tr("기출문제 뽑아내는 중…","Extracting exam questions…"));
      examQuestions=(await extractExamQuestions(fullMaterial,concepts)).slice(0,25);
    }

    // ── 요약 ──
    let summary=pdfSummaryText;
    if(!summary&&fullMaterial.length>2000){
      setBusyMsg(tr("거의 다 됐어… 마무리 중","Almost done… wrapping up"));
      try{
        summary=await callAI(
          "너는 학습 자료 요약 전문가야. 핵심 개념·공식·예시를 빠짐없이 압축해. 수식·기호 원문 그대로. 텍스트만 출력.",
          "자료:\n"+fullMaterial.slice(0,20000),false,{maxTok:900});
      }catch(e){console.warn("요약 생성 실패 (건너뜀):",e.message);}
    }

    // ── 저장 ──
    const id=uid();
    const materialToStore=summary?fullMaterial.slice(0,5000):fullMaterial.slice(0,12000);
    const deck={id,name:finalName,subjId,material:materialToStore,summary,createdAt:Date.now(),
      ...(deckLang!==CFG.lang?{lang:deckLang}:{}),
      isExam:isExam&&examQuestions.length>0,examQuestions,
      concepts:concepts.map(nm=>({id:uid(),name:String(nm).slice(0,80),box:1,dueAt:0,reps:0,lapses:0}))};

    const usedBytes=getStorageSize();
    if(usedBytes>STORAGE_CAP()){
      fail(tr("저장 공간이 부족해 (","Out of storage (")+formatSize(usedBytes)+tr("). 오래된 자료를 먼저 삭제해줘.","). Delete old materials first."));return;
    }
    if(!LS.set(dk(id),deck)){fail(tr("저장 실패: 저장 공간이 꽉 찼어.","Save failed: storage is full."));return;}
    if(!LS.set(DECKS_KEY,[{id,name:deck.name,subjId},...(LS.get(DECKS_KEY)||[])])){
      LS.del(dk(id));fail(tr("저장 실패: 저장 공간이 꽉 찼어.","Save failed: storage is full."));return;
    }
    done();
  }

  const selSubj=subjects.find(s=>s.id===subjId);

  return(
    <section className="card panel">
      <div className="eyebrow">{tr("새 자료 추가","Add material")}</div>

      {/* 과목 선택 */}
      <div>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("과목","Folder")}</div>
        <div className="subj-picker">
          {subjects.map(s=>(
            <button key={s.id} className={"subj-pill"+(subjId===s.id?" on":"")}
              style={subjId===s.id?{background:s.color}:{color:s.color,borderColor:s.color+"44"}}
              onClick={()=>setSubjId(s.id)}>{s.name}</button>
          ))}
        </div>
        <div className="subj-new" style={{marginTop:8}}>
          <input placeholder={tr("새 과목 이름","New folder name")} value={newSubj} onChange={e=>setNewSubj(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&quickAddSubj()}/>
          <button className="btn gho xs" onClick={quickAddSubj}>{tr("+ 추가","+ Add")}</button>
        </div>
      </div>

      {/* 제목 */}
      <input className="field" placeholder={tr("제목 — 예: 선형대수 5장 (고유값)","Title — e.g. Linear Algebra Ch.5 (Eigenvalues)")} value={name}
        onChange={e=>setName(e.target.value)} disabled={busy}/>

      {/* 기출/족보 토글 */}
      <label style={{display:"flex",alignItems:"center",gap:11,padding:"12px 15px",cursor:busy?"default":"pointer",
        border:"1.5px solid "+(isExam?"var(--pri)":"var(--line)"),borderRadius:14,
        background:isExam?"var(--pri-s)":"#FBFAFF",transition:"all .2s"}}>
        <input type="checkbox" checked={isExam} disabled={busy} onChange={e=>setIsExam(e.target.checked)}
          style={{width:18,height:18,accentColor:"var(--pri)",flexShrink:0}}/>
        <div style={{minWidth:0}}>
          <div style={{fontSize:13.5,fontWeight:700,color:isExam?"var(--pri-d)":"var(--ink)"}}>{tr("📑 기출문제·족보예요","📑 These are past exam questions")}</div>
          <div style={{fontSize:11.5,color:"var(--sub)",marginTop:2,lineHeight:1.5}}>{tr("실제 문제를 뽑아서 그대로 풀고, 변형·심화문제까지 자동으로 만들어줘","I'll pull the real questions, drill them, and auto-make variants & harder ones")}</div>
        </div>
      </label>

      {/* 내용 */}
      <textarea className="field" rows={7} disabled={busy} value={material}
        placeholder={tr("공부한 내용을 붙여넣거나, 아래 도구로 추가해줘.","Paste what you studied, or add it with the tools below.")}
        onChange={e=>setMaterial(e.target.value)}/>

      {/* 파일 첨부 */}
      <div>
        <div style={{fontSize:12.5,color:"var(--sub)",marginBottom:8}}>{tr("📎 파일 첨부 (이미지·PDF)","📎 Attach files (image · PDF)")}</div>
        <FileDropZone files={files} onChange={setFiles}/>
      </div>

      {/* 펜·사진 */}
      <div className="tools">
        <button className={"btn gho sm"+(pen?" on":"")} onClick={()=>setPen(v=>!v)} disabled={busy}>{tr("✍️ 펜으로 쓰기","✍️ Write with pen")}</button>
        <PhotoButton kind="note" onText={append} label={tr("📷 노트 사진","📷 Photo of notes")}/>
        <span className="note">{tr("인식 결과는 위 칸에 추가돼","Recognized text is added above")}</span>
      </div>
      {pen&&<PenPad kind="note" onText={append}/>}

      {err&&<div className="err">{err}</div>}
      {busy&&(
        <div style={{position:"sticky",bottom:0,zIndex:10,background:"var(--card)",
          border:"2px solid var(--pri)",borderRadius:14,padding:"14px 16px",
          boxShadow:"0 4px 24px rgba(108,92,231,.18)",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,fontWeight:600,color:progress===100?"var(--mint)":"var(--pri-d)"}}>{busyMsg||tr("처리 중…","Working…")}</span>
            <span style={{fontSize:15,fontWeight:700,color:progress===100?"var(--mint)":"var(--pri-d)"}}>{progress}%</span>
          </div>
          <div style={{height:12,borderRadius:8,background:"#F0EDFA",overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:8,
              background:progress===100?"var(--mint)":"linear-gradient(90deg,var(--pri),var(--mint))",
              width:progress+"%",transition:"width .5s ease"}}/>
          </div>
          {progress===100
            ?<span style={{fontSize:12,color:"var(--mint)",fontWeight:600,textAlign:"center"}}>{tr("저장 완료! 이제 공부 시작하자 🎉","Saved! Let's start studying 🎉")}</span>
            :<span style={{fontSize:11.5,color:"var(--sub)"}}>{tr("페이지를 닫지 마. 분석이 끝나면 자동으로 저장돼.","Don't close the page. It saves automatically when analysis finishes.")}</span>
          }
        </div>
      )}
      <div className="row">
        <button className="btn pri" onClick={save} disabled={busy}>{busy?tr("분석 중…","Analyzing…"):tr("이제 공부하자! 📖","Let's study! 📖")}</button>
        <button className="btn gho" onClick={onCancel} disabled={busy}>{tr("취소","Cancel")}</button>
      </div>
      <p className="hint">{tr("PDF는 최대 50페이지·30MB까지 지원. 이미지·손글씨 노트도 첨부 가능.","PDF up to 50 pages · 30MB. Images & handwritten notes welcome too.")}</p>
    </section>
  );
}

/* ── 이해 깊이 게이지 ── */
function DepthGauge({depth,lang}){
  const LEVELS=["암기","이해","설명가능","응용가능"];
  const LABELS=lang==="en"?["Recall","Understand","Explain","Apply"]:LEVELS;
  const idx=LEVELS.findIndex(l=>depth&&depth.startsWith(l));
  if(idx<0||!depth)return null;
  return(
    <div style={{padding:"8px 12px",background:"var(--bg)",border:"1px solid var(--line)",borderRadius:10}}>
      <div style={{fontSize:10,fontWeight:700,color:"var(--sub)",letterSpacing:".5px",marginBottom:6}}>{lang==="en"?"Understanding depth":"이해 깊이"}</div>
      <div style={{display:"flex",gap:4}}>
        {LEVELS.map((l,i)=>(
          <div key={l} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{width:"100%",height:7,borderRadius:4,
              background:i<=idx?(i===0?"#A0A0D0":i===1?"#7B83D6":i===2?"#6C5CE7":"#4A3FC7"):"#E0E0F0"}}/>
            <span style={{fontSize:9.5,lineHeight:1.3,textAlign:"center",
              color:i===idx?"#6C5CE7":"var(--sub)",fontWeight:i===idx?700:400}}>{LABELS[i]}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── 오답 노트 ── */
function WeakNotes({deck,onBack,onStudy}){
  const concepts=deck.concepts||[];
  const weak=concepts.filter(c=>(c.box||1)<=3||c.lapses>0||c.lastGap)
    .sort((a,b)=>(a.box||1)-(b.box||1)||(b.lapses||0)-(a.lapses||0));
  const noData=weak.every(c=>!c.lastGap&&!c.lastAnswer);
  const studyableCount=(deck.concepts||[]).filter(c=>(c.box||1)<=3||c.lapses>0).length;
  return(
    <section className="card panel">
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <button className="btn gho sm" onClick={onBack}>{tr("← 뒤로","← Back")}</button>
        <div style={{flex:1}}>
          <div className="eyebrow">{tr("오답 노트","Review notes")}</div>
          <div style={{fontSize:14,fontWeight:700,color:"var(--ink)"}}>{deck.name}</div>
        </div>
        {onStudy&&<button className="btn pri sm" onClick={()=>onStudy(deck)} style={{flexShrink:0}}>
          {tr("💪 약점만 공부하기","💪 Study weak only")} {studyableCount>0&&<span style={{background:"rgba(255,255,255,.35)",borderRadius:10,padding:"1px 6px",marginLeft:4,fontSize:11}}>{studyableCount}</span>}
        </button>}
      </div>
      {weak.length===0?(
        <div className="empty">{tr("아직 틀린 개념이 없어! 공부를 시작해봐 📚","No missed concepts yet! Start studying 📚")}</div>
      ):noData?(
        <div className="empty" style={{textAlign:"left",padding:"20px"}}>
          <p style={{margin:0,fontSize:13.5,color:"var(--sub)",lineHeight:1.7}}>{tr("공부를 더 하면 여기에 빠진 개념과 내 답이 쌓여. 지금 공부하고 돌아와봐!","As you study, missed concepts and your answers pile up here. Study and come back!")}</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {weak.map(c=>(
            <div key={c.id} style={{border:"1.5px solid var(--line)",borderRadius:14,padding:"14px 16px",background:"#FFFDF8"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:(c.lastGap&&c.lastGap!=="없음")||c.lastAnswer?10:0}}>
                <Meter box={c.box||1}/>
                <span style={{fontFamily:"'Jua',sans-serif",fontSize:15,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                {c.lapses>0&&<span style={{fontSize:11,background:"#FEE2E2",color:"#B91C1C",borderRadius:6,padding:"2px 7px",fontWeight:600,flexShrink:0}}>{tr("틀림 "+c.lapses+"회","Missed ×"+c.lapses)}</span>}
                <span style={{fontSize:11,color:"var(--sub)",flexShrink:0}}>Lv.{c.box||1}</span>
              </div>
              {c.lastGap&&c.lastGap!=="없음"&&(
                <div style={{background:"#FFF5F5",borderRadius:10,padding:"8px 12px",marginBottom:6}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#DC2626",letterSpacing:".4px",marginBottom:4}}>{tr("빠진 개념","What was missing")}</div>
                  <MathText text={c.lastGap} tag="div" style={{fontSize:13,color:"#7F1D1D",lineHeight:1.6}}/>
                </div>
              )}
              {c.lastAnswer&&c.lastAnswer!=="[손글씨]"&&(
                <div style={{background:"var(--bg)",borderRadius:10,padding:"8px 12px"}}>
                  <div style={{fontSize:10,fontWeight:700,color:"var(--sub)",letterSpacing:".4px",marginBottom:4}}>{tr("내 마지막 답","My last answer")}</div>
                  <div style={{fontSize:13,color:"var(--ink)",lineHeight:1.7,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{c.lastAnswer}</div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
      <p className="hint">{tr("Lv.3 이하이거나 틀린 적 있는 개념 표시. 공부할수록 줄어들어!","Shows concepts at Lv.3 or below, or ever missed. They shrink as you study!")}</p>
    </section>
  );
}

/* ── 학습 세션 ── */
function Study({deck:initial,subjects}){
  const [deck,setDeck]=useState(initial);
  const [concept,setConcept]=useState(null);
  const [q,setQ]=useState(null);
  const [phase,setPhase]=useState("loading");
  const [answer,setAnswer]=useState("");
  const [ev,setEv]=useState(null);
  const [errMsg,setErrMsg]=useState("");
  const [submitErr,setSubmitErr]=useState("");
  const [deeper,setDeeper]=useState("");
  const [deepBusy,setDeepBusy]=useState(false);
  const [dontknow,setDontknow]=useState("");
  const [dontknowBusy,setDontknowBusy]=useState(false);
  const [count,setCount]=useState(0);
  const [annotOpen,setAnnotOpen]=useState(false);
  const [highlightActive,setHighlightActive]=useState(false);
  const [annotTool,setAnnotTool]=useState("hl");
  const [annotQMode,setAnnotQMode]=useState("pen");
  const [annotQTool,setAnnotQTool]=useState("pen");
  const [annotQ,setAnnotQ]=useState("");
  const [annotBusy,setAnnotBusy]=useState(false);
  const [annotAnswer,setAnnotAnswer]=useState("");
  const annotPadRef=useRef(null);
  const annotQPadRef=useRef(null);
  const [leftPage,setLeftPage]=useState(0);
  const [derivePlan,setDerivePlan]=useState(null);
  const [deriveIdx,setDeriveIdx]=useState(0);
  const [deriveHistory,setDeriveHistory]=useState([]);
  const [deriveFeedback,setDeriveFeedback]=useState("");
  const [deriveChecking,setDeriveChecking]=useState(false);
  const [deriveDone,setDeriveDone]=useState(false);
  const [deriveHintShow,setDeriveHintShow]=useState(false);
  const [followupQ,setFollowupQ]=useState("");
  const [followupCount,setFollowupCount]=useState(0);
  const [followupHistory,setFollowupHistory]=useState([]);
  const [followupBusy,setFollowupBusy]=useState(false);
  const [followupEv,setFollowupEv]=useState(null);
  const [followupHint,setFollowupHint]=useState("");
  const [followupHintBusy,setFollowupHintBusy]=useState(false);
  const [followupSuccess,setFollowupSuccess]=useState(false);
  const [gradeProg,setGradeProg]=useState(0);
  const [ocrHighlights,setOcrHighlights]=useState([]);
  const [ocrImg,setOcrImg]=useState(null);
  const [ocrImgSize,setOcrImgSize]=useState({w:800,h:680});
  const last=useRef(null);
  const padRef=useRef(null);
  const ocrImgRef=useRef(null);
  const deckRef=useRef(deck);
  const submitting=useRef(false);
  const followupSubmitting=useRef(false);
  const genId=useRef(0);
  const abortRef=useRef(null);
  const lastAnswerRef=useRef({});

  function persist(d){
    deckRef.current=d;
    setDeck(d);
    if(!LS.set(dk(d.id),d)){
      setSubmitErr(T("⚠️ 학습 기록 저장 실패: 저장 공간 부족. 설정에서 오래된 자료를 삭제해줘.","⚠️ Couldn't save progress: storage full. Delete old materials in Settings."));
    }
  }

  // 세션 전체에서 캐시 공유: summary 있으면 우선 사용 (8000자 이하)
  const studyMat=deck.summary||deck.material.slice(0,8000);
  // 두 축: UI 라벨 언어 = 설정(CFG.lang) / AI 출제·채점 내용 언어 = 덱별 override(deck.lang) 우선
  const studyLang=(deck.lang||CFG.lang)==="en"?"en":"ko";   // callAI lang: (내용)
  const T=tr;                                                // UI 라벨 (앱 언어)
  const GAP_TYPE_EN={"개념누락":"Missing concept","이해얕음":"Shallow grasp","핵심비껴감":"Off the point","표현부족":"Unclear wording","갭없음":"No gap"};
  const gapTypeLabel=(t)=>CFG.lang==="en"?(GAP_TYPE_EN[t]||t):t;

  async function retryVariant(){
    // 배운 걸로 굳히기: 같은 개념의 '변형 문제'(숫자·상황·표현만 바꿈)를 새로 만들어 다시 풀게 함
    abortRef.current?.abort();
    const ctrl=new AbortController();abortRef.current=ctrl;
    const myId=++genId.current;
    const baseQ=q,c=concept;
    // 결과·노트 정리 후 로딩
    setEv(null);setAnswer("");setDeeper("");setDontknow("");setSubmitErr("");
    setHighlightActive(false);setAnnotQ("");setAnnotAnswer("");setLeftPage(0);
    setOcrHighlights([]);setOcrImg(null);ocrImgRef.current=null;
    setFollowupQ("");setFollowupCount(0);setFollowupHistory([]);setFollowupEv(null);setFollowupSuccess(false);
    padRef.current?.clear();
    setTimeout(()=>padRef.current?.forceColor(PEN_COLORS[0]),50);
    setPhase("loading");setQ(null);
    try{
      const raw=await callAI(
        "너는 문제 변형 출제 전문가야. 아래 [원래 문제]와 똑같은 개념·유형을 묻되, 숫자·상황·예시·표현만 살짝 바꾼 변형문제 하나를 만들어. 방금 본 모범답안을 그대로 베껴 쓸 수 없고 새로 풀어야 하도록. 난이도는 원래와 비슷하게. 수식은 LaTeX($...$). 반드시 아래 형식으로만 출력 (코드블록 없이):\nQTYPE: recall 또는 understand 또는 apply\nQUESTION: 질문 내용\nPOINTS: 핵심1 | 핵심2 | 핵심3\n\n자료:\n"+studyMat.slice(0,4000),
        "개념: "+c.name+"\n원래 문제 유형: "+(baseQ?.qtype||"understand")+"\n[원래 문제]:\n"+(baseQ?.question||""),
        false,{maxTok:800,model:CFG.qmodel,lang:studyLang},ctrl.signal);
      if(genId.current!==myId)return;
      const pq=parseQuestion(raw);
      if(baseQ?.qtype)pq.qtype=baseQ.qtype;
      pq.source="변형";
      setQ(pq);setPhase("answering");
    }catch(e){
      if(genId.current!==myId||e.name==="AbortError")return;
      // 변형 생성 실패 시 원래 문제로 폴백
      setQ(baseQ);setPhase("answering");setSubmitErr(T("변형 문제 생성 실패: ","Variant generation failed: ")+e.message+T(" — 원래 문제로 다시 풀어볼게"," — retrying the original question"));
    }
  }

  function skipConcept(){
    // 페널티 없는 스킵: box(레벨)는 그대로 두고 dueAt만 내일로 미뤄 오늘은 다시 안 나오게 함
    const c=concept;let d=deckRef.current;
    if(c){
      const uc={...c,dueAt:Date.now()+DAY,lastSeen:Date.now()};
      d={...d,concepts:(d.concepts||[]).map(x=>x.id===c.id?uc:x)};
      persist(d);
    }
    next(d);
  }

  async function next(d,forceId,practical){
    d=d||deck;
    abortRef.current?.abort();
    const ctrl=new AbortController();
    abortRef.current=ctrl;
    const myId=++genId.current;
    setPhase("loading");setQ(null);setEv(null);setAnswer("");setDeeper("");setDontknow("");setErrMsg("");setSubmitErr("");
    setAnnotOpen(false);setHighlightActive(false);setAnnotTool("hl");setAnnotQMode("pen");setAnnotQ("");setAnnotBusy(false);setAnnotAnswer("");setLeftPage(0);
    setOcrHighlights([]);setOcrImg(null);ocrImgRef.current=null;
    setDerivePlan(null);setDeriveIdx(0);setDeriveHistory([]);setDeriveFeedback("");setDeriveDone(false);setDeriveHintShow(false);setDeriveChecking(false);
    setFollowupQ("");setFollowupCount(0);setFollowupHistory([]);setFollowupBusy(false);setFollowupEv(null);setFollowupSuccess(false);
    padRef.current?.clear();
    const c=forceId?(d.concepts||[]).find(x=>x.id===forceId)||pickConcept(d,last.current):pickConcept(d,last.current);
    if(!c){setPhase("error");setErrMsg(T("질문할 개념이 없어.","No concepts to quiz."));return;}
    setConcept(c);last.current=c.id;
    const box=c.box||1;

    // ── 기출/족보 덱: box 레벨로 출제 모드 자동 결정 ──
    const examPool=(!practical&&d.isExam&&Array.isArray(d.examQuestions))
      ?d.examQuestions.filter(eq=>eq&&eq.question&&eq.concept===c.name):[];
    if(examPool.length){
      const picked=examPool[(c.reps||0)%examPool.length];
      // box 2 → 원본 기출 그대로 출제 (AI 호출 없음)
      if(box===2){
        setQ({qtype:"apply",question:picked.question,key_points:[],source:"기출",examAnswer:picked.answer||""});
        setPhase("answering");return;
      }
      // box 3~4 → 변형, box 5 → 심화
      if(box>=3){
        const deep=box>=5;
        const sys=deep
          ?"너는 심화문제 출제 전문가야. 아래 [원본 기출문제]가 다루는 개념을 더 깊이 파고드는 심화문제 하나를 만들어. 원본보다 어렵게: 여러 개념을 연결하거나, '왜/어떤 경우에'를 묻거나, 한 단계 더 응용하게. 수식은 LaTeX($...$). 반드시 형식으로만 출력:\nQTYPE: understand 또는 apply\nQUESTION: 질문 내용\nPOINTS: 핵심1 | 핵심2 | 핵심3"
          :"너는 기출문제 변형 출제 전문가야. 아래 [원본 기출문제]와 같은 개념·유형을 묻되 숫자·상황·예시만 바꾼 변형문제 하나를 만들어."+(box>=4?" 난이도는 원본보다 살짝 높여 응용을 더해.":" 난이도는 원본과 비슷하게.")+" 수식은 LaTeX($...$). 반드시 형식으로만 출력:\nQTYPE: recall 또는 understand 또는 apply\nQUESTION: 질문 내용\nPOINTS: 핵심1 | 핵심2 | 핵심3";
        try{
          const raw=await callAI(sys+"\n\n자료:\n"+studyMat.slice(0,4000),
            "개념: "+c.name+"\n[원본 기출문제]:\n"+picked.question,
            false,{maxTok:800,model:CFG.qmodel,lang:studyLang},ctrl.signal);
          if(genId.current!==myId)return;
          const pq=parseQuestion(raw);pq.source=deep?"심화":"변형";
          setQ(pq);setPhase("answering");
        }catch(e){if(genId.current===myId&&e.name!=="AbortError"){setPhase("error");setErrMsg(T("문제 생성 실패: ","Question generation failed: ")+e.message);}}
        return;
      }
      // box 1 → 아래 일반 개념 암기(recall) 생성으로 진행
    }

    const qtypeRule=practical
      ?"▶ QTYPE: apply 고정 — 수치나 조건을 직접 주고 계산·풀이를 요구하는 문제."
      :box<=2
      ?"▶ QTYPE: recall — 핵심 공식·정의·조건·용어를 정확히 쓰거나 말하게 하는 문제. 답의 개수를 특정하면 더 좋음. (예: '공식을 성분으로 나타내어라', '두 가지 조건을 말하시오', '정의를 써라')"
      :box<=3
      ?"▶ QTYPE: recall 또는 understand 중 이 개념에 더 핵심적인 것을 선택."
      :"▶ QTYPE: understand 또는 apply — 이해·비교·연결·응용을 요구하는 문제.";
    try{
      const raw=await callAI(
        "너는 대학 시험 출제 전문가야. 아래 자료에서 목표 개념을 파악하고, 질문 하나를 만들어.\n\n"+
        "━━ 질문 생성 순서 ━━\n"+
        "1. 이 개념이 왜 중요한지, 어디에 쓰이는지, 무엇과 연결되는지를 자료에서 파악한다.\n"+
        "2. 그 핵심을 진짜로 이해했는지 드러나는 질문을 만든다.\n\n"+
        "━━ 좋은 질문 기준 ━━\n"+
        "✓ 그 개념을 실제로 이해했을 때만 답할 수 있는 질문\n"+
        "✓ 왜 그렇게 되는지 / 언제 쓰는지 / 다른 개념과 어떻게 다른지 / 특정 케이스에서 왜 그런 결과가 나오는지\n"+
        "✓ 시험에 실제로 나올 법한 질문\n"+
        "✓ 한 문장으로 끝나지 않고 설명이나 풀이를 요구하는 질문\n\n"+
        "━━ 절대 피할 것 ━━\n"+
        "✗ '~란 무엇인가' 식 정의 받아쓰기 (recall 유형 제외)\n"+
        "✗ 자료의 지엽적 수치·각주·예시를 그대로 묻는 질문\n"+
        "✗ 상식이거나 안 봐도 아는 질문\n"+
        "✗ 자료에 근거 없어 추측해야 하는 질문\n\n"+
        qtypeRule+"\n\n"+
        "━━ 유형별 예시 ━━\n"+
        "recall: '$\\mathbf{a}\\times\\mathbf{b}$를 성분으로 나타내어라', '피타고라스 정리를 써라', '선형변환이 되기 위한 두 가지 조건을 말하시오 (개수 명시하며 묻는 것이 좋음)'\n"+
        "understand: '외적이 내적과 근본적으로 다른 점은? 기하학적으로 설명해봐', '왜 이 조건에서 해가 유일한가?', '$\\mathbf{a}\\times\\mathbf{a}$가 항상 영벡터인 이유는?', '자료의 반례를 이용해 이 함수가 왜 선형변환이 아닌지 서술하시오 (반례+이유 설명 요구)', '왜 [특정 케이스]에서 [특정 결과]가 나오는가?'\n"+
        "apply: '$\\mathbf{a}=(1,2,3),\\,\\mathbf{b}=(4,0,-1)$일 때 $\\mathbf{a}\\times\\mathbf{b}$를 구하시오', '$T(x,y)=2x+y$가 선형변환인지 두 조건으로 보여라 (정의를 직접 적용해 검증하는 문제)'\n\n"+
        "수식은 LaTeX($...$, $$...$$). 반드시 아래 형식으로만 출력:\nQTYPE: recall 또는 understand 또는 apply\nQUESTION: 질문 내용\nPOINTS: 핵심1 | 핵심2 | 핵심3 (| 구분, 3~5개)\n\n자료:\n"+studyMat.slice(0,6000),
        "목표 개념: "+c.name+"\n복습 단계: "+diffLong(c.box),
        false,{cache:true,maxTok:800,model:CFG.qmodel,lang:studyLang},ctrl.signal);
      if(genId.current!==myId)return;
      setQ(parseQuestion(raw));setPhase("answering");
    }catch(e){if(genId.current===myId&&e.name!=="AbortError"){setPhase("error");setErrMsg(T("질문 생성 실패: ","Question generation failed: ")+e.message);}}
  }
  useEffect(()=>{next(initial);return()=>{abortRef.current?.abort();};},[]);

  // 채점 가짜 진행률 (0→93 천천히, 끝나면 100% 후 리셋)
  useEffect(()=>{
    const grading=phase==="grading"||followupBusy;
    if(!grading)return;
    setGradeProg(5);let p=5;
    const id=setInterval(()=>{
      if(p<70)p+=2;else if(p<93)p+=0.5;
      setGradeProg(Math.min(93,Math.round(p)));
    },70);
    return()=>{clearInterval(id);setGradeProg(100);setTimeout(()=>setGradeProg(0),450);};
  },[phase,followupBusy]);

  async function submit(force){
    if(phase!=="answering")return;
    if(submitting.current)return;
    submitting.current=true;
    const hasInk=padRef.current?.hasStrokes();
    const hasTxt=answer.trim().length>0;
    if(!hasInk&&!hasTxt){submitting.current=false;setSubmitErr(T("노트에 써보거나 텍스트로 답을 입력해봐!","Write on the note or type an answer!"));return;}
    const img=hasInk?padRef.current.getImageBase64():null;
    setPhase("grading");setSubmitErr("");setOcrHighlights([]);

    // ── OCR 사전 체크 (손글씨 있을 때만, '그냥 제출'이면 건너뜀) ──
    if(img&&!force){
      const sz=padRef.current?.getSize()||{w:800,h:680};
      try{
        const ocrRaw=await callAI(
          "너는 손글씨 OCR 전문가야. 이 학습 답안을 읽어줘. 이미지 크기: "+sz.w+"×"+sz.h+"px (좌상단이 0,0).\n"+
          "정말 읽기 어려운 글자·기호·수식이 있으면, 그 부분마다 그것을 '딱 감싸는 최소 크기'의 박스를 따로따로 잡아줘. 한 덩어리로 크게 잡지 말고 안 읽히는 글자만 좁게, 최대 6개. 잘 읽히면 '없음'.\n\n"+
          "다음 형식으로만 출력:\nTEXT: 인식된 전체 텍스트 (안 읽히는 글자는 □로 표시)\nUNCLEAR: 없음 (또는 불명확한 영역을 x,y,너비,높이 픽셀 단위로 — 여러 개면 | 로 구분)",
          [{type:"image",source:{type:"base64",media_type:"image/png",data:img}}],
          false,{maxTok:400,model:ocrModel()},abortRef.current?.signal
        );
        const ocr=parseOcrCheck(ocrRaw);
        if(ocr.unclear.length>0){
          // 별도 화면 대신, 쓰던 노트 그대로 두고 안 읽힌 곳에 빨간 박스 표시 + 지우개 모드
          setOcrImgSize(sz);
          setOcrHighlights(ocr.unclear);
          setPhase("answering");
          setTimeout(()=>padRef.current?.setEraser(),50);
          submitting.current=false;
          return;
        }
      }catch(e){if(e.name==="AbortError"){submitting.current=false;return;}console.warn("[OCR check]",e.message);}
    }
    try{
      const userBlocks=[];
      if(img)userBlocks.push({type:"image",source:{type:"base64",media_type:"image/png",data:img}});
      const qtype=q?.qtype||'understand';
      const qtypeCtx=qtype==='recall'
        ?"이 문제는 【암기 확인】 유형이야. 정의·공식·용어를 정확히 썼는지가 핵심이야. 공식이 맞으면 correct, 일부 빠지거나 틀리면 partial, 못 쓰면 incorrect."
        :qtype==='apply'
        ?"이 문제는 【응용·계산】 유형이야. 수치·풀이 과정이 맞는지가 핵심이야. 과정과 결과가 맞으면 correct, 방향은 맞는데 실수 있으면 partial."
        :"이 문제는 【이해 확인】 유형이야. 개념을 얼마나 이해했는지가 핵심이야.";
      const textParts=["문제 유형: "+qtype,"목표 개념: "+concept.name,"질문: "+q.question,"채점 핵심: "+JSON.stringify(q.key_points||[])];
      if(q?.examAnswer)textParts.push("\n[이 기출문제의 공식 정답·해설 — 이 기준으로 채점하고 ANSWER에는 이 정답을 정리해 써]\n"+q.examAnswer);
      if(hasTxt)textParts.push("\n학습자 텍스트 답안:\n"+answer.trim());
      if(img)textParts.push("\n학습자가 위 이미지에 손으로 쓴 답도 포함돼. 이미지 속 내용을 읽고 함께 채점해줘.");
      userBlocks.push({type:"text",text:textParts.join("\n")});
      const gradingRaw=await callAI(
        "너는 학습 분석 튜터야. "+qtypeCtx+" 학습자 답안을 보고 '이 개념의 본질 대비 내 답의 갭'을 분석해. 수식·행렬·그리스 문자·수학 기호(⊥ ∥ ∈ ∉ ⊆ ℝ ∇ 등)는 반드시 LaTeX로: 인라인 $...$, 블록 $$...$$. 유니코드 기호 직접 사용 금지. 다음 형식으로만 출력 (JSON·코드블록 없이):\nESSENCE: 이 질문이 진짜 요구하는 핵심 요소 1~3가지 (학습자가 반드시 알아야 할 것)\nGOT_IT: 내 답이 제대로 담은 부분 (인정해줄 것, 반말)\nGAP: 본질 대비 빠지거나 얕거나 비껴간 핵심 부분 (없으면 정확히 '없음')\nGAP_TYPE: 개념누락 / 이해얕음 / 핵심비껴감 / 표현부족 / 갭없음 중 정확히 하나\nDEPTH: 암기 수준 / 이해 수준 / 설명가능 수준 / 응용가능 수준 중 정확히 하나\nNEXT: 이 갭을 메우려면 구체적으로 뭘 보강해야 하는지 (반말, 1~2문장)\nVERDICT: correct 또는 partial 또는 incorrect (갭없음이면 correct, 핵심 갭이면 partial, 본질 전체 누락이면 incorrect)\nANSWER: 모범답안 3~5문장 (수식 LaTeX, 그래프 필요시 <svg> 태그 직접 — 코드블록 없이, width≤380 height≤260 viewBox 사용, 축=#221C39, 곡선=#6C5CE7·#27C2A0·#FF6B8A·#FFC24B, bg=#FFFDF8)\n\n자료:\n"+studyMat,
        userBlocks,false,{cache:true,maxTok:2048,lang:studyLang},abortRef.current?.signal);
      const r=parseGrading(gradingRaw);setEv(r);
      const v=["correct","partial","incorrect"].includes(r.verdict)?r.verdict:"partial";
      lastAnswerRef.current={answer:hasTxt?answer.trim():"[손글씨]",gap:r.gap||"",gapType:r.gap_type||""};
      const enrichConcept=(c)=>({...c,lastAnswer:lastAnswerRef.current.answer,lastGap:lastAnswerRef.current.gap,lastGapType:lastAnswerRef.current.gapType});
      if(v==="correct"){
        const uc=schedule(enrichConcept(concept),v);
        persist({...deckRef.current,concepts:deckRef.current.concepts.map(c=>c.id===concept.id?uc:c)});
        setConcept(uc);setCount(n=>n+1);setPhase("result");
        setTimeout(()=>padRef.current?.forceColor(PEN_COLORS[2]),50);
      }else{
        const coreGap=r.gap&&r.gap!=="없음"&&(r.gap_type==="개념누락"||r.gap_type==="핵심비껴감");
        if(coreGap){
          // 원래 답안(손글씨/텍스트)은 그대로 두고 빨간펜으로 빠진 부분만 보완하게 함
          setFollowupCount(1);setFollowupHistory([]);setFollowupEv(null);setFollowupSuccess(false);
          setTimeout(()=>padRef.current?.forceColor(PEN_COLORS[2]),50);
          await generateFollowup(r,[],hasTxt?answer.trim():"");
        }else{
          const uc=schedule(enrichConcept(concept),v);
          persist({...deckRef.current,concepts:deckRef.current.concepts.map(c=>c.id===concept.id?uc:c)});
          setConcept(uc);setCount(n=>n+1);setPhase("result");
        }
      }
    }catch(e){if(e.name==="AbortError")return;setPhase("answering");setSubmitErr(T("채점 실패: ","Grading failed: ")+e.message);}
    finally{submitting.current=false;}
  }

  async function generateFollowup(ev0,history,myAnswer){
    setFollowupBusy(true);
    try{
      const histTxt=history.length?"이전 보충 시도:\n"+history.map((h,i)=>(i+1)+". "+h.answer+" → "+h.verdict).join("\n")+"\n\n":"";
      const myAns=(myAnswer&&myAnswer.trim())?myAnswer.trim():"(손글씨로 답함 — 아래 GOT_IT/GAP 분석을 학습자가 실제로 쓴 내용으로 보고 질문을 만들 것)";
      const gapTxt=(ev0&&ev0.gap)?ev0.gap:(typeof ev0==="string"?ev0:"");
      const userCtx=
        "개념: "+concept.name+"\n"+
        "원래 질문: "+q.question+"\n"+
        "── 학습자가 실제로 쓴 답 ──\n"+myAns+"\n\n"+
        "이 답에서 학습자가 이미 맞게 한 부분(GOT_IT): "+((ev0&&ev0.got_it)||"-")+"\n"+
        "이 답에서 빠지거나 비껴간 핵심(GAP): "+(gapTxt||"-")+"\n"+
        "이 갭을 메우려면 보강할 것(NEXT): "+((ev0&&ev0.next)||"-")+"\n\n"+
        histTxt+"후속 질문만 출력:";
      const raw=await callAI(
        "너는 소크라테스식 학습 튜터야. 학습자가 '자기가 쓴 답의 빠진 부분'을 스스로 떠올려 채우도록, 후속 질문을 딱 하나만 만들어.\n"+
        "규칙:\n"+
        "① 반드시 위 GAP(이 학습자 답의 빠진 핵심)만 정조준해. 개념 전체나 새로운 주제로 넘어가지 말 것 — 학습자 답과 동떨어진 엉뚱한 질문은 절대 금지.\n"+
        "② 학습자가 이미 쓴 답(GOT_IT)을 출발점으로 삼아, '네가 ~라고 했는데, 그럼 …?' 처럼 그 답에 이어 붙는 질문으로 만들어. 학습자가 흐릿하게 기억하는 부분을 스스로 끄집어내도록 유도해.\n"+
        "③ 절대 정답·모범답안을 알려주지 말 것. 답을 떠먹여주지 말고 떠올리게만 해.\n"+
        "④ '왜', '그렇다면', '어떤 경우에' 같은 소크라테스식, 반말, 친근하게.\n"+
        "⑤ 질문 한 문장만 출력 (설명·안내 없이).\n\n자료:\n"+studyMat.slice(0,4000),
        userCtx,
        false,{maxTok:200,model:CFG.qmodel,lang:studyLang},abortRef.current?.signal
      );
      setFollowupQ((raw||"").trim());
      setFollowupHint("");setFollowupHintBusy(false);
      setPhase("followup");
    }catch(e){
      if(e.name==="AbortError")return;
      setSubmitErr(T("후속 질문 생성 실패: ","Follow-up generation failed: ")+e.message);
      setPhase("answering");
    }
    setFollowupBusy(false);
  }

  async function submitFollowup(){
    if(followupSubmitting.current)return;
    followupSubmitting.current=true;
    const hasInk=padRef.current?.hasStrokes();
    const hasTxt=answer.trim().length>0;
    if(!hasInk&&!hasTxt){followupSubmitting.current=false;setSubmitErr(T("답을 써봐!","Write an answer!"));return;}
    const img=hasInk?padRef.current.getImageBase64():null;
    setFollowupBusy(true);setSubmitErr("");
    try{
      const userBlocks=[];
      if(img)userBlocks.push({type:"image",source:{type:"base64",media_type:"image/png",data:img}});
      const textParts=["개념: "+concept.name,"원래 질문: "+q.question,"후속 질문: "+followupQ];
      if(hasTxt)textParts.push("\n학습자 답변:\n"+answer.trim());
      if(img)textParts.push("\n이미지에는 학습자의 '원래 답(검은펜/파란펜)'과 후속 질문에 답하려고 새로 보탠 '빨간펜 보완'이 함께 있어. 빨간펜으로 새로 보탠 내용을 중심으로, 후속 질문에 제대로 답했는지 평가해줘.");
      userBlocks.push({type:"text",text:textParts.join("\n")});
      const raw=await callAI(
        "너는 학습 분석 튜터야. 후속 질문에 대한 답변만 갭 분석해. 이 후속 질문이 묻는 부분만 평가해 (전체 모범답안 기준 아님). 다음 형식으로만 출력:\nESSENCE: 이 후속 질문이 묻는 핵심\nGOT_IT: 맞게 표현한 부분 (반말)\nGAP: 여전히 부족한 부분 (없으면 정확히 '없음')\nGAP_TYPE: 개념누락 / 이해얕음 / 핵심비껴감 / 표현부족 / 갭없음 중 하나\nDEPTH: 암기 수준 / 이해 수준 / 설명가능 수준 / 응용가능 수준 중 하나\nNEXT: 1문장 (반말)\nVERDICT: correct 또는 partial 또는 incorrect\nANSWER: \n\n자료:\n"+studyMat,
        userBlocks,false,{cache:true,maxTok:800,lang:studyLang},abortRef.current?.signal
      );
      const r=parseGrading(raw);
      setFollowupEv(r);
      const newHistory=[...followupHistory,{answer:answer.trim()||(img?"|손글씨|":""),verdict:r.verdict}];
      setFollowupHistory(newHistory);
      const newCount=followupCount+1;
      setFollowupSuccess(r.verdict==="correct");
      const finalVerdict=r.verdict==="correct"?"partial":(ev?.verdict||"incorrect");
      const la=lastAnswerRef.current;
      const uc=schedule({...concept,...(la.answer?{lastAnswer:la.answer,lastGap:la.gap,lastGapType:la.gapType}:{})},finalVerdict);
      persist({...deckRef.current,concepts:deckRef.current.concepts.map(c=>c.id===concept.id?uc:c)});
      setConcept(uc);setCount(n=>n+1);
      padRef.current?.clear();setAnswer("");
      setPhase("result");
      setLeftPage(r.verdict==="correct"?0:1);
      setTimeout(()=>padRef.current?.forceColor(PEN_COLORS[2]),50);
    }catch(e){if(e.name==="AbortError")return;setSubmitErr(T("채점 실패: ","Grading failed: ")+e.message);}
    finally{followupSubmitting.current=false;}
    setFollowupBusy(false);
  }

  async function submitDeriveStep(){
    const hasInk=padRef.current?.hasStrokes();
    const hasTxt=answer.trim().length>0;
    if(!hasInk&&!hasTxt){setSubmitErr(T("이 단계를 먼저 써봐!","Write this step first!"));return;}
    const img=hasInk?padRef.current.getImageBase64():null;
    setDeriveChecking(true);setDeriveHintShow(false);setSubmitErr("");
    const userBlocks=[];
    if(img)userBlocks.push({type:"image",source:{type:"base64",media_type:"image/png",data:img}});
    const histTxt=deriveHistory.length?"이전 단계들:\n"+deriveHistory.map((h,i)=>(i+1)+". "+h).join("\n")+"\n\n":"";
    userBlocks.push({type:"text",text:
      "개념: "+concept.name+"\n현재 단계: "+(deriveIdx+1)+"/"+derivePlan.totalSteps+"\n"+histTxt+
      "학습자 답"+(hasTxt?":\n"+answer.trim():" (손글씨 이미지)")+"\n\n"+
      "자료:\n"+studyMat.slice(0,2500)+"\n\n"+
      "다음 형식으로 평가:\nCORRECT: yes 또는 no\nDONE: yes 또는 no (마지막 단계가 맞을 때만)\nFEEDBACK: 1~2문장 반말\nNEXT: 다음 단계 안내 (CORRECT=yes·DONE=no일 때만)"
    });
    try{
      const raw=await callAI(
        "수식 유도 단계 평가자. 표기가 완벽하지 않아도 수학적 방향이 맞으면 CORRECT: yes. 관대하게 평가해.",
        userBlocks,false,{maxTok:350,lang:studyLang},abortRef.current?.signal);
      const res=parseDeriveCheck(raw);
      setDeriveFeedback(res.feedback);
      if(res.correct){
        const newHist=[...deriveHistory,answer.trim()||("|손글씨 "+(deriveIdx+1)+"단계|")];
        setDeriveHistory(newHist);
        padRef.current?.clear();setAnswer("");
        if(res.done||deriveIdx+1>=derivePlan.totalSteps){
          setDeriveDone(true);setPhase("derive_done");
          const uc=schedule(concept,"correct");
          persist({...deckRef.current,concepts:deckRef.current.concepts.map(c=>c.id===concept.id?uc:c)});
          setConcept(uc);setCount(n=>n+1);
        }else{
          setDeriveIdx(deriveIdx+1);setDeriveFeedback("");
        }
      }
    }catch(e){if(e.name==="AbortError")return;setSubmitErr(T("평가 실패: ","Evaluation failed: ")+e.message);}
    setDeriveChecking(false);
  }
