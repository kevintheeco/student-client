                            {annotQMode==="pen"?T("⌨ 타이핑으로","⌨ Type instead"):T("✍ 손글씨로","✍ Handwrite")}
                          </button>
                        </div>
                        {annotQMode==="pen"
                          ?(<div style={{display:"flex",flexDirection:"column",gap:4}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:5}}>
                                <div style={{display:"flex",gap:4}}>
                                  <button className={"btn gho xs"+(annotQTool==="pen"?" on":"")} onClick={()=>setAnnotQTool("pen")}>✏️ 펜</button>
                                  <button className={"btn gho xs"+(annotQTool==="eraser"?" on":"")} onClick={()=>setAnnotQTool("eraser")}>🧽 지우개</button>
                                </div>
                                <div style={{display:"flex",gap:4}}>
                                  <button className="btn gho xs" onClick={()=>annotQPadRef.current?.undo()} disabled={annotBusy}>↩ 취소</button>
                                  <button className="btn gho xs" onClick={()=>annotQPadRef.current?.clear()} disabled={annotBusy}>🗑️ 전체</button>
                                </div>
                              </div>
                              <QuestionPad ref={annotQPadRef} disabled={annotBusy} tool={annotQTool} onInk={setAnnotQInk}/>
                            </div>)
                          :<textarea value={annotQ} onChange={e=>setAnnotQ(e.target.value)} disabled={annotBusy}
                              placeholder={T("모르는 게 뭔지 타이핑해봐","Type what you don't get")}
                              style={{width:"100%",minHeight:64,padding:"8px 10px",borderRadius:10,
                                border:"1.5px solid var(--line)",fontFamily:"'Noto Sans KR',sans-serif",
                                fontSize:13,resize:"none",outline:"none",background:"var(--bg)",color:"var(--ink)"}}/>
                        }
                        <button className="btn pri sm" onClick={()=>askAnnotation()}
                          disabled={annotBusy||(!highlightActive&&!annotQInk&&!annotQ.trim())}>
                          {annotBusy?T("답변 불러오는 중…","Getting answer…"):T("질문하기 →","Ask →")}
                        </button>
                        {annotAnswer&&<div className="annot-answer"><MathText text={annotAnswer} tag="div"/></div>}
                      </div>
                    </>
                  )}

                  <div className="nextrow">
                    <span className="nn">{v==="correct"?T("다음 복습은 더 뒤로 미뤄둘게 👍","Next review pushed further out 👍"):T("넘어가기 전에 비슷한 문제로 굳혀볼래?","Lock it in with a similar question before moving on?")}</span>
                    <div style={{display:"flex",gap:8}}>
                      {v!=="correct"&&<button className="btn gho" onClick={retryVariant} title={T("같은 개념의 변형 문제(숫자·형태만 바뀜)로 다시 풀기","A variant (numbers/form changed) of the same concept")}>{T("🔁 비슷한 문제 풀래","🔁 Try a similar one")}</button>}
                      <button className="btn pri" onClick={()=>next(deck,null,true)}>{T("넘어가요 →","Next →")}</button>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* ── 오른쪽: 노트 캔버스 / 몰라요 강의 ── */}
            {isDeriving?(
              <div className="card notecol" style={{padding:14,display:"flex",flexDirection:"column",gap:10}}>
                {phase==="derive_load"&&(
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"20px 0"}}>
                    <div className="spinner" style={{width:20,height:20,borderWidth:2}}/>
                    <span className="muted" style={{fontSize:13}}>{T("유도 계획 세우는 중…","Planning the derivation…")}</span>
                  </div>
                )}
                {phase==="derive_step"&&(
                  <>
                    <PenPad ref={padRef} kind="answer" hideOcr penOnlyDefault={true} disabled={deriveChecking}/>
                    <textarea value={answer} onChange={e=>setAnswer(e.target.value)} disabled={deriveChecking}
                      placeholder={T("이 단계의 식을 텍스트로 써도 돼 (선택)","Type this step as text too (optional)")}
                      style={{width:"100%",minHeight:60,padding:"8px 10px",borderRadius:10,
                        border:"1.5px solid var(--line)",fontFamily:"'Noto Sans KR',sans-serif",
                        fontSize:13,resize:"vertical",outline:"none",background:"var(--bg)",color:"var(--ink)"}}/>
                    {submitErr&&<div className="err">{submitErr}</div>}
                    {deriveFeedback&&(
                      <div style={{background:"#FFF5F5",border:"1.5px solid #FECACA",borderRadius:11,padding:"10px 14px"}}>
                        <div style={{fontSize:10,fontWeight:700,color:"#DC2626",letterSpacing:".4px",marginBottom:4}}>피드백</div>
                        <MathText text={deriveFeedback} tag="div" style={{fontSize:13,color:"#7F1D1D",lineHeight:1.6}}/>
                      </div>
                    )}
                    {deriveHintShow&&derivePlan?.hints[deriveIdx]&&(
                      <div className="derive-hint">
                        <span style={{fontSize:11,fontWeight:700,display:"block",marginBottom:3}}>힌트</span>
                        <MathText text={derivePlan.hints[deriveIdx]} tag="span"/>
                      </div>
                    )}
                    <div className="row note-foot">
                      <button className="btn pri" onClick={submitDeriveStep} disabled={deriveChecking}>
                        {deriveChecking?T("확인 중…","Checking…"):T("이 단계 맞아? ✓","Is this step right? ✓")}
                      </button>
                      <button className="btn gho" onClick={()=>setDeriveHintShow(v=>!v)} disabled={deriveChecking}>
                        {deriveHintShow?T("힌트 숨기기","Hide hint"):T("막혔어요 💡","I'm stuck 💡")}
                      </button>
                    </div>
                  </>
                )}
                {phase==="derive_done"&&(
                  <div className="row" style={{padding:"20px 0",justifyContent:"center"}}>
                    <button className="btn pri" onClick={()=>next(deck,concept.id)}>{T("다시 도전 →","Try again →")}</button>
                    <button className="btn gho" onClick={()=>next(deck,null,true)}>{T("넘어가요 →","Next →")}</button>
                  </div>
                )}

/* ── SVG 살균 ── */
function sanitizeSvg(s){
  return s
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/<script[\s\S]*?<\/script>/gi,"")
    .replace(/\s+on\w+\s*=\s*["'][^"']*["']/gi,"")
    .replace(/javascript\s*:/gi,"")
    .replace(/data\s*:\s*text\/html/gi,"")
    .replace(/<a\s[^>]*href\s*=[^>]*>/gi,(m)=>m.replace(/href\s*=\s*["'][^"']*["']/gi,""));
}

/* ── 수식+그래프 렌더러 ──
   1단계: <svg>…</svg> 블록 → .graph-block 렌더
   2단계: 나머지 텍스트 → $…$/$$…$$ KaTeX 렌더
── */
// 수식 흔한 깨짐 방지: 수식 안 맨 % 는 LaTeX 주석이라 식이 잘림 → \% 로 이스케이프
function _fixLatex(s){
  if(!s)return s;
  return s.replace(/(^|[^\\])%/g,"$1\\%");
}
function _renderLatexInline(text,kp){
  if(!text)return[];
  const D=String.fromCharCode(1);            // 통화 달러($) 보호용 placeholder
  text=String(text).split("\\$").join(D);    // 이스케이프된 \$ (통화) 보호
  const nodes=[];
  const parts=text.split(/(\$\$[\s\S]+?\$\$|\$[^$\n]+?\$)/);
  parts.forEach((part,i)=>{
    if(!part)return;
    if(i%2===1){
      const disp=part.charAt(1)==='$';
      const latex=_fixLatex(part.slice(disp?2:1,disp?-2:-1).trim());
      try{
        const html=window.katex?.renderToString(latex,{displayMode:disp,throwOnError:false,strict:false});
        if(html){nodes.push(React.createElement('span',{key:kp+i,style:disp?{display:"block",textAlign:"center",overflowX:"auto",margin:"8px 0"}:undefined,dangerouslySetInnerHTML:{__html:html}}));return;}
      }catch(e){console.warn("KaTeX:",e);}
      nodes.push(React.createElement('span',{key:kp+i},part.split(D).join("$")));
    }else if(part){
      nodes.push(part.split(D).join("$"));
    }
  });
  return nodes;
}
/* ── 마크다운 표 ── */
const _splitRow=(l)=>l.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim());
const _isTableRow=(l)=>/^\s*\|.*\|\s*$/.test(l);
const _isTableSep=(l)=>/^\s*\|?[\s:|-]*-[\s:|-]*\|?\s*$/.test(l)&&l.indexOf("-")>=0;
/* ── 블록 파서 (제목·목록·인용·표·문단) ── */
function _renderBlocks(seg,nodes,kr,kp){
  const lines=seg.split("\n");let i=0;
  while(i<lines.length){
    const line=lines[i];const k=kp+"_"+(kr.n++);
    // 표
    if(_isTableRow(line)&&i+1<lines.length&&_isTableSep(lines[i+1])){
      const header=_splitRow(line);
      const aligns=_splitRow(lines[i+1]).map(c=>{const L=c.startsWith(":"),R=c.endsWith(":");return(L&&R)?"center":R?"right":"left";});
      i+=2;const rows=[];
      while(i<lines.length&&_isTableRow(lines[i])){rows.push(_splitRow(lines[i]));i++;}
      const thS={padding:"7px 10px",border:"1px solid var(--line)",background:"var(--pri-s)",color:"var(--pri-d)",fontWeight:700,fontSize:12.5};
      const tdS=(a)=>({padding:"7px 10px",border:"1px solid var(--line)",fontSize:13,lineHeight:1.6,textAlign:a,verticalAlign:"top"});
      nodes.push(React.createElement("div",{key:k,style:{overflowX:"auto",margin:"10px 0"}},
        React.createElement("table",{style:{borderCollapse:"collapse",width:"100%",background:"var(--card)"}},
          React.createElement("thead",{key:"h"},React.createElement("tr",null,
            header.map((c,ci)=>React.createElement("th",{key:ci,style:{...thS,textAlign:aligns[ci]||"left"}},..._renderInline(c,k+"h"+ci))))),
          React.createElement("tbody",{key:"b"},rows.map((r,ri)=>React.createElement("tr",{key:ri,style:ri%2?{background:"var(--bg)"}:undefined},
            r.map((c,ci)=>React.createElement("td",{key:ci,style:tdS(aligns[ci]||"left")},..._renderInline(c,k+"r"+ri+"c"+ci))))))
        )
      ));
      continue;
    }
    if(/^###\s/.test(line)){
      nodes.push(React.createElement("div",{key:k,style:{fontFamily:"'Jua',sans-serif",fontSize:13.5,color:"var(--pri-d)",marginTop:10,marginBottom:2}},..._renderInline(line.slice(4),k)));
      i++;continue;
    }
    if(/^##\s/.test(line)){
      nodes.push(React.createElement("div",{key:k,style:{fontFamily:"'Jua',sans-serif",fontSize:15,color:"var(--ink)",marginTop:14,marginBottom:5,paddingBottom:4,borderBottom:"1.5px solid var(--line)"}},..._renderInline(line.slice(3),k)));
      i++;continue;
    }
    if(/^---+$/.test(line.trim())){
      nodes.push(React.createElement("hr",{key:k,style:{border:"none",borderTop:"1px solid var(--line)",margin:"8px 0"}}));
      i++;continue;
    }
    if(/^[-•]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^[-•]\s/.test(lines[i])){items.push(lines[i].replace(/^[-•]\s/,""));i++;}
      nodes.push(React.createElement("div",{key:k,style:{display:"flex",flexDirection:"column",gap:3,margin:"4px 0 8px"}},
        items.map((item,idx)=>React.createElement("div",{key:idx,style:{display:"flex",gap:7,alignItems:"flex-start"}},
          React.createElement("span",{style:{color:"var(--pri)",fontWeight:900,flexShrink:0,lineHeight:1.85,fontSize:11}},"•"),
          React.createElement("span",{style:{flex:1,lineHeight:1.78}},..._renderInline(item,k+"b"+idx))
        ))
      ));
      continue;
    }
    if(/^\d+\.\s/.test(line)){
      const items=[];let n=1;
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push({n,t:lines[i].replace(/^\d+\.\s/,"")});n++;i++;}
      nodes.push(React.createElement("div",{key:k,style:{display:"flex",flexDirection:"column",gap:3,margin:"4px 0 8px"}},
        items.map((item,idx)=>React.createElement("div",{key:idx,style:{display:"flex",gap:7,alignItems:"flex-start"}},
          React.createElement("span",{style:{color:"var(--pri)",fontWeight:700,flexShrink:0,lineHeight:1.85,fontSize:12,minWidth:16,textAlign:"right"}},item.n+"."),
          React.createElement("span",{style:{flex:1,lineHeight:1.78}},..._renderInline(item.t,k+"n"+idx))
        ))
      ));
      continue;
    }
    if(/^>\s/.test(line)){
      nodes.push(React.createElement("div",{key:k,style:{borderLeft:"3px solid var(--pri)",background:"var(--pri-s)",borderRadius:"0 8px 8px 0",padding:"6px 12px",margin:"4px 0",lineHeight:1.75,color:"var(--ink)"}},..._renderInline(line.slice(2),k)));
      i++;continue;
    }
    if(!line.trim()){
      if(nodes.length>0)nodes.push(React.createElement("div",{key:k,style:{height:5}}));
      i++;continue;
    }
    nodes.push(React.createElement("div",{key:k,style:{lineHeight:1.85}},..._renderInline(line,k)));
    i++;
  }
}
function _renderInline(text,kp){
  if(!text)return[];
  const nodes=[];
  const segs=text.split(/(\*\*[^*\n]+?\*\*|\*[^*\n]+?\*|`[^`\n]+?`)/);
  segs.forEach((seg,i)=>{
    if(!seg)return;
    const k=kp+'_i'+i;
    if(seg.startsWith('**')&&seg.endsWith('**')&&seg.length>4)
      nodes.push(React.createElement('strong',{key:k},..._renderLatexInline(seg.slice(2,-2),k)));
    else if(seg.startsWith('*')&&seg.endsWith('*')&&seg.length>2)
      nodes.push(React.createElement('em',{key:k},..._renderLatexInline(seg.slice(1,-1),k)));
    else if(seg.startsWith('`')&&seg.endsWith('`')&&seg.length>2)
      nodes.push(React.createElement('code',{key:k,style:{background:'#F0EDFF',borderRadius:4,padding:'0 5px',fontSize:'.88em',color:"var(--pri-d)"}},seg.slice(1,-1)));
    else
      nodes.push(..._renderLatexInline(seg,k));
  });
  return nodes;
}
function MathText({text,tag:Tag="p",className,style}){
  if(!text)return React.createElement(Tag,{className,style});
  const cleaned=String(text)
    .replace(/<!--[\s\S]*?-->/g,"")
    .replace(/```[\w]*\s*(<svg[\s\S]*?<\/svg>)\s*```/gi,"$1")
    .replace(/<svg(?![\s\S]*<\/svg>)[\s\S]*$/i,"")                      // 닫히지 않은(잘린) svg는 통째로 제거 — 날것 노출 방지
    .replace(/\\\[([\s\S]+?)\\\]/g,(m,p)=>"\n\n$$"+p.trim()+"$$\n\n")   // \[..\] → $$..$$
    .replace(/\\\(([\s\S]+?)\\\)/g,(m,p)=>"$"+p.trim()+"$");            // \(..\) → $..$
  if(Tag==="span")return React.createElement("span",{className,style},..._renderInline(cleaned,"s"));
  const nodes=[];const kr={n:0};
  const svgSegs=cleaned.split(/(<svg[\s\S]*?<\/svg>)/i);
  svgSegs.forEach((seg,si)=>{
    if(si%2===1){nodes.push(React.createElement("div",{key:"svg"+si,className:"graph-block",dangerouslySetInnerHTML:{__html:sanitizeSvg(seg)}}));return;}
    // 멀티라인 디스플레이 수식 $$...$$ 먼저 분리 (행렬·정렬식이 줄로 안 깨지게)
    const dispSegs=seg.split(/(\$\$[\s\S]+?\$\$)/);
    dispSegs.forEach((dseg,di)=>{
      if(!dseg)return;
      if(di%2===1){
        const latex=_fixLatex(dseg.slice(2,-2).trim());const dkk="dm"+si+"_"+di;
        try{
          const html=window.katex?.renderToString(latex,{displayMode:true,throwOnError:false,strict:false});
          if(html){nodes.push(React.createElement("div",{key:dkk,style:{margin:"10px 0",overflowX:"auto"},dangerouslySetInnerHTML:{__html:html}}));return;}
        }catch(e){console.warn("KaTeX:",e);}
        nodes.push(React.createElement("div",{key:dkk},dseg));return;
      }
      _renderBlocks(dseg,nodes,kr,si+"_"+di);
    });
  });
  return React.createElement("div",{className,style},...nodes);
}

function Meter({box}){
  return(
    <span className="meter" title={"기억 강도 "+box+"/5"}>
      {[1,2,3,4,5].map(i=><i key={i} className={(i<=box?"on":"")+(box>=5?" full":"")}/>)}
    </span>
  );
}
