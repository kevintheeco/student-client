<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── 저장소 (이 기기에만 저장) ──
const LS = {
  get(k){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e){ return null; } },
  set(k, val){ try { localStorage.setItem(k, JSON.stringify(val)); return true; } catch(e){ return false; } },
  del(k){ try { localStorage.removeItem(k); } catch(e){} },
};
const DECKS_KEY = "ng:decks";
const deckKey = (id) => "ng:deck:" + id;

// ── 설정 (본인 키 + 모델) ──
const CFG = { key: LS.get("ng:key") || "", model: LS.get("ng:model") || "claude-sonnet-4-6" };
const MODELS = [
  { id: "claude-sonnet-4-6", label: "Sonnet 4.6 · 추천 (똑똑+빠름)" },
  { id: "claude-haiku-4-5-20251001", label: "Haiku 4.5 · 가장 저렴/빠름" },
  { id: "claude-opus-4-8", label: "Opus 4.8 · 가장 똑똑 (비쌈)" },
];

// ── Anthropic API 직접 호출 (브라우저) ──
async function callClaude(system, userContent, wantJson) {
  if (!CFG.key) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": CFG.key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: CFG.model,
      max_tokens: 1024,
      system,
      messages: [{ role: "user", content: userContent }],
    }),
  });
  if (!res.ok) {
    let msg = "API " + res.status;
    try { const j = await res.json(); if (j.error && j.error.message) msg = j.error.message; } catch(e){}
    throw new Error(msg);
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  if (!wantJson) return text;
  let clean = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
  if (s !== -1 && e !== -1) clean = clean.slice(s, e + 1);
  return JSON.parse(clean);
}

async function transcribeImage(base64, mediaType, kind) {
  const hint = kind === "answer" ? "이건 학습자가 손으로 쓴 답안이야." : "이건 학습자가 손으로 정리한 공부 노트야.";
  const content = [
    { type: "image", source: { type: "base64", media_type: mediaType || "image/png", data: base64 } },
    { type: "text", text: hint + " 적힌 내용을 한국어로 정확히 옮겨 적어줘. 수식·행렬은 읽을 수 있게(윗첨자 ^, 아래첨자 _, 행렬은 줄로) 풀어 써. 옮긴 텍스트만 출력하고 다른 말은 절대 붙이지 마. 비어 있으면 빈 문자열." },
  ];
  return await callClaude("너는 손글씨를 정확히 텍스트로 옮기는 OCR 도우미야.", content, false);
}

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-3);
const DAY = 864e5;
const INTERVALS = [0, 0, 1, 3, 7, 16];

function schedule(c, verdict) {
  let box = c.box || 1;
  if (verdict === "correct") box = Math.min(5, box + 1);
  else if (verdict === "incorrect") box = 1;
  // partial → 유지
  const days = INTERVALS[box] != null ? INTERVALS[box] : 1;
  return { ...c, box, dueAt: Date.now() + days * DAY, reps: (c.reps || 0) + 1,
    lapses: (c.lapses || 0) + (verdict === "incorrect" ? 1 : 0), lastResult: verdict, lastSeen: Date.now() };
}
function deckSummary(d) {
  const cs = d.concepts || [], now = Date.now();
  return {
    total: cs.length,
    mastered: cs.filter(c => (c.box || 1) >= 4).length,
    due: cs.filter(c => (c.dueAt || 0) <= now).length,
    weak: cs.filter(c => (c.box || 1) <= 2).length,
  };
}
function pickConcept(d, avoidId) {
  const cs = (d.concepts || []).slice(); if (!cs.length) return null;
  const now = Date.now();
  let pool = cs.filter(c => (c.dueAt || 0) <= now);
  if (!pool.length) pool = cs;
  pool.sort((a, b) => (a.box || 1) - (b.box || 1) || (a.dueAt || 0) - (b.dueAt || 0));
  if (pool.length > 1 && pool[0].id === avoidId) { const alt = pool.find(c => c.id !== avoidId); if (alt) return alt; }
  return pool[0];
}
const diffWord = (box) => (box || 1) <= 1 ? "기초" : box <= 3 ? "보통" : "응용";
const diffLong = (box) => (box || 1) <= 1 ? "기초 (정의·직관)" : box <= 3 ? "보통 (왜 그런지·연결)" : "응용 (계산·반례·실제 적용)";

// ── 마스코트 ──

      <circle cx="36" cy="38" r="22" fill="#FFD9B8" />

      {/* cheeks */}

      <circle cx="49" cy="43" r="4.2" fill="#FFB3A0" opacity=".75" />

      <circle cx="43.5" cy="36" r="7" fill="#fff" stroke="#221C39" strokeWidth="2.2" />

      <circle cx="28.5" cy="36.5" r="2.4" fill="#221C39" />
      <circle cx="43.5" cy="36.5" r="2.4" fill="#221C39" />
      {/* smile */}
      <path d="M30 48 q6 5 12 0" stroke="#221C39" strokeWidth="2.2" strokeLinecap="round" fill="none" />
      {/* grad cap */}
      <path d="M36 8 L58 18 L36 28 L14 18 Z" fill="#6C5CE7" />
      <path d="M36 8 L58 18 L36 28 L14 18 Z" stroke="#5A48E0" strokeWidth="1" />
      <rect x="33" y="20" width="6" height="9" rx="2" fill="#6C5CE7" />
      <path d="M55 19 v8" stroke="#FFC24B" strokeWidth="2" strokeLinecap="round" />

// ── 앱 루트 ──
function App() {
  const [view, setView] = useState(CFG.key ? "home" : "onboard");
  const [decks, setDecks] = useState([]);
  const [activeDeck, setActiveDeck] = useState(null);

  const refresh = () => setDecks(LS.get(DECKS_KEY) || []);
  useEffect(() => { refresh(); }, []);

  function openStudy(id) { const d = LS.get(deckKey(id)); if (d) { setActiveDeck(d); setView("study"); } }

  return (
    <>
      <div className="hd">
        <div className="brand" onClick={() => setView(CFG.key ? "home" : "onboard")}>
          <Prof size={44} />
          <div>
            <h1>니가 교수</h1>
            <div className="tag">니가 설명해봐, 내가 채점할게</div>
          </div>
        </div>
        <div className="hd-actions">
          {view !== "home" && CFG.key && (
            <button className="btn gho sm" onClick={() => setView("home")}>← 목록</button>
          )}
          <button className="btn gho sm" onClick={() => setView("settings")}>⚙️</button>
        </div>
      </div>

      {view === "onboard" && <Onboard onDone={() => setView("home")} />}
      {view === "settings" && <Settings onDone={() => setView(CFG.key ? "home" : "onboard")} />}
      {view === "home" && <Home decks={decks} onAdd={() => setView("add")} onOpen={openStudy} onChanged={refresh} />}
      {view === "add" && <AddMaterial onDone={() => { refresh(); setView("home"); }} onCancel={() => setView("home")} />}
      {view === "study" && activeDeck && <Study deck={activeDeck} />}

      <div className="footer">키와 공부 자료는 이 기기에만 저장돼요 · {MODELS.find(m => m.id === CFG.model)?.label.split(" ·")[0] || "Claude"}</div>
    </>
  );
}

// ── 온보딩 / 키 입력 ──
function Onboard({ onDone }) {
  return (
    <div className="card panel">
      <div style={{ textAlign: "center" }}><Prof size={84} /></div>
      <h2 className="jua" style={{ textAlign: "center", margin: "4px 0 0", fontSize: 24 }}>안녕! 나 니가 교수야 👋</h2>
      <p className="muted" style={{ textAlign: "center", margin: 0, fontSize: 13.5, lineHeight: 1.7 }}>
        시작하려면 네 Anthropic API 키가 필요해. 공부한 걸 붙여넣으면 내가 문제 내고 채점해줄게.
      </p>
      <KeyForm onSaved={onDone} cta="시작하기" />
    </div>

}

function Settings({ onDone }) {
  return (
    <div className="card panel">
      <div className="eyebrow">설정</div>
      <KeyForm onSaved={onDone} cta="저장" showCancel onCancel={onDone} />
    </div>
  );
}

function KeyForm({ onSaved, cta, showCancel, onCancel }) {
  const [key, setKey] = useState(CFG.key);
  const [model, setModel] = useState(CFG.model);
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState("");

  async function save() {
    if (!key.trim()) { setErr("API 키를 넣어줘."); return; }
    setTesting(true); setErr("");
    CFG.key = key.trim(); CFG.model = model;
    try {
      await callClaude("ping", "1글자로 'ok'라고만 답해.", false);
      LS.set("ng:key", CFG.key); LS.set("ng:model", CFG.model);
      setTesting(false); onSaved();
    } catch (e) {
      setTesting(false);
      setErr("연결 실패: " + e.message + " — 키가 맞는지, 크레딧이 있는지 확인해줘.");
    }
  }

  return (
    <>
      <div className="selectrow">
        <label>Anthropic API 키</label>
        <input className="field" type="password" placeholder="sk-ant-..." value={key}
          onChange={e => setKey(e.target.value)} autoComplete="off" />
      </div>
      <div className="selectrow">
        <label>모델</label>
        <select className="field" value={model} onChange={e => setModel(e.target.value)}>
          {MODELS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
        </select>
      </div>
      <div className="warn">
        키는 <b>이 기기 브라우저에만</b> 저장돼. 다른 데로 보내지 않아 — 단, 이 파일을 남과 공유하거나 공개 웹에 올리면 키가 노출될 수 있으니 <b>본인 기기에서만</b> 써.
        키 발급/사용량 확인은 <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>. 한도를 걸어두면 더 안전해.
      </div>
      {err && <div className="err">{err}</div>}
      <div className="row">
        <button className="btn pri" onClick={save} disabled={testing}>{testing ? "연결 확인 중…" : cta}</button>
        {showCancel && <button className="btn gho" onClick={onCancel} disabled={testing}>취소</button>}
      </div>
    </>
  );
}

// ── 홈 ──
function Home({ decks, onAdd, onOpen, onChanged }) {
  const [det, setDet] = useState({});
  useEffect(() => {
    const o = {};
    decks.forEach(d => { const f = LS.get(deckKey(d.id)); if (f) o[d.id] = deckSummary(f); });
    setDet(o);
  }, [decks]);

  function del(id, name) {
    if (!confirm('"' + name + '" 자료랑 학습 기록 지울까?')) return;
    LS.del(deckKey(id));
    LS.set(DECKS_KEY, (LS.get(DECKS_KEY) || []).filter(x => x.id !== id));
    onChanged();
  }

  return (
    <section>
      <div className="hero">
        <Prof size={72} />
        <div>
          <h2>공부한 거,<br />다시 안 까먹게 해줄게</h2>
          <p>노트를 붙여넣거나 손글씨로 써주면 핵심을 뽑아 무작위로 물어봐. 맞히면 점점 뜸하게, 헷갈리면 자주 — 그게 장기기억의 비결이야.</p>
        </div>
      </div>

      <div className="row" style={{ marginBottom: 18 }}>
        <button className="btn pri" onClick={onAdd}>+ 공부한 거 추가</button>
      </div>

      {decks.length === 0 ? (
        <div className="empty">아직 자료가 없네! 방금 공부한 거 던져주면 내가 문제 낼게 📚</div>
      ) : (
        <div className="grid">
          {decks.map(d => {
            const s = det[d.id];
            return (
              <article key={d.id} className="card deck">
                <div className="nm">{d.name}</div>
                {s ? (
                  <>
                    <div className="stats">
                      <Stat n={s.total} l="개념" />
                      <Stat n={s.mastered} l="익힘" t="mint" />
                      <Stat n={s.due} l="복습 대기" t="pri" />
                    </div>
                    <Bar mastered={s.mastered} total={s.total} />
                  </>
                ) : <div className="muted">준비 중…</div>}
                <div className="acts">
                  <button className="btn pri sm" onClick={() => onOpen(d.id)}>
                    공부 시작{s && s.due > 0 ? " · " + s.due + "개" : ""}
                  </button>
                  <button className="btn gho sm" onClick={() => del(d.id, d.name)}>삭제</button>
                </div>
              </article>
            );
          })}
        </div>
      )}
    </section>
  );
}

function Stat({ n, l, t }) {
  return <div className="stat"><div className={"n " + (t || "")}>{n}</div><div className="l">{l}</div></div>;
}
function Bar({ mastered, total }) {
  const pct = total ? Math.round((mastered / total) * 100) : 0;
  return <div className="bar"><i style={{ width: pct + "%" }} /></div>;
}

// ── 자료 추가 ──
function AddMaterial({ onDone, onCancel }) {
  const [name, setName] = useState("");
  const [material, setMaterial] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [pen, setPen] = useState(false);
  const append = (t) => { if (t) setMaterial(p => (p.trim() ? p.trim() + "\n" : "") + t); };

  async function save() {
    if (!name.trim() || !material.trim()) { setErr("제목이랑 내용 둘 다 채워줘."); return; }
    setBusy(true); setErr("");
    let concepts = [];
    try {
      const r = await callClaude(
        "너는 학습 자료에서 핵심 개념을 뽑는 조교야. 자료를 읽고 능동 회상으로 시험 볼 만한 핵심 개념 8~15개를 짧은 명사구로 뽑아(예: '고유값과 고유벡터','한계대체율'). 자료에 실제 있는 것만. JSON만 출력: {\"concepts\":[\"...\"]} — 다른 말 금지.",
        "자료:\n\n" + material.slice(0, 12000), true);
      concepts = Array.isArray(r.concepts) ? r.concepts : [];
    } catch (e) { setErr("개념 뽑기 실패: " + e.message); setBusy(false); return; }
    if (!concepts.length) concepts = ["전체 자료"];

    const id = uid();
    const deck = { id, name: name.trim(), material: material.trim(), createdAt: Date.now(),
      concepts: concepts.map(nm => ({ id: uid(), name: String(nm).slice(0, 80), box: 1, dueAt: 0, reps: 0, lapses: 0 })) };
    LS.set(deckKey(id), deck);
    LS.set(DECKS_KEY, [{ id, name: deck.name }, ...(LS.get(DECKS_KEY) || [])]);
    setBusy(false); onDone();
  }

  return (
    <section className="card panel" style={{ maxWidth: 680 }}>
      <div className="eyebrow">새 자료</div>
      <input className="field" placeholder="제목 — 예: 선형대수 5장 (고유값)" value={name}
        onChange={e => setName(e.target.value)} disabled={busy} />
      <textarea className="field" rows={9} disabled={busy} value={material}
        placeholder="공부한 내용을 붙여넣거나, 아래에서 펜으로 쓰거나 노트 사진을 올려줘."
        onChange={e => setMaterial(e.target.value)} />
      <div className="tools">
        <button className={"btn gho sm" + (pen ? " on" : "")} onClick={() => setPen(v => !v)} disabled={busy}>✍️ 펜으로 쓰기</button>
        <PhotoButton kind="note" onText={append} label="📷 노트 사진" />
        <span className="note">인식한 글은 위 칸에 들어가 — 틀린 데는 직접 고치면 돼.</span>
      </div>
      {pen && <PenPad kind="note" onText={append} />}
      {err && <div className="err">{err}</div>}
      <div className="row">
        <button className="btn pri" onClick={save} disabled={busy}>{busy ? "핵심만 쏙 뽑는 중…" : "이거 외우자!"}</button>
        <button className="btn gho" onClick={onCancel} disabled={busy}>취소</button>
      </div>
      <p className="hint">저장하면 자료를 읽고 회상형 질문에 쓸 핵심 개념을 자동으로 추려. 같은 주제에 내용을 더 넣고 싶으면 새 자료로 추가해줘.</p>
    </section>
  );
}

// ── 손글씨 캔버스 ──
function PenPad({ kind, onText }) {
  const ref = useRef(null);
  const strokes = useRef([]);
  const drawing = useRef(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [ink, setInk] = useState(false);

  function dims() { const c = ref.current; const dpr = window.devicePixelRatio || 1; return { w: c.width / dpr, h: c.height / dpr }; }
  function redraw() {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext("2d"); const { w, h } = dims();
    ctx.fillStyle = "#FFFDF8"; ctx.fillRect(0, 0, w, h);
    ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#2A2440";
    strokes.current.forEach(st => {
      for (let i = 1; i < st.length; i++) {
        ctx.beginPath(); ctx.lineWidth = 1.8 + (st[i].p || .5) * 2.6;
        ctx.moveTo(st[i - 1].x, st[i - 1].y); ctx.lineTo(st[i].x, st[i].y); ctx.stroke();
      }
    });
  }
  function setup() {
    const c = ref.current; if (!c) return;
    const r = c.getBoundingClientRect(); const dpr = window.devicePixelRatio || 1;
    c.width = Math.round(r.width * dpr); c.height = Math.round(r.height * dpr);
    const ctx = c.getContext("2d"); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr); redraw();
  }
  useEffect(() => { setup(); const f = () => setup(); window.addEventListener("resize", f); return () => window.removeEventListener("resize", f); }, []);

  const pt = (e) => { const r = ref.current.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top, p: e.pressure || .5 }; };
  function down(e) { e.preventDefault(); drawing.current = true; strokes.current.push([pt(e)]); try { e.target.setPointerCapture(e.pointerId); } catch(_){} }
  function move(e) {
    if (!drawing.current) return; e.preventDefault();
    const st = strokes.current[strokes.current.length - 1]; const p = pt(e); st.push(p);
    const ctx = ref.current.getContext("2d");
    if (st.length > 1) { ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.strokeStyle = "#2A2440";
      ctx.beginPath(); ctx.lineWidth = 1.8 + p.p * 2.6; ctx.moveTo(st[st.length - 2].x, st[st.length - 2].y); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    if (!ink) setInk(true);
  }
  const up = () => { drawing.current = false; };
  const clear = () => { strokes.current = []; redraw(); setInk(false); setErr(""); };
  const undo = () => { strokes.current.pop(); redraw(); setInk(strokes.current.length > 0); };
  async function recognize() {
    if (!ink) { setErr("먼저 펜으로 써봐."); return; }
    setBusy(true); setErr("");
    try { const data = ref.current.toDataURL("image/png").split(",")[1]; const t = await transcribeImage(data, "image/png", kind); onText((t || "").trim()); clear(); }
    catch (e) { setErr("인식 실패: " + e.message); }
    setBusy(false);
  }
  return (
    <div className="pen">
      <canvas ref={ref} className="pad" onPointerDown={down} onPointerMove={move}
        onPointerUp={up} onPointerLeave={up} onPointerCancel={up} />
      <div className="pen-bar">
        <span className="h">S펜이나 손가락으로 써</span>
        <div className="row">
          <button className="btn gho sm" onClick={undo} disabled={busy}>한 획 취소</button>
          <button className="btn gho sm" onClick={clear} disabled={busy}>지우기</button>
          <button className="btn pri sm" onClick={recognize} disabled={busy}>{busy ? "인식 중…" : "인식해서 넣기"}</button>
        </div>
      </div>
      {err && <div className="err">{err}</div>}
    </div>
  );
}

function PhotoButton({ kind, onText, label }) {
  const ref = useRef(null);
  const [busy, setBusy] = useState(false);
  async function handle(e) {
    const f = e.target.files && e.target.files[0]; e.target.value = ""; if (!f) return;
    setBusy(true);
    try {
      const data = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(String(r.result).split(",")[1]); r.onerror = rej; r.readAsDataURL(f); });
      const t = await transcribeImage(data, f.type || "image/jpeg", kind); onText((t || "").trim());
    } catch (e) { alert("사진 인식 실패: " + e.message); }
    setBusy(false);
  }
  return (
    <>
      <button className="btn gho sm" onClick={() => ref.current && ref.current.click()} disabled={busy}>{busy ? "읽는 중…" : (label || "📷 사진")}</button>
      <input ref={ref} type="file" accept="image/*" capture="environment" onChange={handle} style={{ display: "none" }} />
    </>
  );
}

// ── 학습 세션 ──
function Study({ deck: initial }) {
  const [deck, setDeck] = useState(initial);
  const [concept, setConcept] = useState(null);
  const [q, setQ] = useState(null);
  const [phase, setPhase] = useState("loading"); // loading|answering|grading|result|error
  const [answer, setAnswer] = useState("");
  const [ev, setEv] = useState(null);
  const [errMsg, setErrMsg] = useState("");
  const [deeper, setDeeper] = useState("");
  const [deepBusy, setDeepBusy] = useState(false);
  const [count, setCount] = useState(0);
  const [pen, setPen] = useState(false);
  const last = useRef(null);
  const ansRef = useRef(null);
  const appendAns = (t) => { if (t) setAnswer(p => (p.trim() ? p.trim() + "\n" : "") + t); };

  function persist(d) { setDeck(d); LS.set(deckKey(d.id), d); }

  async function next(d) {
    d = d || deck;
    setPhase("loading"); setQ(null); setEv(null); setAnswer(""); setDeeper(""); setErrMsg(""); setPen(false);
    const c = pickConcept(d, last.current);
    if (!c) { setPhase("error"); setErrMsg("질문할 개념이 없어."); return; }
    setConcept(c); last.current = c.id;
    try {
      const r = await callClaude(
        "너는 능동 회상 튜터야. 주어진 자료와 목표 개념에 대해, 학습자가 스스로 떠올려 설명/계산해야 하는 회상형 질문 하나를 한국어로 만들어. 단순 암기보다 왜·어떻게·언제 쓰는지·반례를 선호. 난이도: " + diffLong(c.box) + ". 자료 범위 안에서만. JSON만 출력: {\"question\":\"...\",\"key_points\":[\"채점 핵심 3~5개\"]}",
        "목표 개념: " + c.name + "\n\n자료:\n" + d.material.slice(0, 12000), true);
      setQ(r); setPhase("answering");
      setTimeout(() => ansRef.current && ansRef.current.focus(), 50);
    } catch (e) { setPhase("error"); setErrMsg("질문 생성 실패: " + e.message); }
  }
  useEffect(() => { next(initial); }, []);

  async function submit() {
    if (!answer.trim() || phase !== "answering") return;
    setPhase("grading");
    try {
      const r = await callClaude(
        "너는 채점 조교야. 자료·질문·채점 핵심·학습자 답을 보고 채점해. 관대하되 정확하게. JSON만 출력: {\"verdict\":\"correct|partial|incorrect\",\"score\":0-100,\"feedback\":\"맞은 것/빠진 것 2~4문장 (반말, 친근하게)\",\"why\":\"이 개념·답이 왜 그런지 자료 근거로 2~3문장\",\"model_answer\":\"모범답안 3~5문장\"}",
        "목표 개념: " + concept.name + "\n질문: " + q.question + "\n채점 핵심: " + JSON.stringify(q.key_points || []) + "\n\n학습자 답:\n" + answer + "\n\n자료(근거):\n" + deck.material.slice(0, 9000), true);
      setEv(r);
      const v = ["correct", "partial", "incorrect"].includes(r.verdict) ? r.verdict : "partial";
      const uc = schedule(concept, v);
      persist({ ...deck, concepts: deck.concepts.map(c => c.id === concept.id ? uc : c) });
      setConcept(uc); setCount(n => n + 1); setPhase("result");
    } catch (e) { setPhase("error"); setErrMsg("채점 실패: " + e.message); }
  }

  async function explainMore() {
    setDeepBusy(true);
    try {
      const r = await callClaude(
        "너는 친절한 튜터야. 자료에 근거해 더 깊고 직관적으로(비유·예시·왜 그런지) 반말로 4~6문장 설명해.",
        "개념: " + concept.name + "\n질문: " + q.question + "\n모범답안: " + (ev?.model_answer || "") + "\n\n자료:\n" + deck.material.slice(0, 9000), false);
      setDeeper(r);
    } catch (e) { setDeeper("설명 불러오기 실패: " + e.message); }
    setDeepBusy(false);
  }

  const s = deckSummary(deck);
  const v = ev?.verdict;
  const vTone = v === "correct" ? "mint" : v === "incorrect" ? "rose" : "gold";
  const vLabel = v === "correct" ? "오 정확해! 💯" : v === "incorrect" ? "이건 다시 보자 🔁" : "거의 다 왔어 ✏️";

  return (
    <section className="study">
      <aside className="card rail">
        <div className="top">
          <div className="nm">{deck.name}</div>
          <div className="muted" style={{ fontSize: 11.5 }}>이번 세션 · {count}문제</div>
        </div>
        <div className="prog">
          <Stat n={s.mastered} l="익힘" t="mint" />
          <Stat n={s.due} l="대기" t="pri" />
          <Stat n={s.weak} l="약함" t="rose" />
        </div>
        <div className="clist">
          {deck.concepts.slice().sort((a, b) => (a.box || 1) - (b.box || 1)).map(c => (
            <div key={c.id} className={"crow" + (concept && c.id === concept.id ? " active" : "")}>
              <Meter box={c.box || 1} /><span className="cn">{c.name}</span>
            </div>
          ))}
        </div>
      </aside>

      <div className="stage">
        {phase === "error" ? (
          <div className="card qcard msgcard">
            <Prof size={64} /><p className="muted">{errMsg}</p>
            <button className="btn pri" onClick={() => next()}>다시 시도</button>
          </div>
        ) : phase === "loading" ? (
          <div className="card qcard msgcard"><div className="spinner" /><p className="muted">문제 만드는 중…</p></div>
        ) : (
          <div className="card qcard" key={(concept?.id || "") + phase}>
            <div className="chips">
              <span className="chip">{concept?.name}</span>
              <span className="chip gho">{diffWord(concept?.box)}</span>
            </div>
            <h2 className="q">{q?.question}</h2>

            {(phase === "answering" || phase === "grading") && (
              <>
                <textarea ref={ansRef} className="field" rows={6} disabled={phase === "grading"}
                  placeholder="기억에서 꺼내서 써봐. 보고 쓰면 반칙이야 ㅎ" value={answer}
                  onChange={e => setAnswer(e.target.value)}
                  onKeyDown={e => { if ((e.metaKey || e.ctrlKey) && e.key === "Enter") submit(); }} />
                <div className="tools" style={{ marginTop: 10 }}>
                  <button className={"btn gho sm" + (pen ? " on" : "")} onClick={() => setPen(p => !p)} disabled={phase === "grading"}>✍️ 펜으로 답하기</button>
                  <PhotoButton kind="answer" onText={appendAns} label="📷 손글씨 사진" />
                </div>
                {pen && <div style={{ marginTop: 10 }}><PenPad kind="answer" onText={appendAns} /></div>}
                <div className="row" style={{ marginTop: 12 }}>
                  <button className="btn pri" onClick={submit} disabled={phase === "grading" || !answer.trim()}>
                    {phase === "grading" ? "채점 중…" : "이대로 제출 (⌘/Ctrl+Enter)"}
                  </button>
                </div>
              </>
            )}

            {phase === "result" && ev && (
              <div className="result">
                <div className={"verdict " + vTone}>
                  <span className="dot" />{vLabel}
                  {typeof ev.score === "number" && <span className="sc">{ev.score}/100</span>}
                </div>
                <div className="blk"><div className="bl">피드백</div><p>{ev.feedback}</p></div>
                {ev.why && <div className="blk why"><div className="bl">왜 그런지</div><p>{ev.why}</p></div>}
                <div className="blk"><div className="bl">이렇게 답하면 완벽</div><p>{ev.model_answer}</p></div>
                {deeper ? (
                  <div className="blk deeper"><div className="bl">더 풀어서</div><p>{deeper}</p></div>
                ) : (
                  <button className="btn gho sm" onClick={explainMore} disabled={deepBusy}>{deepBusy ? "불러오는 중…" : "더 풀어서 설명해줘"}</button>
                )}
                <div className="nextrow">
                  <span className="nn">{v === "correct" ? "다음 복습은 더 뒤로 미뤄둘게 👍" : "이건 곧 또 물어볼 거야"}</span>
                  <button className="btn pri" onClick={() => next()}>다음 문제 →</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </section>
  );
}

function Meter({ box }) {
  return (
    <span className="meter" title={"기억 강도 " + box + "/5"}>
      {[1, 2, 3, 4, 5].map(i => <i key={i} className={(i <= box ? "on" : "") + (box >= 5 ? " full" : "")} />)}
    </span>
  );
}

</script>
